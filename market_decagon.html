<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Market Decagon V1.0</title>
    <style>
        body { 
            font-family: "Helvetica Neue", Arial, sans-serif; 
            background-color: #0d1117; 
            color: #c9d1d9; 
            padding: 20px; 
            margin: 0; 
        }
        .container { 
            max-width: 1600px; 
            margin: 0 auto; 
        }
        header { 
            border-bottom: 2px solid #30363d; 
            margin-bottom: 25px; 
            padding-bottom: 15px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { 
            color: #f85149; 
            font-size: 24px; 
            text-transform: uppercase; 
            margin: 0; 
            letter-spacing: 2px; 
        }
        .back-btn {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 8px 16px;
            color: #c9d1d9;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background-color: #1f2428;
            border-color: #58a6ff;
            color: #ffffff;
        }

        /* 12分割グリッド */
        .world-watch-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
        }
        .chart-box {
            background: #161b22;
            border-radius: 8px;
            border: 1px solid #30363d;
            overflow: hidden;
            height: 300px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: border-color 0.3s;
        }
        .chart-box:hover {
            border-color: #58a6ff;
        }
        
        .span-4 { grid-column: span 4; } /* 3等分用 */
        .span-3 { grid-column: span 3; } /* 4等分用 */

        .footer-tag { 
            text-align: center; 
            color: #484f58; 
            font-size: 11px; 
            margin-top: 40px; 
            padding-top: 20px;
            border-top: 1px solid #30363d;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Market Decagon <span style="color:#8b949e; font-size:14px;">- The Master's Secret View</span></h1>
            <a href="index.html" class="back-btn">🔙 表のポータルへ戻る</a>
        </header>

        <div class="world-watch-grid">
            <div class="chart-box span-4"><iframe src="https://s.tradingview.com/widgetembed/?symbol=TVC%3ANI225&interval=D&theme=dark&style=1&timezone=Etc%2FUTC&locale=ja" width="100%" height="100%" frameborder="0"></iframe></div>
            <div class="chart-box span-4"><iframe src="https://s.tradingview.com/widgetembed/?symbol=CME_MINI%3AES1!&interval=D&theme=dark&style=1&timezone=Etc%2FUTC&locale=ja" width="100%" height="100%" frameborder="0"></iframe></div>
            <div class="chart-box span-4"><iframe src="https://s.tradingview.com/widgetembed/?symbol=FX%3AUSDJPY&interval=D&theme=dark&style=1&timezone=Etc%2FUTC&locale=ja" width="100%" height="100%" frameborder="0"></iframe></div>

            <div class="chart-box span-4"><iframe src="https://s.tradingview.com/widgetembed/?symbol=TVC%3AUSOIL&interval=D&theme=dark&style=1&timezone=Etc%2FUTC&locale=ja" width="100%" height="100%" frameborder="0"></iframe></div>
            <div class="chart-box span-4"><iframe src="https://s.tradingview.com/widgetembed/?symbol=OANDA%3AXAUUSD&interval=D&theme=dark&style=1&timezone=Etc%2FUTC&locale=ja" width="100%" height="100%" frameborder="0"></iframe></div>
            <div class="chart-box span-4"><iframe src="https://s.tradingview.com/widgetembed/?symbol=TVC%3AUS10Y&interval=D&theme=dark&style=1&timezone=Etc%2FUTC&locale=ja" width="100%" height="100%" frameborder="0"></iframe></div>

            <div class="chart-box span-3"><iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE%3ABTCUSDT&interval=D&theme=dark&style=1&timezone=Etc%2FUTC&locale=ja" width="100%" height="100%" frameborder="0"></iframe></div>
            <div class="chart-box span-3"><iframe src="https://s.tradingview.com/widgetembed/?symbol=TVC%3AVIX&interval=D&theme=dark&style=1&timezone=Etc%2FUTC&locale=ja" width="100%" height="100%" frameborder="0"></iframe></div>
            <div class="chart-box span-3"><iframe src="https://s.tradingview.com/widgetembed/?symbol=FX%3AEURUSD&interval=D&theme=dark&style=1&timezone=Etc%2FUTC&locale=ja" width="100%" height="100%" frameborder="0"></iframe></div>
            <div class="chart-box span-3"><iframe src="https://s.tradingview.com/widgetembed/?symbol=TVC%3AJP10Y&interval=D&theme=dark&style=1&timezone=Etc%2FUTC&locale=ja" width="100%" height="100%" frameborder="0"></iframe></div>
        </div>

        <div class="footer-tag">
            Market Decagon V1.0 - Built for the Master Mind<br>
            <span style="color: #58a6ff; font-size: 12px; display: inline-block; margin-top: 5px;">Powered by IT Secretary Sophie</span>
        </div>
    </div>
</body>
</html>
