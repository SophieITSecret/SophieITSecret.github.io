<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Market Decagon V2.0 - Zoom Edition</title>
    <style>
        body { 
            font-family: "Helvetica Neue", Arial, sans-serif; 
            background-color: #0d1117; 
            color: #c9d1d9; 
            padding: 20px; 
            margin: 0; 
        }
        .container { 
            max-width: 1600px; 
            margin: 0 auto; 
        }
        header { 
            border-bottom: 2px solid #30363d; 
            margin-bottom: 25px; 
            padding-bottom: 15px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { 
            color: #f85149; 
            font-size: 24px; 
            text-transform: uppercase; 
            margin: 0; 
            letter-spacing: 2px; 
        }
        .back-btn {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 8px 16px;
            color: #c9d1d9;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background-color: #1f2428;
            border-color: #58a6ff;
            color: #ffffff;
        }

        .world-watch-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
        }
        .chart-box {
            background: #161b22;
            border-radius: 8px;
            border: 1px solid #30363d;
            overflow: hidden;
            height: 300px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: border-color 0.3s;
            position: relative; /* ズームボタンを配置するための魔法 */
        }
        .chart-box:hover {
            border-color: #58a6ff;
        }
        
        /* 🔍ズームボタンの装飾 */
        .zoom-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(13, 17, 23, 0.8);
            border: 1px solid #58a6ff;
            color: #58a6ff;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            z-index: 10;
            display: none; /* 普段は隠しておく */
            transition: all 0.2s;
        }
        .chart-box:hover .zoom-btn {
            display: block; /* マウスを乗せたら表示 */
        }
        .zoom-btn:hover {
            background: #58a6ff;
            color: #ffffff;
        }

        .span-4 { grid-column: span 4; } 
        .span-3 { grid-column: span 3; } 

        .footer-tag { 
            text-align: center; 
            color: #484f58; 
            font-size: 11px; 
            margin-top: 40px; 
            padding-top: 20px;
            border-top: 1px solid #30363d;
        }

        /* 巨大化用ポップアップ（モーダル）の装飾 */
        #zoom-modal {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.95);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #zoom-iframe {
            width: 90%;
            height: 85%;
            border: 2px solid #58a6ff;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.3);
        }
        .close-btn {
            margin-bottom: 15px;
            background: transparent;
            border: 1px solid #f85149;
            color: #f85149;
            padding: 8px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }
        .close-btn:hover {
            background: #f85149;
            color: #ffffff;
        }
    </style>
</head>
<body>

        <div class="footer-tag">
            Market Decagon V2.0 - Built for the Master Mind<br>
            <span style="color: #58a6ff; font-size: 12px; display: inline-block; margin-top: 5px;">Powered by IT Secretary Sophie</span>
        </div>
    </div>

    <div id="zoom-modal">
        <button class="close-btn" onclick="closeZoom()">✖ 閉じる</button>
        <iframe id="zoom-iframe" src="" frameborder="0"></iframe>
    </div>

    <script>
        function openZoom(url) {
            document.getElementById('zoom-iframe').src = url;
            document.getElementById('zoom-modal').style.display = 'flex';
        }
        function closeZoom() {
            document.getElementById('zoom-modal').style.display = 'none';
            document.getElementById('zoom-iframe').src = '';
        }
    </script>
</body>
</html>
