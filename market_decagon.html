        .container { max-width: 1600px; margin: 0 auto; }
        header { border-bottom: 2px solid #30363d; margin-bottom: 25px; padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: #f85149; font-size: 24px; text-transform: uppercase; margin: 0; letter-spacing: 2px; }

        .back-btn:hover { border-color: #58a6ff; color: #ffffff; }

        .world-watch-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; }
        .chart-box { background: #161b22; border-radius: 8px; border: 1px solid #30363d; overflow: hidden; height: 300px; position: relative; transition: 0.3s; }
        .chart-box:hover { border-color: #58a6ff; }
        
        .zoom-btn { position: absolute; top: 10px; right: 10px; background: rgba(13, 17, 23, 0.85); border: 1px solid #58a6ff; color: #58a6ff; padding: 5px 10px; border-radius: 4px; cursor: pointer; z-index: 10; display: none; }
        .chart-box:hover .zoom-btn { display: block; }
        .span-4 { grid-column: span 4; } .span-3 { grid-column: span 3; }

        #zoom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 17, 23, 0.98); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #zoom-iframe { width: 92%; height: 85%; border: 1px solid #58a6ff; border-radius: 8px; }
        .close-btn { margin-bottom: 15px; background: transparent; border: 1px solid #f85149; color: #f85149; padding: 8px 24px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
