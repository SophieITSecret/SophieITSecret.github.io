<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sophie IT Secret - 御三家ウォッチャー</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }
        h1 {
            color: #58a6ff;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        p.subtitle {
            color: #8b949e;
            margin-bottom: 40px;
            font-size: 0.9em;
        }
        .news-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
        }
        .news-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            width: 300px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        /* 各紙のブランドカラー */
        .card-nyt { border-top: 4px solid #ffffff; }
        .card-wsj { border-top: 4px solid #58a6ff; }
        .card-wapo { border-top: 4px solid #8b949e; }
        
        h2 {
            font-size: 1.2em;
            margin-top: 0;
            margin-bottom: 15px;
            color: #ffffff;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li {
            margin-bottom: 12px;
            font-size: 0.95em;
            line-height: 1.4;
        }
        a {
            color: #c9d1d9;
            text-decoration: none;
            transition: color 0.2s;
        }
        a:hover {
            color: #58a6ff;
        }
        .date {
            display: block;
            font-size: 0.75em;
            color: #8b949e;
            margin-top: 3px;
        }
        .loading {
            text-align: center;
            color: #8b949e;
            font-size: 0.9em;
        }
        .back-btn {
            margin-top: 40px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 10px 20px;
            color: #c9d1d9;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background-color: #1f2428;
            border-color: #58a6ff;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <h1>The Big 3 Watcher</h1>
    <p class="subtitle">NYT / WSJ / WaPo - World News Radar</p>

    <div class="news-container">
        <div class="news-card card-nyt">
            <h2>📰 New York Times</h2>
            <div id="nyt-feed" class="loading">📡 フィード傍受中...</div>
        </div>

        <div class="news-card card-wsj">
            <h2>📈 Wall Street Journal</h2>
            <div id="wsj-feed" class="loading">📡 最終兵器（corsproxy）で潜入中...</div>
        </div>

        <div class="news-card card-wapo">
            <h2>🏛 Washington Post</h2>
            <div id="wapo-feed" class="loading">📡 フィード傍受中...</div>
        </div>
    </div>

    <a href="index.html" class="back-btn">🔙 ポータルへ戻る</a>

    <script>
        // 成功しているNYTとWaPoのルート
        const feeds = {
            nyt: 'https://rss.nytimes.com/services/xml/rss/nyt/World.xml',
            wapo: 'https://feeds.washingtonpost.com/rss/world'
        };

        // NYTとWaPo用の取得関数（rss2jsonを使用）
        function fetchStandardRSS(id, url) {
            const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`;
            fetch(api)
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'ok') {
                        let html = '<ul>';
                        data.items.slice(0, 5).forEach(item => {
                            const date = new Date(item.pubDate).toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute:'2-digit' });
                            html += `<li><a href="${item.link}" target="_blank">${item.title}</a><span class="date">${date}</span></li>`;
                        });
                        html += '</ul>';
                        document.getElementById(`${id}-feed`).innerHTML = html;
                    } else {
                        document.getElementById(`${id}-feed`).innerHTML = '⚠️ 傍受失敗';
                    }
                })
                .catch(error => {
                    document.getElementById(`${id}-feed`).innerHTML = '⚠️ 通信エラー';
                });
        }

        // WSJ専用の最終兵器（corsproxy.io ＋ DOMParser）
        function fetchWSJ_FinalWeapon() {
            // Google News内のWSJ（ワールドニュース）
            const targetUrl = 'https://news.google.com/rss/search?q=site:wsj.com+World&hl=en-US&gl=US&ceid=US:en';
            // 最強のCORS突破プロキシを使用
            const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);

            fetch(proxyUrl)
                .then(response => {
                    if (!response.ok) throw new Error("ネットワークエラー");
                    return response.text();
                })
                .then(str => new window.DOMParser().parseFromString(str, "text/xml"))
                .then(data => {
                    const items = data.querySelectorAll("item");
                    if (items.length === 0) {
                        document.getElementById('wsj-feed').innerHTML = '⚠️ 記事データが空です';
                        return;
                    }

                    let html = '<ul>';
                    for (let i = 0; i < Math.min(5, items.length); i++) {
                        const item = items[i];
                        let title = item.querySelector("title").textContent;
                        title = title.replace(' - The Wall Street Journal', '');
                        const link = item.querySelector("link").textContent;
                        const pubDate = item.querySelector("pubDate").textContent;
                        const date = new Date(pubDate).toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute:'2-digit' });

                        html += `<li><a href="${link}" target="_blank">${title}</a><span class="date">${date}</span></li>`;
                    }
                    html += '</ul>';
                    document.getElementById('wsj-feed').innerHTML = html;
                })
                .catch(error => {
                    document.getElementById('wsj-feed').innerHTML = '⚠️ 最終防壁に阻まれました';
                    console.error("WSJ Final Weapon Error:", error);
                });
        }

        // 部隊出撃！
        fetchStandardRSS('nyt', feeds.nyt);
        fetchStandardRSS('wapo', feeds.wapo);
        fetchWSJ_FinalWeapon(); // WSJ専用・最終兵器
    </script>
</body>
</html>
