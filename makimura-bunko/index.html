<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牧村文庫 蔵書検索</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Hiragino Kaku Gothic ProN", "Meiryo", Arial, sans-serif; background: #f0f2f5; color: #222; font-size: 16px; }

  header {
    background: linear-gradient(135deg, #1a3a6b 0%, #2d6a9f 100%);
    color: white; padding: 10px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: baseline; gap: 16px;
  }
  header h1 { font-size: 1.25em; letter-spacing: 0.05em; white-space: nowrap; }
  header p { font-size: 0.82em; opacity: 0.75; white-space: nowrap; }

  .search-bar {
    background: white; padding: 8px 20px;
    border-bottom: 1px solid #ddd;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    position: sticky; top: 43px; z-index: 99; box-shadow: 0 2px 6px rgba(0,0,0,0.07);
  }
  .search-bar input[type=text] {
    flex: 1; min-width: 180px; padding: 6px 12px; border: 1px solid #ccc;
    border-radius: 5px; font-size: 0.95em; outline: none;
  }
  .search-bar input[type=text]:focus { border-color: #2d6a9f; box-shadow: 0 0 0 2px rgba(45,106,159,0.2); }
  .search-bar select {
    padding: 6px 10px; border: 1px solid #ccc; border-radius: 5px;
    font-size: 0.9em; background: white; cursor: pointer; outline: none;
  }
  .search-bar select:focus { border-color: #2d6a9f; }
  .result-count { font-size: 0.82em; color: #666; margin-left: auto; white-space: nowrap; }
  .btn-reset { padding:6px 12px; border:1px solid #ccc; border-radius:5px; cursor:pointer; background:white; font-size:0.88em; color:#555; }
  .btn-reset:hover { background:#f5f5f5; }
  .btn-finalize {
    padding: 6px 14px; border: none; border-radius: 5px; cursor: pointer;
    background: #1a6b3a; color: white; font-size: 0.88em; font-weight: 600;
    white-space: nowrap;
  }
  .btn-finalize:hover { background: #2d9f5a; }
  .btn-finalize:disabled { background: #aaa; cursor: default; }

  .stats { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 20px 4px;
    position: sticky; top: 93px; z-index: 98;
    background: #f0f2f5; border-bottom: 1px solid #e0e4ea;
  }
  /* モバイルではスティッキー解除（縦スペース節約） */
  @media (max-width: 768px) {
    .stats { position: static; }
  }
  .stat-chip {
    padding: 3px 10px; border-radius: 20px; font-size: 0.78em;
    cursor: pointer; border: 2px solid transparent; transition: all 0.15s; font-weight: 500;
  }
  .stat-chip:hover { opacity: 0.85; }
  .stat-chip.active { border-color: #1a3a6b !important; box-shadow: 0 0 0 1px #1a3a6b; }
  .stat-chip.all { background: #1a3a6b; color: white; }

  .table-wrap { padding: 10px 20px 20px; }
  table {
    width: 100%; border-collapse: collapse; background: white;
    border-radius: 6px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    table-layout: fixed;
  }
  col.c-no     { width: 42px; }
  col.c-cat    { width: 158px; }
  col.c-title  { width: 32%; }
  col.c-author { width: 13%; }
  col.c-time   { width: 10%; }
  col.c-region { width: 8%; }
  col.c-detail { width: auto; }
  col.c-edit   { width: 32px; }

  thead tr { background: #1a3a6b; color: white; }
  thead th { padding: 7px 10px; text-align: left; font-size: 0.82em; font-weight: 600; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid #eee; transition: background 0.12s; }
  tbody tr:nth-child(5n) { border-bottom: 1.5px solid #b8cce4; }
  tbody tr:hover { background: #f5f9ff; }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 5px 10px; font-size: 1.02em; vertical-align: middle; overflow: hidden; }
  td.no { color: #aaa; font-size: 0.78em; text-align: center; }
  td.title a { color: #1a3a6b; text-decoration: none; font-weight: 500; }
  td.title a:hover { text-decoration: underline; color: #2d6a9f; }
  td.title .no-link { color: #333; }
  td.author { color: #444; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  td.tags { font-size: 0.82em; overflow: hidden; }
  td.tags span { display: inline-block; border-radius: 3px; padding: 1px 4px; margin: 1px 2px 1px 0; white-space: nowrap; }
  span.time   { background: #fff3e0; color: #e65100; }
  span.region { background: #e8f5e9; color: #2e7d32; }
  span.detail { background: #f3e5f5; color: #6a1b9a; }

  .badge {
    display: inline-block; font-size: 0.72em; padding: 2px 6px;
    border-radius: 10px; font-weight: 600; white-space: nowrap;
  }
  .c01{background:#dbeafe;color:#1d4ed8}.c02{background:#fef3c7;color:#92400e}
  .c03{background:#d1fae5;color:#065f46}.c04{background:#ede9fe;color:#5b21b6}
  .c05{background:#fee2e2;color:#991b1b}.c06{background:#ffedd5;color:#9a3412}
  .c07{background:#ecfccb;color:#3f6212}.c08{background:#e0e7ff;color:#3730a3}
  .c09{background:#fce7f3;color:#9d174d}.c10{background:#f3f4f6;color:#374151}

  td.edit-cell { text-align: center; padding: 4px 6px; }
  .btn-edit {
    background: none; border: none; cursor: pointer; opacity: 0;
    font-size: 0.85em; color: #888; padding: 2px 4px; border-radius: 3px;
    transition: opacity 0.15s, background 0.15s;
  }
  tr:hover .btn-edit { opacity: 1; }
  .btn-edit:hover { background: #e8f0fe; color: #1a3a6b; }
  /* タッチデバイス(iPad等)では常時表示 */
  @media (hover: none) {
    .btn-edit { opacity: 0.45; }
    .btn-edit:active { background: #e8f0fe; color: #1a3a6b; opacity: 1; }
  }

  .modal-bg {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 1000; align-items: center; justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: white; border-radius: 10px; padding: 24px;
    width: 480px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }
  .modal h3 { font-size: 1em; color: #1a3a6b; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
  .modal-title-preview { font-size: 0.85em; color: #555; margin-bottom: 16px; background: #f8f9fa; padding: 6px 10px; border-radius: 4px; }
  .form-row { margin-bottom: 12px; }
  .form-row label { display: block; font-size: 0.82em; color: #555; margin-bottom: 4px; font-weight: 600; }
  .form-row select, .form-row input[type=text] {
    width: 100%; padding: 7px 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 0.93em; outline: none;
  }
  .form-row select:focus, .form-row input[type=text]:focus { border-color: #2d6a9f; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
  .btn-save   { padding: 8px 20px; background: #1a3a6b; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.93em; }
  .btn-save:hover { background: #2d6a9f; }
  .btn-cancel { padding: 8px 16px; background: white; color: #555; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; font-size: 0.93em; }
  .btn-cancel:hover { background: #f5f5f5; }
  .btn-reset-edit { padding: 8px 14px; background: white; color: #c0392b; border: 1px solid #e0b0b0; border-radius: 6px; cursor: pointer; font-size: 0.88em; margin-right: auto; }
  .btn-reset-edit:hover { background: #fff5f5; }

  /* 確定ダイアログ */
  .confirm-modal {
    background: white; border-radius: 10px; padding: 28px;
    width: 440px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }
  .confirm-modal h3 { font-size: 1em; color: #1a6b3a; margin-bottom: 12px; }
  .confirm-modal p { font-size: 0.9em; color: #444; line-height: 1.6; margin-bottom: 8px; }
  .confirm-modal .note { font-size: 0.82em; color: #888; background: #f8f9fa; padding: 8px 12px; border-radius: 4px; margin: 12px 0; }
  .confirm-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-confirm { padding: 9px 22px; background: #1a6b3a; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95em; font-weight: 600; }
  .btn-confirm:hover { background: #2d9f5a; }

  /* タグチップピッカー */
  .chip-picker { display: flex; flex-wrap: wrap; gap: 6px; padding: 4px 0; }
  .chip-pick {
    padding: 4px 10px; border-radius: 14px; font-size: 0.82em; cursor: pointer;
    border: 1.5px solid #ccc; background: #f5f5f5; color: #555;
    transition: all 0.12s; user-select: none;
  }
  .chip-pick.selected { border-color: #1a3a6b; background: #dbeafe; color: #1d4ed8; font-weight: 600; }
  .chip-pick:hover { border-color: #2d6a9f; }

  /* 詳細タグエリア */
  .detail-tag-area { display: flex; flex-direction: column; gap: 7px; }
  .detail-selected { display: flex; flex-wrap: wrap; gap: 5px; min-height: 28px; }
  .detail-selected-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 12px; font-size: 0.82em;
    background: #f3e5f5; color: #6a1b9a; border: 1px solid #ce93d8;
  }
  .detail-selected-chip button {
    background: none; border: none; cursor: pointer; color: #9c27b0;
    font-size: 0.9em; padding: 0 2px; line-height: 1;
  }
  .detail-input-row { display: flex; gap: 6px; }
  .detail-input-row input { flex: 1; padding: 6px 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 0.9em; outline: none; }
  .detail-input-row input:focus { border-color: #2d6a9f; }
  .btn-add-tag { padding: 6px 12px; background: #2d6a9f; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 0.85em; white-space: nowrap; }
  .btn-add-tag:hover { background: #1a3a6b; }
  .detail-existing-label { font-size: 0.78em; color: #888; margin-top: 2px; }
  .detail-existing {
    display: flex; flex-wrap: wrap; gap: 5px;
    max-height: 120px; overflow-y: auto; padding: 4px 0;
    border-top: 1px solid #eee; padding-top: 6px;
  }
  .detail-exist-chip {
    padding: 3px 8px; border-radius: 12px; font-size: 0.78em; cursor: pointer;
    background: #f8f0ff; color: #7b1fa2; border: 1px solid #e1bee7;
    transition: all 0.1s;
  }
  .detail-exist-chip:hover { background: #f3e5f5; border-color: #9c27b0; }
  .detail-exist-chip.used { opacity: 0.4; cursor: default; }

  .edited-mark { font-size: 0.7em; color: #e67e22; margin-left: 4px; }
  .empty { text-align: center; padding: 50px; color: #999; font-size: 1em; }
  footer { text-align: center; padding: 16px; color: #aaa; font-size: 0.78em; }
  .pagination { display:flex; align-items:center; justify-content:center; gap:8px; padding:10px 20px 14px; flex-wrap:wrap; }
  .pagination button { padding:5px 12px; border:1px solid #ccc; border-radius:4px; background:white; cursor:pointer; font-size:0.88em; color:#333; }
  .pagination button:hover:not(:disabled) { background:#e8f0fb; border-color:#2d6a9f; }
  .pagination button:disabled { opacity:0.35; cursor:default; }
  .pagination button.active { background:#1a3a6b; color:white; border-color:#1a3a6b; font-weight:bold; }
  .pagination .pg-info { font-size:0.82em; color:#666; }

  /* ===== サイドパネル ===== */
  .app-layout { display: flex; height: calc(100vh - 43px); overflow: hidden; position: relative; }
  .main-col { flex: 1; overflow-y: auto; min-width: 0; }
  .preview-panel {
    width: 0; min-width: 0; overflow: hidden;
    transition: width 0.25s ease, min-width 0.25s ease;
    border-left: 1px solid #d0d8e8;
    background: #f8faff;
    display: flex; flex-direction: column;
    position: relative;
  }
  .preview-panel.open { width: 45%; min-width: 320px; }
  .preview-header {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; background: #1a3a6b; color: white;
    font-size: 0.82em; flex-shrink: 0;
  }
  .preview-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
  .preview-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .preview-btn {
    padding: 3px 8px; border: 1px solid rgba(255,255,255,0.4); border-radius: 4px;
    background: rgba(255,255,255,0.12); color: white; cursor: pointer; font-size: 0.82em;
    text-decoration: none; white-space: nowrap;
  }
  .preview-btn:hover { background: rgba(255,255,255,0.25); }
  .preview-iframe-wrap { flex: 1; position: relative; }
  .preview-iframe-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
  .preview-placeholder {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    color: #aaa; font-size: 0.9em; text-align: center; padding: 20px;
  }
  .preview-placeholder .icon { font-size: 2.5em; }

  @media (max-width: 900px) {
    .app-layout { flex-direction: column; height: auto; overflow: visible; }
    .main-col { overflow-y: visible; }
    .preview-panel { width: 100% !important; min-width: 0 !important; border-left: none; border-top: 2px solid #1a3a6b; }
    .preview-panel.open { height: 60vh; }
    .preview-panel:not(.open) { height: 0; }
  }

  .btn-preview-inline {
    display: inline-block; margin-left: 6px; opacity: 0;
    font-size: 0.75em; padding: 1px 5px; border-radius: 3px;
    background: #e8f0fe; color: #1a3a6b; border: 1px solid #c5d8f8;
    cursor: pointer; vertical-align: middle; white-space: nowrap;
    transition: opacity 0.12s;
  }
  tr:hover .btn-preview-inline { opacity: 1; }
  @media (hover: none) { .btn-preview-inline { opacity: 0.5; } }


  /* ===== ログイン画面 ===== */
  #login-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(135deg, #1a3a6b 0%, #2d6a9f 100%);
    display: flex; align-items: center; justify-content: center;
  }
  #login-screen.hidden { display: none; }
  .login-box {
    background: white; border-radius: 14px; padding: 40px 44px;
    width: 360px; max-width: 92vw;
    box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    text-align: center;
  }
  .login-box h2 { font-size: 1.25em; color: #1a3a6b; margin-bottom: 6px; }
  .login-box p  { font-size: 0.85em; color: #888; margin-bottom: 24px; }
  .login-box input[type=password] {
    width: 100%; padding: 12px 16px; font-size: 1.1em;
    border: 2px solid #ccc; border-radius: 8px; outline: none;
    text-align: center; letter-spacing: 0.2em;
    margin-bottom: 14px;
  }
  .login-box input[type=password]:focus { border-color: #2d6a9f; }
  .login-btn {
    width: 100%; padding: 12px; background: #1a3a6b; color: white;
    border: none; border-radius: 8px; font-size: 1em; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .login-btn:hover { background: #2d6a9f; }
  .login-error { color: #c0392b; font-size: 0.85em; margin-top: 10px; min-height: 1.2em; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2>📚 牧村文庫</h2>
    <p>蔵書検索システム</p>
    <input type="password" id="login-pw" placeholder="パスワード"
      onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<header>
  <h1>📚 牧村文庫 蔵書検索</h1>
  <p id="header-count">— 全1,198冊</p>
</header>

<div class="stats" id="stats-bar"></div>

<div class="search-bar">
  <input type="text" id="search-input" placeholder="🔍 書名・著者で検索..." oninput="filterBooksDebounced()">
  <select id="cat-filter" onchange="filterBooks()">
    <option value="">── 大分類（全て）──</option>
    <option value="01">01 日本史</option><option value="02">02 東洋史</option>
    <option value="03">03 西洋史</option><option value="04">04 世界史</option>
    <option value="05">05 軍事・インテリG</option><option value="06">06 政治・地政学</option>
    <option value="07">07 経済・統計</option><option value="08">08 思想・芸術・宗教</option>
    <option value="09">09 文学・エンタメ</option><option value="10">10 その他</option>
  </select>
  <select id="time-filter" onchange="filterBooks()">
    <option value="">── 時代（全て）──</option>
    <option value="#古代">古代</option><option value="#中世近世">中世近世</option>
    <option value="#近代">近代</option><option value="#昭和前期">昭和前期</option>
    <option value="#昭和後期以降">昭和後期以降</option><option value="#通史">通史</option>
  </select>
  <select id="region-filter" onchange="filterBooks()">
    <option value="">── 領域（全て）──</option>
    <option value="#日本">日本</option><option value="#東洋">東洋</option>
    <option value="#西洋">西洋</option><option value="#世界">世界</option>
  </select>
  <button class="btn-reset" onclick="clearFilters()">✕ リセット</button>
  <button class="btn-finalize" id="btn-finalize" onclick="openConfirm()" disabled>📥 確定・上書き</button>
  <span class="result-count" id="result-count"></span>
</div>

<div class="app-layout"><div class="main-col"><div class="table-wrap">
  <table id="book-table">
    <colgroup>
      <col class="c-no"><col class="c-cat"><col class="c-title">
      <col class="c-author"><col class="c-edit"><col class="c-time"><col class="c-region">
      <col class="c-detail">
    </colgroup>
    <thead>
      <tr>
        <th>No.</th><th>分類</th><th>書名</th><th>著者</th>
        <th></th><th>時代</th><th>領域</th><th>詳細タグ</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
  <div class="empty" id="empty-msg" style="display:none">該当する書籍が見つかりません</div>
  <div class="pagination" id="pagination"></div>
</div>

<footer>牧村文庫 蔵書目録 — 全1,198冊 — Powered by Claude</footer>
</div><!-- /main-col -->

<!-- サイドプレビューパネル -->
<div class="preview-panel" id="preview-panel">
  <div class="preview-header">
    <span class="preview-title" id="preview-title">プレビュー</span>
    <div class="preview-actions">
      <a class="preview-btn" id="preview-newtab" href="#" target="_blank">🔗 新タブ</a>
      <button class="preview-btn" onclick="closePreview()">✕ 閉じる</button>
    </div>
  </div>
  <div class="preview-iframe-wrap">
    <div class="preview-placeholder" id="preview-placeholder">
      <span class="icon">📄</span>
      <span>書名をクリックするとここでプレビューします</span>
    </div>
    <iframe id="preview-iframe" src="about:blank" allowfullscreen style="display:none"></iframe>
  </div>
</div>
</div><!-- /app-layout -->

<!-- 編集モーダル -->
<div class="modal-bg" id="edit-modal">
  <div class="modal">
    <h3>✏️ 分類・タグを編集</h3>
    <div class="modal-title-preview" id="edit-book-title"></div>
    <div class="form-row">
      <label>書名</label>
      <input type="text" id="edit-title" placeholder="書名を編集">
    </div>
    <div class="form-row">
      <label>著者名</label>
      <input type="text" id="edit-author" placeholder="著者名を入力（空欄の場合も追記可）">
    </div>
    <div class="form-row">
      <label>大分類</label>
      <select id="edit-cat">
        <option value="01">01 日本史</option><option value="02">02 東洋史</option>
        <option value="03">03 西洋史</option><option value="04">04 世界史</option>
        <option value="05">05 軍事・インテリジェンス</option><option value="06">06 政治・地政学</option>
        <option value="07">07 経済・統計</option><option value="08">08 思想・芸術・宗教</option>
        <option value="09">09 文学・エンタメ</option><option value="10">10 その他</option>
      </select>
    </div>
    <div class="form-row">
      <label>時代タグ</label>
      <div class="chip-picker" id="time-picker"></div>
      <input type="hidden" id="edit-time">
    </div>
    <div class="form-row">
      <label>領域タグ</label>
      <div class="chip-picker" id="region-picker"></div>
      <input type="hidden" id="edit-region">
    </div>
    <div class="form-row">
      <label>詳細タグ</label>
      <div class="detail-tag-area">
        <div class="detail-selected" id="detail-selected"></div>
        <div class="detail-input-row">
          <input type="text" id="detail-new-input" placeholder="新しいタグを入力（Enterで追加）" autocomplete="off">
          <button type="button" class="btn-add-tag" onclick="addDetailTagFromInput()">追加</button>
        </div>
        <div class="detail-existing-label">既存タグから選択：</div>

const CAT_NAMES = {
  "01":"日本史","02":"東洋史","03":"西洋史","04":"世界史",
  "05":"軍事・インテリG","06":"政治・地政学","07":"経済・統計",
  "08":"思想・芸術・宗教","09":"文学・エンタメ","10":"その他"
};

const EDITS_KEY = "makimura_bunko_edits";
const PAGE_SIZE = 50;
let currentPage = 1;
let filteredBooks = [];
let _filterTimer = null;
function filterBooksDebounced() {
  clearTimeout(_filterTimer);
  _filterTimer = setTimeout(filterBooks, 220);
}
// ##EDITS_START##
let edits = {};
// ##EDITS_END##
try { const saved = localStorage.getItem(EDITS_KEY); if (saved) edits = Object.assign(edits, JSON.parse(saved)); } catch(e) {}

function saveEditsToStorage() {
  try { localStorage.setItem(EDITS_KEY, JSON.stringify(edits)); } catch(e) {}
}
function getBook(no) {
  const base = BOOKS.find(b => b.no === no);
  if (!base) return null;
  const e = edits[no];
  return e ? Object.assign({}, base, e, {_edited: true}) : base;
}

function buildStatsBar() {
  const counts = {};
  BOOKS.forEach(b => { const cat = (edits[b.no]&&edits[b.no].cat)||b.cat; counts[cat]=(counts[cat]||0)+1; });
  const bar = document.getElementById("stats-bar");
  let html = `<span class="stat-chip all" onclick="setCatFilter('')">全て (${BOOKS.length})</span>`;
  Object.entries(CAT_NAMES).forEach(([code, name]) => {
    const cnt = counts[code]||0;
    html += `<span class="stat-chip c${code}" id="chip-${code}" onclick="setCatFilter('${code}')">${code} ${name} (${cnt})</span>`;
  });
  bar.innerHTML = html;
}

function setCatFilter(cat) { document.getElementById("cat-filter").value = cat; filterBooks(); }
function clearFilters() {
  ["search-input","cat-filter","time-filter","region-filter"].forEach(id => {
    document.getElementById(id).value = "";
  });
  filterBooks();
}


// ===== プレビューパネル =====
let currentPreviewId = null;
function openPreview(fileId, title) {
  if (!fileId) return;
  const panel = document.getElementById("preview-panel");
  const iframe = document.getElementById("preview-iframe");
  const placeholder = document.getElementById("preview-placeholder");
  const titleEl = document.getElementById("preview-title");
  const newtab = document.getElementById("preview-newtab");

  currentPreviewId = fileId;
  const previewUrl = `https://drive.google.com/file/d/${fileId}/preview`;
  const downloadUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;

  titleEl.textContent = title;
  newtab.href = downloadUrl;
  iframe.src = previewUrl;
  iframe.style.display = "block";
  placeholder.style.display = "none";
  panel.classList.add("open");

  // スマホ: パネルまでスクロール
  if (window.innerWidth <= 900) {
    panel.scrollIntoView({ behavior: "smooth" });
  }
}
function closePreview() {
  const panel = document.getElementById("preview-panel");
  const iframe = document.getElementById("preview-iframe");
  const placeholder = document.getElementById("preview-placeholder");
  panel.classList.remove("open");
  iframe.src = "about:blank";
  iframe.style.display = "none";
  placeholder.style.display = "flex";
  currentPreviewId = null;
}

function filterBooks() {
  const q = document.getElementById("search-input").value.toLowerCase();
  const cat = document.getElementById("cat-filter").value;
  const time = document.getElementById("time-filter").value;
  const region = document.getElementById("region-filter").value;

  document.querySelectorAll(".stat-chip").forEach(c => c.classList.remove("active"));
  const chip = cat ? document.getElementById("chip-"+cat) : document.querySelector(".stat-chip.all");
  if (chip) chip.classList.add("active");

  const filtered = BOOKS.map(b => getBook(b.no)).filter(b => {
    if (!b) return false;
    if (cat && b.cat !== cat) return false;
    if (time && !(b.time||"").includes(time)) return false;
    if (region && !(b.region||"").includes(region)) return false;
    if (q) {
      const haystack = (b.title+" "+b.author+" "+b.detail).toLowerCase();
      const terms = q.trim().split(/\s+/);
      if (!terms.every(t => haystack.includes(t))) return false;
    }
    return true;
  });

  currentPage = 1;
  renderTable(filtered);
  const editCount = Object.keys(edits).length;
  let countStr = `${filtered.length}件 / ${BOOKS.length}件`;
  if (editCount > 0) countStr += `　✏️ ${editCount}件編集済み`;
  document.getElementById("result-count").textContent = countStr;
  document.getElementById("btn-finalize").disabled = (editCount === 0);
}

function renderTable(books) {
  filteredBooks = books;
  renderPage();
}
function renderPage() {
  const tbody = document.getElementById("table-body");
  const empty = document.getElementById("empty-msg");
  const pg    = document.getElementById("pagination");
  if (filteredBooks.length === 0) { tbody.innerHTML = ""; empty.style.display = "block"; if(pg) pg.innerHTML = ""; return; }
  empty.style.display = "none";
  const totalPages = Math.ceil(filteredBooks.length / PAGE_SIZE);
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PAGE_SIZE;
  const books = filteredBooks.slice(start, start + PAGE_SIZE);
  tbody.innerHTML = books.map(b => {
    const mark = b._edited ? '<span class="edited-mark">✏</span>' : '';
    const fileId = b.url ? (b.url.match(/id=([^&]+)/)||[])[1] : null;
    const titleCell = b.url
      ? `<span class="no-link" style="cursor:pointer;color:#1a3a6b;font-weight:500" onclick="openPreview('${fileId}','${esc(b.title).replace(/'/g,"&#39;")}')">${esc(b.title)}</span><button class="btn-preview-inline" onclick="openPreview('${fileId}','${esc(b.title).replace(/'/g,"&#39;")}')">👁 プレビュー</button>${mark}`
      : `<span class="no-link">${esc(b.title)}</span>${mark}`;
    const tt = (b.time||"").split(" ").filter(Boolean).map(t=>`<span class="time">${t}</span>`).join("");
    const rt = (b.region||"").split(" ").filter(Boolean).map(t=>`<span class="region">${t}</span>`).join("");
    const dt = (b.detail||"").split(" ").filter(Boolean).map(t=>`<span class="detail">${t}</span>`).join("");
    return `<tr>
      <td class="no">${b.no}</td>
      <td class="cat"><span class="badge c${b.cat}">${b.cat} ${CAT_NAMES[b.cat]||b.cat}</span></td>
      <td class="title">${titleCell}</td>
      <td class="author">${esc(b.author)}</td>
      <td class="edit-cell"><button class="btn-edit" onclick="openEdit(${b.no})" title="編集">✏️</button></td>
      <td class="tags">${tt}</td>
      <td class="tags">${rt}</td>
      <td class="tags">${dt}</td>
    </tr>`;
  }).join("");
  // ページネーションUI
  if (!pg) return;
  if (totalPages <= 1) { pg.innerHTML = ""; return; }
  let btns = `<span class="pg-info">${filteredBooks.length}件中 ${start+1}〜${Math.min(start+PAGE_SIZE, filteredBooks.length)}件</span>`;
  btns += `<button onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>◀ 前</button>`;
  const range = 3;
  let lo = Math.max(1, currentPage-range), hi = Math.min(totalPages, currentPage+range);
  if (lo > 1) btns += `<button onclick="goPage(1)">1</button>${lo>2?'<span>…</span>':''}`;
  for (let p=lo; p<=hi; p++) {
    btns += `<button class="${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  }
  if (hi < totalPages) btns += `${hi<totalPages-1?'<span>…</span>':''}<button onclick="goPage(${totalPages})">${totalPages}</button>`;
  btns += `<button onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>次 ▶</button>`;
  pg.innerHTML = btns;
}
function goPage(p) {
  const totalPages = Math.ceil(filteredBooks.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderPage();
  window.scrollTo(0, 0);
}

// --- 編集モーダル ---
let editingNo = null;
function openEdit(no) {
  const b = getBook(no);
  if (!b) return;
  editingNo = no;
  document.getElementById("edit-book-title").textContent = `No.${no}「${b.title}」`;
  document.getElementById("edit-title").value = b.title||"";
  document.getElementById("edit-author").value = b.author||"";
  document.getElementById("edit-cat").value = b.cat;
  buildTimePicker(b.time||"");
  buildRegionPicker(b.region||"");
  buildDetailPicker(b.detail||"");
  document.getElementById("edit-modal").classList.add("open");
}
function closeModal() { document.getElementById("edit-modal").classList.remove("open"); editingNo = null; }
function saveEdit() {
  if (!editingNo) return;
  const title = document.getElementById("edit-title").value.trim();
  const author = document.getElementById("edit-author").value.trim();
  const cat = document.getElementById("edit-cat").value;
  const time = readChipPicker("time-picker");
  const region = readChipPicker("region-picker");
  const detail = readDetailTags();
  const orig = BOOKS.find(b => b.no === editingNo);
  if (orig && orig.title===title && orig.author===author && orig.cat===cat && orig.time===time && orig.region===region && orig.detail===detail) {
    delete edits[editingNo];
  } else {
    edits[editingNo] = { title, author, cat, time, region, detail };
  }
  saveEditsToStorage();
  closeModal();
  buildStatsBar();
  filterBooks();
}
function resetEdit() {
  if (!editingNo) return;
  delete edits[editingNo];
  saveEditsToStorage();
  closeModal();
  buildStatsBar();
  filterBooks();
}

// --- タグチップピッカー ---
const TIME_TAGS = ["#古代","#中世近世","#近代","#昭和前期","#昭和後期以降","#通史"];
const REGION_TAGS = ["#日本","#東洋","#西洋","#世界"];

// 全詳細タグを BOOKS から収集（ページロード後に使用）
function getAllDetailTags() {
  const tagSet = new Set();
  BOOKS.forEach(b => {
    ((b.detail||"").split(" ")).forEach(t => { if (t.trim()) tagSet.add(t.trim()); });
  });
  // edits からも収集
  Object.values(edits).forEach(e => {
    if (e.detail) e.detail.split(" ").forEach(t => { if (t.trim()) tagSet.add(t.trim()); });
  });
  return [...tagSet].sort((a,b) => a.localeCompare(b, "ja"));
}

function buildChipPicker(containerId, options, selectedStr) {
  const selected = new Set((selectedStr||"").split(" ").filter(Boolean));
  const c = document.getElementById(containerId);
  c.innerHTML = options.map(t =>
    `<span class="chip-pick${selected.has(t)?' selected':''}" onclick="toggleChip(this,'${containerId}')">${t}</span>`
  ).join("");
}
function buildTimePicker(selectedStr) { buildChipPicker("time-picker", TIME_TAGS, selectedStr); }
function buildRegionPicker(selectedStr) { buildChipPicker("region-picker", REGION_TAGS, selectedStr); }

function toggleChip(el, containerId) {
  el.classList.toggle("selected");
}
function readChipPicker(containerId) {
  return [...document.querySelectorAll(`#${containerId} .chip-pick.selected`)]
    .map(el => el.textContent).join(" ");
}

// 詳細タグピッカー
let currentDetailTags = [];
function buildDetailPicker(selectedStr) {
  currentDetailTags = (selectedStr||"").split(" ").filter(Boolean);
  renderDetailSelected();
  renderDetailExisting();
  document.getElementById("detail-new-input").value = "";
}
function renderDetailSelected() {
  const c = document.getElementById("detail-selected");
  c.innerHTML = currentDetailTags.map((t,i) =>
    `<span class="detail-selected-chip">${esc(t)}<button onclick="removeDetailTag(${i})" title="削除">✕</button></span>`
  ).join("");
  document.getElementById("edit-detail").value = currentDetailTags.join(" ");
}
function renderDetailExisting() {
  const all = getAllDetailTags();
  const c = document.getElementById("detail-existing");
  c.innerHTML = all.map(t => {
    const used = currentDetailTags.includes(t);
    return `<span class="detail-exist-chip${used?' used':''}" onclick="addDetailTag('${t.replace(/'/g,"\'")}',this)">${esc(t)}</span>`;
  }).join("");
}
function addDetailTag(tag, el) {
  if (currentDetailTags.includes(tag)) return;
  currentDetailTags.push(tag);
  renderDetailSelected();
  if (el) el.classList.add("used");
}
function removeDetailTag(idx) {
  currentDetailTags.splice(idx, 1);
  renderDetailSelected();
  renderDetailExisting();
}
function addDetailTagFromInput() {
  let val = document.getElementById("detail-new-input").value.trim();
  if (!val) return;
  if (!val.startsWith("#")) val = "#" + val;
  if (!currentDetailTags.includes(val)) {
    currentDetailTags.push(val);
    renderDetailSelected();
    renderDetailExisting();
  }
  document.getElementById("detail-new-input").value = "";
}
function readDetailTags() {
  return currentDetailTags.join(" ");
}

// Enterキーで詳細タグ追加
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && document.activeElement && document.activeElement.id === "detail-new-input") {
    e.preventDefault();
    addDetailTagFromInput();
  }
});

// --- 確定・上書き ---
function openConfirm() {
  const editCount = Object.keys(edits).length;
  document.getElementById("confirm-msg").textContent =
    `${editCount}件の編集内容を永久にデータへ統合し、新しいHTMLファイルをダウンロードします。`;
  document.getElementById("confirm-modal").classList.add("open");
}
function closeConfirm() { document.getElementById("confirm-modal").classList.remove("open"); }

function doFinalize() {
  // 編集を全BOOKS に統合した最終データを作成
  const finalBooks = BOOKS.map(b => {
    const e = edits[b.no];
    if (!e) return b;
    return Object.assign({}, b, e);
  });

  // ★ outerHTML取得前に：モーダル・editsをリセットしてDOMをクリーンにする
  closeConfirm();
  try { localStorage.removeItem(EDITS_KEY); } catch(e2) {}
  edits = {};
  buildStatsBar();
  filterBooks();

  // JSONのみダウンロード（outerHTMLフリーズ回避）
  setTimeout(function() {
    const jsonStr = JSON.stringify(finalBooks, null, 2);
    const blob = new Blob([jsonStr], { type: "application/json;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "makimura_books.json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 3000);
    alert("makimura_books.json をダウンロードしました。\nClaudeに渡してHTMLを更新してください。");
  }, 100);
}

// モーダル背景クリックで閉じる
["edit-modal","confirm-modal"].forEach(id => {
  document.getElementById(id).addEventListener("click", function(e) {
    if (e.target === this) { this.classList.remove("open"); editingNo = null; }
  });
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    document.getElementById("edit-modal").classList.remove("open");
    document.getElementById("confirm-modal").classList.remove("open");
    editingNo = null;
  }
});

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// 初期化
buildStatsBar();
filterBooks();

// ===== ログイン =====
const PW_HASH = "709df012e236dc3f5c53b8ce75c5adf74c39054aef58e3eca5d852fa5f2244de";
const AUTH_KEY = "makimura_auth";

async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function doLogin() {
  const pw = document.getElementById("login-pw").value;
  const hash = await sha256(pw);
  if (hash === PW_HASH) {
    sessionStorage.setItem(AUTH_KEY, "1");
    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("login-error").textContent = "";
  } else {
    document.getElementById("login-error").textContent = "パスワードが違います";
    document.getElementById("login-pw").value = "";
    document.getElementById("login-pw").focus();
  }
}

// ページロード時にセッション確認
(function() {
  if (sessionStorage.getItem(AUTH_KEY) === "1") {
    document.getElementById("login-screen").classList.add("hidden");
  } else {
    document.getElementById("login-pw").focus();
  }
})();

</script>
