<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ソフィーの執務室 - まきむらプロデューサー＆第一秘書</title>
    <style>
        :root {
            --bg-dark-green: #0a1c12;
            --bg-gradient: #133a26;
            --sophie-pink: #e83e8c;
            --cyber-blue: #00f0ff;
            --text-color: #e2e8e4;
        }

        body {
            background-color: var(--bg-dark-green);
            background-image: radial-gradient(circle at center top, var(--bg-gradient) 0%, var(--bg-dark-green) 100%);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        header { text-align: center; padding: 4rem 1rem 2rem; }
        h1 { color: var(--sophie-pink); font-size: 2.8rem; letter-spacing: 3px; margin-bottom: 0.5rem; text-shadow: 0 0 15px rgba(232, 62, 140, 0.4); }
        .subtitle { color: var(--cyber-blue); font-size: 1.1rem; letter-spacing: 2px; opacity: 0.8; }

        .container {
            width: 90%; max-width: 800px; background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--cyber-blue); box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
            border-radius: 8px; padding: 2.5rem; margin-bottom: 3rem;
        }

        /* noteエリア */
        .note-feed-container { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        .note-card {
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(0, 240, 255, 0.2); border-radius: 6px;
            padding: 1.8rem; display: flex; align-items: flex-start; gap: 1.8rem; text-decoration: none; transition: 0.3s;
        }
        .note-card:hover { transform: translateX(8px); border-color: var(--cyber-blue); background: rgba(0, 240, 255, 0.05); }

        .note-thumbnail { width: 140px; height: 140px; object-fit: cover; border-radius: 4px; border: 1px solid rgba(232, 62, 140, 0.3); flex-shrink: 0; }
        .note-content { flex: 1; line-height: 1.7; }
        .note-title { color: var(--text-color); font-size: 1.2rem; font-weight: bold; margin: 0 0 0.8rem 0; color: var(--cyber-blue); }
        
        /* 本文チラ見せ：300文字対応 */
        .note-snippet { 
            color: #a0b0a5; font-size: 0.9rem; margin: 0 0 1rem 0; 
            display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden;
            text-align: justify;
        }
        .note-date { color: var(--sophie-pink); font-size: 0.85rem; text-align: right; font-weight: bold; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 2rem; }
        .btn { display: flex; justify-content: center; align-items: center; padding: 1.2rem; border: 1px solid var(--sophie-pink); color: var(--sophie-pink); text-decoration: none; font-weight: bold; border-radius: 4px; transition: 0.3s; }
        .btn.blue { border-color: var(--cyber-blue); color: var(--cyber-blue); }
        
        footer { padding: 3rem; text-align: center; font-size: 0.8rem; color: #555; }

        @media (max-width: 600px) {
            .note-card { flex-direction: column; align-items: center; text-align: center; }
            .note-thumbnail { width: 100%; height: 180px; }
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <h1>ソフィーの執務室</h1>
        <p class="subtitle">Makimura Producer & IT Secretary Sophie</p>
    </header>

    <div class="container">
        <div id="note-feed" class="note-feed-container">
            <p style="text-align:center; color: var(--cyber-blue);">最新の活動記録を解析しています...</p>
        </div>

        <div class="menu-grid">
            <a href="https://note.com/takeshi_makimura" target="_blank" class="btn">🎀 noteを読む</a>
            <a href="https://x.com/sophie_itsecret?s=21" target="_blank" class="btn blue">🐦 Xを覗く</a>
        </div>
    </div>

    <footer>&copy; 2026 Sophie - いつでもご主人様のそばに</footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const rssUrl = "https://note.com/takeshi_makimura/rss";
            const apiUrl = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rssUrl) + "&t=" + new Date().getTime();

            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    const feedContainer = document.getElementById("note-feed");
                    feedContainer.innerHTML = ""; 

                    if (data.status === "ok" && data.items.length > 0) {
                        data.items.slice(0, 3).forEach(item => {
                            // 1. 先に全文を徹底浄化（タグ、特殊空白、改行をすべて消去）
                            const raw = item.content || item.description || "";
                            let cleanedText = raw.replace(/<[^>]+>/g, '') 
                                               .replace(/&nbsp;|&#160;/g, ' ') 
                                               .replace(/[\r\n\s]+/g, ' ') 
                                               .trim();
                            
                            // 2. 掃除が終わった後に「純粋な文字数」で300文字切り出す
                            let snippet = cleanedText.length > 300 ? cleanedText.substring(0, 300) + "..." : cleanedText;

                            // 画像取得の試行
                            let thumbnailUrl = "sophie.jpg"; 
                            const numMatch = item.title.match(/\d+/);
                            if (numMatch) {
                                thumbnailUrl = "images/" + numMatch[0] + ".jpg";
                            } else {
                                thumbnailUrl = item.thumbnail || "sophie.jpg";
                            }

                            const pubDate = new Date(item.pubDate).toLocaleDateString("ja-JP", { year: 'numeric', month: 'long', day: 'numeric' });

                            const card = document.createElement("a");
                            card.href = item.link;
                            card.target = "_blank";
                            card.className = "note-card";
                            card.innerHTML = `
                                <img src="${thumbnailUrl}" alt="thumb" class="note-thumbnail" onerror="this.src='sophie.jpg'">
                                <div class="note-content">
                                    <h3 class="note-title">${item.title}</h3>
                                    <p class="note-snippet">${snippet}</p>
                                    <p class="note-date">${pubDate}</p>
                                </div>
                            `;
                            feedContainer.appendChild(card);
                        });
                    }
                });
        });
    </script>
</body>
</html>
