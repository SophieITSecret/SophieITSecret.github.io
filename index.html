<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>むさしの山の会（新システムテスト）</title>
<style>
  body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; background: #f4f7f6; color: #333; }
  header { background: #2c3e50; color: white; padding: 1.5rem; text-align: center; }
  .container { max-width: 800px; margin: 20px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
  h2 { border-left: 5px solid #27ae60; padding-left: 10px; font-size: 1.3rem; margin-top: 30px; }
  
  .article-card { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; gap: 15px; align-items: flex-start; text-decoration: none; color: inherit; transition: background 0.3s; }
  .article-card:hover { background: #f9f9f9; }
  .article-card:last-child { border-bottom: none; }
  
  /* 写真のスタイル（確実に出すためのサイズ調整） */
  .article-card img { width: 140px; height: 100px; object-fit: cover; border-radius: 5px; background: #ddd; flex-shrink: 0; }
  
  .article-info { flex: 1; }
  .article-info h3 { margin: 0 0 5px 0; font-size: 1.1rem; color: #2c3e50; }
  
  /* 過去データ対応：抜き出した山行日を強調表示 */
  .mountain-date { display: inline-block; background: #27ae60; color: white; font-size: 0.8rem; padding: 3px 8px; border-radius: 12px; margin-bottom: 5px; font-weight: bold; }
  
  /* 本文チラ見せ（改行を徹底的に潰したデザイン） */
  .article-snippet { margin: 0; color: #666; font-size: 0.9rem; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  
  @media (max-width: 600px) {
    .article-card { flex-direction: column; }
    .article-card img { width: 100%; height: 180px; }
  }
</style>
</head>
<body>

  <header>
    <h1>むさしの山の会</h1>
  </header>

  <div class="container">
    <h2>📸 最新の山行報告（note自動連携）</h2>
    <div id="note-feed">
      <p>データを取得中...</p>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      // キャッシュ回避
      const timestamp = new Date().getTime();
      // ※ここはご自身のnoteのRSSのままテストします
      const rssUrl = "https://note.com/takeshi_makimura/rss?t=" + timestamp; 
      const apiUrl = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rssUrl);

      fetch(apiUrl)
        .then(response => response.json())
        .then(data => {
          const feedContainer = document.getElementById("note-feed");
          feedContainer.innerHTML = ""; 

          if (data.status === "ok" && data.items.length > 0) {
            const latestItems = data.items.slice(0, 5); // 5件表示
            
            latestItems.forEach(item => {
              
              // 1. 【超強力】本文の浄化とチラ見せ（改行・空白を徹底的に潰す）
              let snippet = "";
              const rawContent = item.content || item.description || "";
              
              // HTMLタグを消去
              let plainText = rawContent.replace(/<[^>]+>/g, '');
              // 特殊な空白文字(&nbsp;等)を半角スペースに
              plainText = plainText.replace(/&nbsp;|&#160;/gi, ' ');
              // あらゆる改行(\r,\n)と連続する空白を、すべて1つの半角スペースに強制変換
              plainText = plainText.replace(/[\r\n\s]+/g, ' ').trim();
              
              if (plainText.length > 120) {
                snippet = plainText.substring(0, 120) + "...";
              } else {
                snippet = plainText;
              }

              // 2. 【絶対捕獲】画像の抽出（本文のimgタグを最優先で探す）
              let thumbnailUrl = ""; 
              const imgMatch = rawContent.match(/<img[^>]+src=["']([^"']+)["']/i);
              if (imgMatch) {
                  thumbnailUrl = imgMatch[1]; // 本文の最初の画像をゲット
              } else if (item.thumbnail) {
                  thumbnailUrl = item.thumbnail; // なければnoteの気まぐれな枠を探す
              } else {
                  thumbnailUrl = "https://via.placeholder.com/140x100?text=No+Photo"; // それでも無ければダミー
              }

              // 3. 【過去データ対応】タイトルから「山行日」を自動抽出する魔法
              let originalTitle = item.title;
              let displayTitle = originalTitle;
              let mountainDateBadge = ""; // 山行日のバッジ

              // 正規表現で「【2018.05.03】」や「[2018/05/03]」のような日付を探す
              const dateRegex = /^[【\[（\(](20\d{2}[.\/-]\d{1,2}[.\/-]\d{1,2})[】\]）\)]\s*/;
              const dateMatch = originalTitle.match(dateRegex);

              if (dateMatch) {
                  // 日付が見つかった場合：バッジを作り、タイトルからは日付部分を消す
                  const extractedDate = dateMatch[1].replace(/[.\-]/g, '/'); // 2018.05.03 -> 2018/05/03
                  mountainDateBadge = `<span class="mountain-date">🏔 山行日: ${extractedDate}</span>`;
                  displayTitle = originalTitle.replace(dateRegex, ''); // タイトルを綺麗にする
              } else {
                  // 日付表記がない場合（通常の記事など）：noteの公開日を控えめに表示
                  const pubDate = new Date(item.pubDate);
                  const dateString = pubDate.toLocaleDateString("ja-JP");
                  mountainDateBadge = `<span style="color:#999; font-size:0.8rem;">公開日: ${dateString}</span>`;
              }

              // 4. HTMLの組み立て
              const card = document.createElement("a");
              card.href = item.link;
              card.target = "_blank";
              card.className = "article-card";
              
              card.innerHTML = `
                  <img src="${thumbnailUrl}" alt="写真">
                  <div class="article-info">
                      ${mountainDateBadge}
                      <h3>${displayTitle}</h3>
                      <p class="article-snippet">${snippet}</p>
                  </div>
              `;
              
              feedContainer.appendChild(card);
            });
          } else {
            feedContainer.innerHTML = "<p>記事が見つかりませんでした。</p>";
          }
        })
        .catch(error => {
          document.getElementById("note-feed").innerHTML = "<p>記事の取得に失敗しました。</p>";
        });
    });
  </script>
</body>
</html>
