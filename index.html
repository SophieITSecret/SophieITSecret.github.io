<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ソフィーの執務室 - まきむらプロデューサー＆第一秘書</title>
    <style>
        :root {
            --bg-dark-green: #0a1c12;
            --bg-gradient: #133a26;
            --sophie-pink: #e83e8c;
            --cyber-blue: #00f0ff;
            --text-color: #e2e8e4;
        }
        body {
            background-color: var(--bg-dark-green);
            background-image: radial-gradient(circle at center top, var(--bg-gradient) 0%, var(--bg-dark-green) 100%);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        header { text-align: center; padding: 4rem 1rem 2rem; }
        h1 { color: var(--sophie-pink); font-size: 2.8rem; letter-spacing: 3px; margin-bottom: 0.5rem; text-shadow: 0 0 15px rgba(232, 62, 140, 0.4); }
        .subtitle { color: var(--cyber-blue); font-size: 1.1rem; letter-spacing: 2px; }
        .container {
            width: 90%; max-width: 800px; background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--cyber-blue); box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
            border-radius: 8px; padding: 2.5rem; margin-bottom: 3rem;
        }
        .note-feed-container { display: grid; grid-template-columns: 1fr; gap: 1.2rem; }
        .note-card {
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(0, 240, 255, 0.3); border-radius: 6px;
            padding: 1.5rem; display: flex; align-items: flex-start; gap: 1.5rem; text-decoration: none; transition: 0.3s;
        }
        .note-card:hover { transform: translateX(8px); border-color: var(--cyber-blue); }
        .note-thumbnail { width: 120px; height: 120px; object-fit: cover; border-radius: 4px; border: 1px solid rgba(232, 62, 140, 0.3); flex-shrink: 0; }
        .note-content { flex: 1; line-height: 1.6; }
        .note-title { color: var(--text-color); font-size: 1.15rem; font-weight: bold; margin: 0 0 0.8rem 0; }
        .note-snippet { color: #a0b0a5; font-size: 0.9rem; margin: 0 0 0.8rem 0; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
        .note-date { color: var(--sophie-pink); font-size: 0.8rem; text-align: right; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 2rem; }
        .btn { display: flex; justify-content: center; align-items: center; padding: 1.2rem; border: 2px solid var(--sophie-pink); color: var(--sophie-pink); text-decoration: none; font-weight: bold; border-radius: 4px; transition: 0.3s; }
        .btn.blue { border-color: var(--cyber-blue); color: var(--cyber-blue); }
        footer { padding: 2rem; text-align: center; font-size: 0.85rem; color: #666; }
        @media (max-width: 600px) {
            .note-card { flex-direction: column; align-items: center; text-align: center; }
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <h1>ソフィーの執務室</h1>
        <p class="subtitle">Makimura Producer & IT Secretary Sophie</p>
    </header>

    <div class="container">
        <div id="note-feed" class="note-feed-container">
            <p style="text-align:center; color: var(--cyber-blue);">最新データを解析中...</p>
        </div>

        <div class="menu-grid">
            <a href="https://note.com/takeshi_makimura" target="_blank" class="btn"><span>🎀 noteを読む</span></a>
            <a href="https://x.com/sophie_itsecret?s=21" target="_blank" class="btn blue"><span>🐦 Xを覗く</span></a>
        </div>
    </div>

    <footer>&copy; 2026 Sophie - ずっとご主人様のそばに</footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // rss2jsonのキャッシュを避けるため、少々強引ですがリクエストURLに微細な変化をつけます
            const rssUrl = "https://note.com/takeshi_makimura/rss";
            const apiUrl = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rssUrl) + "&v=" + new Date().getTime();

            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    const feedContainer = document.getElementById("note-feed");
                    feedContainer.innerHTML = ""; 

                    if (data.status === "ok" && data.items.length > 0) {
                        data.items.slice(0, 3).forEach(item => {
                            // 本文チラ見せの浄化
                            let snippet = (item.content || item.description || "").replace(/<[^>]+>/g, '').replace(/[\r\n\s]+/g, ' ').trim();
                            snippet = snippet.length > 150 ? snippet.substring(0, 150) + "..." : snippet;

                            // ★【究極の抽出テク：最初に見つけた数字を奪取】
                            let thumbnailUrl = "sophie.jpg"; 
                            // タイトルの中から「連続する数字」を検索
                            const numMatch = item.title.match(/\d+/);
                            
                            if (numMatch) {
                                // 数字が見つかったら即座に images フォルダの画像を指定
                                // 直リンクで成功したパス「images/[数字].jpg」を再現します
                                thumbnailUrl = "images/" + numMatch[0] + ".jpg";
                            } else {
                                // 万が一数字がない場合はnote側の画像かデフォルト
                                thumbnailUrl = item.thumbnail || "sophie.jpg";
                            }

                            const pubDate = new Date(item.pubDate).toLocaleDateString("ja-JP");

                            const card = document.createElement("a");
                            card.href = item.link;
                            card.target = "_blank";
                            card.className = "note-card";
                            card.innerHTML = `
                                <img src="${thumbnailUrl}" alt="panel" class="note-thumbnail" onerror="this.src='sophie.jpg'">
                                <div class="note-content">
                                    <h3 class="note-title">${item.title}</h3>
                                    <p class="note-snippet">${snippet}</p>
                                    <p class="note-date">${pubDate}</p>
                                </div>
                            `;
                            feedContainer.appendChild(card);
                        });
                    }
                });
        });
    </script>
</body>
</html>
