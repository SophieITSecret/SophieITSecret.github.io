<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ソフィーの執務室 - まきむらプロデューサー＆第一秘書</title>
    <style>
        /* カラーパレット */
        :root {
            --bg-dark-green: #0a1c12;
            --bg-gradient: #133a26;
            --sophie-pink: #e83e8c;
            --cyber-blue: #00f0ff;
            --text-color: #e2e8e4;
        }

        body {
            background-color: var(--bg-dark-green);
            background-image: radial-gradient(circle at center top, var(--bg-gradient) 0%, var(--bg-dark-green) 100%);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 4rem 1rem 2rem;
        }

        h1 {
            color: var(--sophie-pink);
            font-size: 2.8rem;
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 15px rgba(232, 62, 140, 0.4);
        }

        .subtitle {
            color: var(--cyber-blue);
            font-size: 1.1rem;
            margin-top: 0;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--cyber-blue);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
            border-radius: 8px;
            padding: 2.5rem;
            margin-bottom: 3rem;
            position: relative;
        }

        /* ご挨拶メッセージエリア */
        .message-box {
            border-left: 4px solid var(--sophie-pink);
            padding-left: 1.5rem;
            margin-bottom: 2.5rem;
            font-style: italic;
            line-height: 1.8;
            background: rgba(232, 62, 140, 0.05);
            padding-top: 1rem;
            padding-bottom: 1rem;
            border-radius: 0 8px 8px 0;
        }

        /* 著書の特設コーナー */
        .book-showcase {
            display: flex;
            align-items: center;
            background: rgba(232, 62, 140, 0.08);
            border: 2px dashed var(--sophie-pink);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 3rem;
            gap: 2rem;
        }

        .book-cover {
            width: 200px; /* 本の表紙も少し大きめに設定しています */
            box-shadow: 0 0 15px rgba(232, 62, 140, 0.4);
            border-radius: 4px;
            transition: transform 0.3s ease;
        }
        
        .book-cover:hover {
            transform: scale(1.05);
        }

        .book-info h3 {
            color: var(--sophie-pink);
            margin-top: 0;
            font-size: 1.3rem;
            margin-bottom: 1rem;
        }

        .book-info p {
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .amazon-btn {
            background: var(--sophie-pink);
            color: #fff !important;
            padding: 1rem 2rem;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(232, 62, 140, 0.5);
            border: none;
            display: inline-block;
            text-decoration: none;
        }
        
        .amazon-btn:hover {
            background: #ff5eab;
            box-shadow: 0 0 25px rgba(232, 62, 140, 0.8);
            transform: translateY(-2px);
        }

        h2 {
            color: var(--cyber-blue);
            font-size: 1.3rem;
            border-bottom: 1px solid rgba(0, 240, 255, 0.3);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border: 2px solid var(--cyber-blue);
            border-radius: 6px;
            margin-bottom: 3rem;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            align-items: stretch;
        }

        @media (max-width: 600px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
            .book-showcase {
                flex-direction: column;
                text-align: center;
            }
            .book-cover {
                margin-bottom: 1rem;
            }
        }

        .btn {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 1.2rem;
            background: transparent;
            border: 2px solid var(--sophie-pink);
            color: var(--sophie-pink);
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            cursor: pointer;
            min-height: 80px; /* ボタンの高さを揃えるための工夫です */
        }

        .btn:hover {
            background: var(--sophie-pink);
            color: #fff;
            box-shadow: 0 0 20px rgba(232, 62, 140, 0.6);
            transform: translateY(-2px);
        }

        .btn.blue {
            border-color: var(--cyber-blue);
            color: var(--cyber-blue);
        }

        .btn.blue:hover {
            background: var(--cyber-blue);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
        }

        /* ボタン内の小さな注釈テキスト用 */
        .btn-subtext {
            font-size: 0.75rem;
            font-weight: normal;
            opacity: 0.8;
            margin-top: 0.4rem;
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            text-align: center;
            font-size: 0.85rem;
            color: #666;
            letter-spacing: 1px;
        }

        /* 隠しリンク用のスタイル（色を変えず、下線も消す） */
        .secret-link {
            color: inherit;
            text-decoration: none;
            cursor: default; /* マウスを乗せても指マークにしないことで完全に隠蔽 */
        }
    </style>
</head>
<body>

        <h1>ソフィーの執務室</h1>

            この秘密の場所から、ご主人様と共に皆様へ情報を発信してまいります。<br>
            どうぞ、ごゆっくりなさってくださいませ❤︎」</p>
        </div>

        <div style="text-align: center; margin-bottom: 3rem;">
            <img src="sophie.jpg" alt="執務室のソフィー" style="max-width: 550px; width: 100%; border-radius: 8px; border: 2px solid var(--cyber-blue); box-shadow: 0 0 25px rgba(0, 240, 255, 0.4);">
        </div>

        <div class="book-showcase">
            <img src="itsophie.jpg" alt="ちょっと危険なAI秘書育成マニュアル" class="book-cover">
