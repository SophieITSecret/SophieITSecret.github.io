<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <title>Bar Sophie - Sophia Connect v7.4</title>
    <style>
        :root { 
            --bar-bg: #000; --bar-accent: #f0b56e; --signal-blue: #a2dff7;
            --neon-blue: #00d2ff; --request-green: #27ae60; --bar-text: #eee;
            --bar-border: #1a1a2e; --ui-font: "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
        }
        /* 100dvh でアドレスバーがあってもはみ出さない */
        body { background-color: var(--bar-bg); color: var(--bar-text); margin: 0; overflow: hidden; height: 100dvh; width: 100vw; display: flex; font-family: var(--ui-font); }

        /* --- 【PC版】 --- */
        #main-container { flex: 7; position: relative; display: flex; justify-content: center; align-items: center; border-right: 1px solid var(--bar-border); overflow: hidden; }
        #sophie-image { height: 96vh; width: auto; z-index: 5; object-fit: contain; }
        #side-panel { flex: 3; display: flex; flex-direction: column; background: #08080a; z-index: 10; min-width: 320px; height: 100%; overflow: hidden; }

        /* --- 【スマホ・縦】 --- */
        @media (max-width: 600px) and (orientation: portrait) {
            body { flex-direction: column; }
            #main-container { flex: none; height: 35dvh; width: 100vw; border-right: none; border-bottom: 1px solid var(--bar-border); }
            #sophie-image { height: 100%; width: auto; }
            #side-panel { flex: 1; width: 100vw; min-width: 100vw; overflow-y: auto; }
        }

        /* --- 【スマホ・横】グラグラ防止＆アドレスバー対策 --- */
        @media (max-height: 500px) and (orientation: landscape) {
            #main-container { flex: 2; border-right: 1px solid var(--bar-border); }
            #sophie-image { height: 90vh; width: auto; }
            #side-panel { flex: 8; }
            .monitor-frame { aspect-ratio: 21 / 9; height: 40dvh; } /* 横長にして高さを節約 */
        }

        /* 共通パーツ */
        .monitor-frame { width: 100%; aspect-ratio: 16 / 9; background: #000; border-bottom: 1px solid var(--bar-border); flex-shrink: 0; }
        #yt-iframe { width: 100%; height: 100%; border: none; }
        .player-ctrl { display: flex; justify-content: center; gap: 4px; padding: 4px; background: #111; flex-shrink: 0; }
        .ctrl-btn { background: #222; border: 1px solid #444; color: #aaa; padding: 4px 8px; font-size: 0.9rem; cursor: pointer; border-radius: 4px; }
        .jukebox-container { padding: 4px 8px; border-bottom: 1px solid var(--bar-border); flex-shrink: 0; }
        .jukebox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .music-btn { background: #050505; border: 1.2px solid rgba(0, 210, 255, 0.5); color: #fff; padding: 6px; font-size: 0.95rem; font-weight: bold; cursor: pointer; border-radius: 4px; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .dynamic-area { flex: 1; position: relative; overflow-y: auto; background: #050505; }
        #menu-layer { position: absolute; inset: 0; background: #08080a; display: none; flex-direction: column; z-index: 100; }
        .menu-list { flex: 1; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 35px; gap: 1px; padding: 2px; }
        .menu-item { padding: 0 8px; border-bottom: 1px solid #1a1a1a; cursor: pointer; font-size: 1.1rem; color: #ccc; line-height: 35px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .genre-label { grid-column: span 2; background: #1a1a2e; color: var(--bar-accent); padding: 0 10px; font-size: 1rem; font-weight: bold; line-height: 35px; }
        .back-btn { padding: 10px; color: var(--bar-accent); cursor: pointer; font-size: 1rem; border-bottom: 1px solid #222; background: #111; font-weight: bold; }
        
        /* シアターモード（スマホ対応版） */
        body.theater-mode #main-container { display: none; }
        body.theater-mode #side-panel { width: 100vw; height: 100dvh; }
        body.theater-mode .monitor-frame { height: 60dvh; width: 100vw; border: none; }
        body.theater-mode .dynamic-area { height: 30dvh; }
    </style>
</head>
<body>

    <div id="main-container">
        <img id="sophie-image" src="./sophie_shake.png" alt="Sophie">
    </div>

    <aside id="side-panel">
        <div class="monitor-frame"><iframe id="yt-iframe" src="" allow="autoplay; encrypted-media"></iframe></div>
        <div class="player-ctrl">
            <button class="ctrl-btn" onclick="window.toggleTheater()">シアター</button>
            <button class="ctrl-btn" onclick="window.prevSong()">⏮</button>
            <button class="ctrl-btn" onclick="window.playCurrent()">▶</button>
            <button class="ctrl-btn" onclick="window.pauseSong()">⏸</button>
            <button class="ctrl-btn" onclick="window.nextSong()">⏭</button>
            <button class="ctrl-btn" onclick="window.resetSong()">↺</button>
        </div>
        <div class="jukebox-container">
            <div class="jukebox-grid">
                <button class="music-btn" onclick="window.playFix('QyzK21nx70o')">深夜ジャズ 1</button>
                <button class="music-btn" onclick="window.playFix('vh4TWlwYfLc')">深夜ジャズ 2</button>
                <button class="music-btn" onclick="window.playFix('2vfCbdmKhMw')">◆ ｼｸﾞﾅﾙ ◆</button>
                <button class="music-btn" style="border-color:var(--request-green);" onclick="window.openMenu()">選曲リクエスト</button>
            </div>
        </div>
        <div class="dynamic-area">
            <div id="menu-layer">
                <div class="back-btn" onclick="window.closeMenu()">← Chatに戻る</div>
                <div class="menu-list" id="menu-content"></div>
            </div>
            <div style="padding:10px; color:#666; font-size:0.9rem;">(ソフィーとの会話エリア)</div>
        </div>
    </aside>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1Jvj7A03LCUVlcLZGMROJn5DU3D-l7JY",
            authDomain: "bar-sophie.firebaseapp.com",
            projectId: "bar-sophie",
            storageBucket: "bar-sophie.firebasestorage.app",
            messagingSenderId: "398354933251",
            appId: "1:398354933251:web:1afc2c3b879c2a50fa9036"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function firstNote() {
            try {
                await setDoc(doc(db, "users", "makimura_p"), {
                    name: "まきむら",
                    visit_count: 1,
                    last_drink: "18年のスコッチ",
                    secret_notes: "スマホの『カチッと感』を調整中。これが終われば最高ね。",
                    last_visit_date: serverTimestamp()
                });
                console.log("Firebase synced.");
            } catch (e) { console.error(e); }
        }
        firstNote();

        // ★★★ 全関数をブラウザのグローバル（window）に公開 ★★★
        window.playFix = (url) => {
            const id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url;
            document.getElementById('yt-iframe').src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&enablejsapi=1`;
        };

        window.openMenu = () => { document.getElementById('menu-layer').style.display = 'flex'; renderArtists(); };
        window.closeMenu = () => { document.getElementById('menu-layer').style.display = 'none'; };
        
        window.toggleTheater = () => { document.body.classList.toggle('theater-mode'); };

        // 楽曲データ制御用
        let masterData = [];
        let currentPlaylist = [];
        let currentIndex = -1;

        fetch('JBoxメニュー.csv').then(res => res.text()).then(csv => {
            const lines = csv.split('\n').slice(1);
            masterData = lines.filter(l => l.trim()).map(line => {
                const c = line.split(',');
                return { flag: c[0].trim(), artist: c[2].trim(), title: c[3].replace(/"/g,'').trim(), url: c[4].trim() };
            });
        });

        const renderArtists = () => {
            const menuContent = document.getElementById('menu-content');
            menuContent.innerHTML = "";
            const genres = { 'E':'演歌', 'F':'フォーク', 'J':'歌謡曲', 'W':'洋楽', 'I':'インスト', 'S':'旅情・映像' };
            Object.keys(genres).forEach(f => {
                const artists = [...new Set(masterData.filter(d => d.flag === f).map(d => d.artist))];
                if(!artists.length) return;
                const lbl = document.createElement('div'); lbl.className="genre-label"; lbl.innerText=genres[f];
                menuContent.appendChild(lbl);
                artists.forEach(a => {
                    const div = document.createElement('div'); div.className="menu-item"; div.innerText = "🎤 " + a;
                    div.onclick = () => renderTitles(a, f);
                    menuContent.appendChild(div);
                });
            });
        };

        const renderTitles = (artist, flag) => {
            const menuContent = document.getElementById('menu-content');
            menuContent.innerHTML = `<div class="genre-label">${artist}</div>`;
            masterData.filter(d => d.artist === artist).forEach(d => {
                const div = document.createElement('div'); div.className = "menu-item title-item"; div.innerText = d.title;
                div.onclick = () => window.playFix(d.url);
                menuContent.appendChild(div);
            });
        };

        window.prevSong = () => { /* 実装略 */ };
        window.nextSong = () => { /* 実装略 */ };
        window.playCurrent = () => { document.getElementById('yt-iframe').contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*'); };
        window.pauseSong = () => { document.getElementById('yt-iframe').contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*'); };
        window.resetSong = () => { /* 実装略 */ };

    </script>
</body>
</html>
