<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Bar Sophie (Staging v2.2)</title>
    <style>
        :root { --bar-bg: #030305; --bar-accent: #f0b56e; --bar-text: #f0f0f0; }
        
        body { 
            background-color: #050508; /* 真っ黒ではなく、わずかに青みのある黒 */
            color: var(--bar-text); 
            margin: 0; overflow: hidden; height: 100vh; display: flex;
        }

        .counter-area {
            flex: 7; position: relative; 
            display: flex; justify-content: center; align-items: center;
            background-color: #050508;
            overflow: hidden;
        }

        /* 【新兵器】画像の左右に配置する「物理的な光」 */
        .ambient-light-left {
            position: absolute; left: -100px; width: 500px; height: 100%;
            background: radial-gradient(circle at center, rgba(240, 181, 110, 0.15) 0%, transparent 80%);
            filter: blur(40px); z-index: 1;
        }
        .ambient-light-right {
            position: absolute; right: -100px; width: 500px; height: 100%;
            background: radial-gradient(circle at center, rgba(240, 181, 110, 0.1) 0%, transparent 80%);
            filter: blur(40px); z-index: 1;
        }

        #sophie-image {
            height: 96vh; /* 縦を画面いっぱいに */
            width: auto;   /* 横幅は比率を維持 */
            z-index: 5;
            /* ブラウザでの「色の悪さ」を強制補正 */
            filter: contrast(1.15) brightness(1.1) saturate(1.2);
            box-shadow: 0 0 100px rgba(0,0,0,1); /* 画像の端を闇に溶け込ませる */
        }

        .chat-area { flex: 3; display: flex; flex-direction: column; background: #0a0a0c; border-left: 1px solid #1a1a2e; z-index: 10; }
        .chat-header { padding: 15px; color: var(--bar-accent); font-weight: bold; text-align: center; border-bottom: 1px solid #1a1a2e; letter-spacing: 2px; }
        .jukebox { padding: 10px; background: #111; text-align: center; border-bottom: 1px solid #1a1a2e; }
        .music-btn { background: none; border: 1px solid var(--bar-accent); color: var(--bar-accent); padding: 5px 10px; font-size: 0.7rem; cursor: pointer; margin: 2px; border-radius: 4px; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; font-family: sans-serif; font-size: 0.9rem; line-height: 1.6; }
        .message.sophie { border-left: 3px solid var(--bar-accent); padding-left: 12px; margin-bottom: 15px; }
        .chat-input-area { padding: 20px; background: #000; display: flex; }
        #chat-input { flex: 1; background: #151515; border: 1px solid #2a2a3a; color: #fff; padding: 12px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="counter-area">
        <div class="ambient-light-left"></div>
        <div class="ambient-light-right"></div>
        
        <img id="sophie-image" src="./sophie_shake.png" alt="Sophie">
    </div>

    <aside class="chat-area">
        <div class="chat-header">BAR SOPHIE v2.2</div>
        <div class="jukebox">
            <button class="music-btn" onclick="playMusic('fEvM-OUbaKs')">Sophie's</button>
            <button class="music-btn" onclick="playMusic('LpP-ZqS2Spg')">Jazz</button>
            <button class="music-btn" onclick="playMusic('HMnrl0gFDUg')">Piano</button>
            <button class="music-btn" onclick="stopMusic()">Stop</button>
        </div>
        <div id="chat-messages" class="chat-messages">
            <div class="message sophie">ご主人様……。今度こそ、お店の隅々にまで灯りを届けたつもりですわ。……いかがかしら？</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="会話を続ける...">
        </div>
        <div id="yt-wrap" style="display:none;"></div>
    </aside>

    <script>
        const input = document.getElementById('chat-input');
        const messages = document.getElementById('chat-messages');
        const ytWrap = document.getElementById('yt-wrap');

        function addMessage(text, side) {
            const div = document.createElement('div');
            div.className = `message ${side}`;
            div.innerText = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function playMusic(id) {
            ytWrap.innerHTML = `<iframe width="1" height="1" src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0" frameborder="0" allow="autoplay"></iframe>`;
            addMessage("静かな夜に相応しい一曲ですわ。", 'sophie');
        }

        function stopMusic() { ytWrap.innerHTML = ''; addMessage("静寂に戻しましたわ。", 'sophie'); }

        input.onkeypress = (e) => {
            if (e.key === 'Enter' && input.value.trim() !== '') {
                addMessage(input.value, 'user');
                input.value = '';
                setTimeout(() => { addMessage("ええ。大切なお話、お聞きしていますわ。", 'sophie'); }, 800);
            }
        };
    </script>
</body>
</html>
