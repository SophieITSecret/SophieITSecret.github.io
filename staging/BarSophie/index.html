<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Bar Sophie - Grand Unified v14.1 Custom</title>
    <link rel="stylesheet" href="css/style_pc.css">
</head>
<body class="mode-init">
    <div id="entry-overlay">
        <button class="entry-btn" id="btn-entry-pc">🥃 Bar Sophie に入店する</button>
    </div>
    
    <div id="left-panel">
        <div id="sophie-main">
            <img id="sophie-image" src="./sophie_shake.png" alt="Sophie">
        </div>
        <div id="chat-area-container">
            <div id="chat-area">まきむら様、今夜はどのようなお時間になさいますか？</div>
        </div>
    </div>
    
    <div id="right-panel">
        <div class="monitor-frame">
            <iframe id="yt-iframe" src="" allow="autoplay; encrypted-media"></iframe>
            <img id="monitor-image" src="" alt="Sake Image">
            <div id="telop-box"></div>
        </div>

        <div class="console-pc">
            <div class="control-row">
                <button class="c-btn-pc theater-btn" id="ctrl-theater">🎭 THEATER</button>
                <div class="transport-btns">
                    <button class="c-btn-pc" id="ctrl-back">⏮</button>
                    <button class="c-btn-pc" id="ctrl-play">▶</button>
                    <button class="c-btn-pc" id="ctrl-pause">⏸</button>
                    <button class="c-btn-pc" id="btn-next">⏭</button>
                </div>
            </div>

            <button class="signal-song-btn" id="btn-signal-song">
                <span class="symbol">💎</span> 看板ソング『みずいろのシグナル』
            </button>

            <div class="genre-grid-pc">
                <button class="g-select-btn" data-flag="E">演歌</button>
                <button class="g-select-btn" data-flag="F">フォーク</button>
                <button class="g-select-btn" data-flag="J">歌謡曲</button>
                <button class="g-select-btn" data-flag="W">洋楽</button>
                <button class="g-select-btn" data-flag="I">インスト</button>
                <button class="g-select-btn" data-flag="S">旅情・映像</button>
                <button class="g-select-btn" data-flag="X">J-POP</button>
                <button class="g-select-btn" data-flag="Z">ジャズ</button>
                <button class="g-select-btn" data-flag="A">アニメ</button>
                <button class="g-select-btn" data-flag="K">クラシック</button>
            </div>
        </div>

        <div class="jukebox-controls">
            <div id="menu-layer">
                <div class="menu-list" id="menu-content"></div>
            </div>
            <div class="btn-group-pc" id="nav-main-pc">
                <button class="action-btn-pc request-btn" id="btn-music">🎵 全アーティスト一覧</button>
                <button class="action-btn-pc talk-btn" id="btn-talk">🥃 お酒の物語を読む</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app_pc.js"></script>
</body>
</html>
