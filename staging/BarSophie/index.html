<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Bar Sophie - Final Console v5.0</title>
    <style>
        :root { 
            --bar-bg: #000; 
            --bar-accent: #f0b56e; 
            --signal-blue: #a2dff7;
            --request-green: #27ae60; 
            --bar-text: #eee;
            --bar-border: #1a1a2e;
            --ui-font: "Helvetica Neue", Arial, sans-serif;
        }
        body { background-color: var(--bar-bg); color: var(--bar-text); margin: 0; overflow: hidden; height: 100vh; display: flex; font-family: var(--ui-font); }

        /* レイアウト */
        #main-container { flex: 7; position: relative; display: flex; justify-content: center; align-items: center; border-right: 1px solid var(--bar-border); transition: 0.3s; background: #000; }
        #sophie-image { height: 96vh; width: auto; z-index: 5; transition: 0.3s; }
        #side-panel { flex: 3; display: flex; flex-direction: column; background: #08080a; z-index: 10; transition: 0.3s; min-width: 300px; }

        /* シアターモード設定 */
        body.theater-mode #main-container { flex: 0; width: 0; overflow: hidden; border: none; }
        body.theater-mode #side-panel { flex: 10; width: 100vw; }
        body.theater-mode .monitor-frame { height: 85vh; width: 100vw; aspect-ratio: auto; cursor: zoom-out; }
        body.theater-mode #sophie-image { position: fixed; bottom: -20px; right: 20px; height: 25vh; z-index: 1000; filter: brightness(0.6); transform: scaleX(-1); pointer-events: none; }
        body.theater-mode .jukebox-container, body.theater-mode .dynamic-area { display: none; } /* 鑑賞中はボタンを隠す */

        /* モニター */
        .monitor-frame { width: 100%; aspect-ratio: 16 / 9; background: #000; border-bottom: 2px solid var(--bar-border); cursor: zoom-in; position: relative; }
        #yt-iframe { width: 100%; height: 100%; border: none; }

        /* コントロール */
        .player-ctrl { display: flex; justify-content: center; gap: 15px; padding: 5px; background: #000; border-bottom: 1px solid #222; }
        .ctrl-btn { background: none; border: 1px solid #444; color: #888; padding: 2px 12px; font-size: 0.9rem; cursor: pointer; border-radius: 3px; }
        .ctrl-btn:hover { color: #fff; border-color: var(--bar-accent); }

        /* ボタン群 */
        .jukebox-container { padding: 8px; border-bottom: 1px solid var(--bar-border); }
        .jukebox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
        .music-btn { background: #111; border: 1px solid #222; color: #999; padding: 5px; font-size: 0.7rem; cursor: pointer; border-radius: 2px; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .music-btn.active { border-color: var(--bar-accent); color: var(--bar-accent); box-shadow: 0 0 8px rgba(240,181,110,0.2); }

        .special-btn { grid-column: span 2; border: 1.2px solid #fff; font-weight: bold; cursor: pointer; text-align: center; }
        .signal-btn { background: var(--signal-blue); color: #1a2a3a; padding: 8px; margin-top: 5px; font-size: 0.8rem; border-radius: 4px; }
        .request-btn { background: var(--request-green); color: #fff; padding: 4px; margin-top: 3px; font-size: 0.7rem; border-radius: 3px; width: 80%; margin-left: 10%; }

        /* 超・文字詰めお品書き */
        .dynamic-area { flex: 1; position: relative; overflow: hidden; background: #050505; }
        #menu-layer { position: absolute; inset: 0; background: #08080a; display: flex; flex-direction: column; z-index: 20; padding: 5px; }
        .menu-list { flex: 1; overflow-y: auto; }
        .menu-item { padding: 3px 8px; border-bottom: 1px solid #111; cursor: pointer; font-size: 0.78rem; color: #999; line-height: 1.2; }
        .menu-item:hover { background: #1a1a1a; color: #fff; }
        .menu-item.playing { color: var(--bar-accent); font-weight: bold; background: #1a1510; border-left: 2px solid var(--bar-accent); }
        .genre-label { background: #1a1a2e; color: var(--bar-accent); padding: 2px 8px; font-size: 0.7rem; font-weight: bold; margin-top: 5px; }
        .back-btn { padding: 4px 8px; color: var(--bar-accent); cursor: pointer; font-size: 0.75rem; font-weight: bold; border-bottom: 1px solid #222; }
        
        #chat-messages { padding: 10px; font-size: 0.85rem; color: #888; }
    </style>
</head>
<body class="theater-mode-off">

    <div id="main-container">
        <img id="sophie-image" src="./sophie_shake.png" alt="Sophie">
    </div>

    <aside id="side-panel">
        <div class="monitor-frame" title="Click to Expand/Collapse" onclick="toggleTheater()">
            <iframe id="yt-iframe" src="" allow="autoplay; encrypted-media"></iframe>
        </div>

        <div class="player-ctrl">
            <button class="ctrl-btn" onclick="prevSong()" title="Previous">⏮</button>
            <button class="ctrl-btn" onclick="stopSong()" title="Stop">■</button>
            <button class="ctrl-btn" onclick="nextSong()" title="Next">⏭</button>
            <button class="ctrl-btn" onclick="resetSong()" title="Reset">↺</button>
        </div>

        <div class="jukebox-container">
            <div class="jukebox-grid">
                <button class="music-btn" onclick="playFix('QyzK21nx70o', this)">深夜ジャズ 1</button>
                <button class="music-btn" onclick="playFix('vh4TWlwYfLc', this)">深夜ジャズ 2</button>
                <button class="music-btn" onclick="playFix('g_NQsSxaPpw', this)">静寂ピアノ 1</button>
                <button class="music-btn" onclick="playFix('biHxC8IkeVQ', this)">静寂ピアノ 2</button>
                <button class="music-btn" onclick="playFix('ZBrmNO92OTI', this)">夜のLo-Fi 1</button>
                <button class="music-btn" onclick="playFix('cIZhlFIyJ_Y', this)">夜のLo-Fi 2</button>
                <button class="music-btn" onclick="playFix('qeaiWwQwwMo', this)">70's フォーク</button>
                <button class="music-btn" onclick="playFix('SJ-CyDbxH9I', this)">昭和歌謡曲</button>
                <button class="music-btn" onclick="playFix('tHk7TBoCZ8E', this)">演歌・酒場唄</button>
                <button class="music-btn" onclick="playFix('NoCs-3cxA4I', this)">歌姫特撰</button>
                
                <button class="special-btn signal-btn" onclick="playFix('2vfCbdmKhMw', this)">◆ みずいろのシグナル ◆</button>
                <button class="special-btn request-btn" onclick="openMenu()">選曲リクエスト</button>
            </div>
        </div>

        <div class="dynamic-area">
            <div id="chat-messages">
                <div style="border-left:2px solid var(--bar-accent); padding-left:10px;">いらっしゃいませ。モニターをクリックすれば、全画面で鑑賞できますわ。</div>
            </div>
            <div id="menu-layer">
                <div class="back-btn" id="menu-back">← Chat</div>
                <div class="menu-list" id="menu-content"></div>
            </div>
        </div>
    </aside>

    <script>
        const iframe = document.getElementById('yt-iframe');
        const menuLayer = document.getElementById('menu-layer');
        const menuContent = document.getElementById('menu-content');
        const backBtn = document.getElementById('menu-back');
        let masterData = [];
        let currentPlaylist = [];
        let currentIndex = -1;
        let currentUrl = "";
        const genres = { 'E':'演歌', 'F':'フォーク', 'W':'洋楽', 'I':'インスト', 'S':'旅情・映像' };

        fetch('JBoxメニュー.csv').then(res => res.text()).then(csv => {
            const lines = csv.split('\n').slice(1);
            masterData = lines.filter(l => l.trim()).map(line => {
                const c = line.split(',');
                return { flag: c[0], artist: c[2], title: c[3].replace(/"/g,''), url: c[4].trim() };
            });
        });

        function playFix(url, btn) {
            currentUrl = url;
            const id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url;
            iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
            
            document.querySelectorAll('.music-btn, .special-btn, .menu-item').forEach(b => b.classList.remove('active', 'playing'));
            if(btn) btn.classList.add('active');
            
            // リクエストメニュー内のハイライト更新
            const menuItems = document.querySelectorAll('.menu-item');
            menuItems.forEach(item => {
                if(item.getAttribute('data-url') === url) item.classList.add('playing');
            });
        }

        function playFromData(item) {
            currentPlaylist = masterData.filter(d => d.flag === item.flag);
            currentIndex = currentPlaylist.findIndex(d => d.url === item.url);
            playFix(item.url);
        }

        function nextSong() { if(currentIndex >= 0) { currentIndex = (currentIndex + 1) % currentPlaylist.length; playFromData(currentPlaylist[currentIndex]); } }
        function prevSong() { if(currentIndex >= 0) { currentIndex = (currentIndex - 1 + currentPlaylist.length) % currentPlaylist.length; playFromData(currentPlaylist[currentIndex]); } }
        function stopSong() { iframe.src = ""; currentUrl = ""; document.querySelectorAll('.active, .playing').forEach(b => b.classList.remove('active', 'playing')); }
        function resetSong() { if(currentUrl) playFix(currentUrl); }

        function openMenu() { menuLayer.style.display = 'flex'; renderArtists(); }
        function closeMenu() { menuLayer.style.display = 'none'; }
        function toggleTheater() { document.body.classList.toggle('theater-mode'); }

        function renderArtists() {
            backBtn.onclick = closeMenu;
            backBtn.innerText = "← Chatに戻る";
            menuContent.innerHTML = "";
            Object.keys(genres).forEach(f => {
                const artists = [...new Set(masterData.filter(d => d.flag === f).map(d => d.artist))];
                if(!artists.length) return;
                const lbl = document.createElement('div'); lbl.className="genre-label"; lbl.innerText=genres[f];
                menuContent.appendChild(lbl);
                artists.forEach(a => {
                    const div = document.createElement('div'); div.className="menu-item"; div.innerText = "🎤 " + a;
                    div.onclick = () => renderTitles(a, f);
                    menuContent.appendChild(div);
                });
            });
        }

        function renderTitles(artist, flag) {
            backBtn.onclick = renderArtists;
            backBtn.innerText = "← 歌手一覧に戻る";
            menuContent.innerHTML = `<div class="genre-label">${artist}</div>`;
            masterData.filter(d => d.artist === artist).forEach(d => {
                const div = document.createElement('div'); 
                div.className="menu-item"; 
                div.innerText = d.title;
                div.setAttribute('data-url', d.url);
                if(d.url === currentUrl) div.classList.add('playing');
                div.onclick = () => playFromData(d);
                menuContent.appendChild(div);
            });
        }
    </script>
</body>
</html>
