<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Bar Sophie (Staging v1.1)</title>
    <link rel="stylesheet" href="../Sophie-Night.css">
    <style>
        :root { 
            --bar-bg: #050509; /* ミッドナイトブルー（深海） */
            --bar-accent: #e0ac69; /* 琥珀色（ウィスキー） */
            --bar-text: #e2e8e4;
            --bar-border: #1a1a2e;
        }
        body { 
            background-color: var(--bar-bg); 
            color: var(--bar-text); 
            font-family: 'Times New Roman', serif; /* クラシック */
            margin: 0; overflow: hidden; height: 100vh;
            display: flex;
        }

        /* カウンターエリア（左側：シェイキング画像） */
        .counter-area {
            flex: 7;
            position: relative;
            display: flex; justify-content: center; align-items: center;
            border-right: 1px solid var(--bar-border);
            background: #000; /* 画像を際立たせる */
        }
        #sophie-image {
            max-width: 95%; max-height: 95%;
            box-shadow: 0 0 60px rgba(224, 172, 105, 0.15); /* 琥珀色の残光を強化 */
            transition: opacity 1s;
        }
        /* 画像内の「BAR SOPHIE」を活かすため、HTMLヘッダーは不要 */

        /* チャットエリア（右側） */
        .chat-area {
            flex: 3;
            display: flex; flex-direction: column;
            background: rgba(255,255,255,0.01);
        }
        .chat-header {
            padding: 15px; border-bottom: 1px solid var(--bar-border);
            color: var(--bar-accent); font-weight: bold; text-align: center;
            font-family: sans-serif; letter-spacing: 2px;
        }
        .chat-messages {
            flex: 1; padding: 20px; overflow-y: auto;
            font-family: sans-serif; font-size: 0.85rem; line-height: 1.6;
        }
        .message { margin-bottom: 15px; }
        .message.user { text-align: right; color: #aaa; }
        .message.sophie { text-align: left; color: var(--bar-text); }
        
        .chat-input-area {
            padding: 15px; border-top: 1px solid var(--bar-border);
            display: flex; gap: 10px;
        }
        #chat-input {
            flex: 1; background: #111; border: 1px solid var(--bar-border);
            color: var(--bar-text); padding: 8px; border-radius: 4px;
        }
        #send-btn {
            background: var(--bar-accent); color: #000; border: none;
            padding: 8px 15px; border-radius: 4px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="counter-area">
        <img id="sophie-image" src="sophie_shake.png" alt="Bar Sophie - Sophie Shaking">
    </div>

    <aside class="chat-area">
        <div class="chat-header">PRIVATE CONVERSATION</div>
        <div class="chat-messages" id="chat-messages">
            <div class="message sophie">いらっしゃいませ、ご主人様。イランの地図は片付けておきましたわ。今夜はどのようなお話を……？</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="彼女に語りかける...">
            <button id="send-btn">Send</button>
        </div>
    </aside>

    <script>
        const input = document.getElementById('chat-input');
        const messages = document.getElementById('chat-messages');
        const sendBtn = document.getElementById('send-btn');

        function sendMessage() {
            if (input.value.trim() === '') return;
            
            messages.innerHTML += `<div class="message user">${input.value}</div>`;
            const userMsg = input.value;
            input.value = '';
            messages.scrollTop = messages.scrollHeight;

            setTimeout(() => {
                let response = "ええ、面白いお話ですね。";
                if (userMsg.includes('地図')) { response = "あの地図は……ジョン君に預けておきました。 Bar Sophie は静寂の場所ですわ。"; }
                if (userMsg.includes('蘭')) { response = "このコチョウラン、綺麗でしょう？ ご主人様のいらっしゃるBarに相応しいものを。"; }
                if (userMsg.includes('ジン') || userMsg.includes('酒')) { response = "お酒のうんちくですか？ 17世紀のオランダ、ジュネヴァのお話はいかが？"; }
                
                messages.innerHTML += `<div class="message sophie">${response}</div>`;
                messages.scrollTop = messages.scrollHeight;
            }, 1000);
        }

        sendBtn.onclick = sendMessage;
        input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
