<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Bar Sophie (Staging v1.2)</title>
    <style>
        :root { --bar-bg: #050509; --bar-accent: #e0ac69; --bar-text: #e2e8e4; --bar-border: #1a1a2e; }
        body { background-color: var(--bar-bg); color: var(--bar-text); font-family: 'Times New Roman', serif; margin: 0; overflow: hidden; height: 100vh; display: flex; }
        .counter-area { flex: 7; position: relative; display: flex; justify-content: center; align-items: center; border-right: 1px solid var(--bar-border); background: #000; }
        
        /* 画像：絶対に画面内に収め、残光を加える */
        #sophie-image {
            max-width: 95%; max-height: 95%;
            box-shadow: 0 0 60px rgba(224, 172, 105, 0.15); 
            transition: opacity 1s;
        }

        /* チャットエリア */
        .chat-area { flex: 3; display: flex; flex-direction: column; background: rgba(255,255,255,0.01); }
        .chat-header { padding: 15px; border-bottom: 1px solid var(--bar-border); color: var(--bar-accent); font-weight: bold; text-align: center; font-family: sans-serif; letter-spacing: 2px; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; font-family: sans-serif; font-size: 0.85rem; line-height: 1.6; }
        .message { margin-bottom: 15px; }
        .message.sophie { text-align: left; color: var(--bar-text); }
        .chat-input-area { padding: 15px; border-top: 1px solid var(--bar-border); display: flex; gap: 10px; }
        #chat-input { flex: 1; background: #111; border: 1px solid var(--bar-border); color: var(--bar-text); padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="counter-area">
        <img id="sophie-image" src="./sophie_shake.png?v=123" alt="Sophie is Shaking...">
    </div>

    <aside class="chat-area">
        <div class="chat-header">PRIVATE CONVERSATION</div>
        <div class="chat-messages" id="chat-messages">
            <div class="message sophie">いらっしゃいませ、ご主人様。……画像が表示されない？ それは、無粋な真似を……。</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="彼女に語りかける...">
        </div>
    </aside>

</body>
</html>
