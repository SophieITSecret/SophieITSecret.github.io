<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Bar Sophie - Modular PC v13.0</title>
    <link rel="stylesheet" href="css/style_pc.css">
</head>
<body>
    <div id="entry-overlay"><button class="entry-btn" onclick="enterBar()">🥃 Bar Sophie に入店する</button></div>
    
    <div id="left-panel">
        <div id="sophie-main"><img id="sophie-image" src="./sophie_shake.png" alt="Sophie"></div>
        <div id="chat-area">まきむら様、今夜はどのようなお時間になさいますか？</div>
    </div>
    
    <div id="right-panel">
        <div class="monitor-frame">
            <iframe id="yt-iframe" src="" allow="autoplay"></iframe>
            <img id="monitor-image" src="" alt="Sake Image">
            <div id="telop-box"></div>
        </div>
        <div class="jukebox-controls">
            <div id="menu-layer">
                <button class="back-btn" onclick="handleMasterBack()">← 戻る</button>
                <div class="menu-list" id="menu-content"></div>
            </div>
            <div class="btn-group">
                <button class="action-btn request-btn" onclick="openMusicMenu()">🎵 選曲リクエスト</button>
                <button class="action-btn talk-btn" onclick="openTalkGenres()">🥃 お酒の話題</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app_pc.js"></script>
</body>
</html>
