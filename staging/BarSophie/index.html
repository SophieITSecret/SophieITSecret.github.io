<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Bar Sophie (Staging v1.9)</title>
    <style>
        :root { 
            --bar-bg: #010103; 
            --bar-accent: #f0b56e; 
            --bar-text: #f0f0f0;
            --bar-border: #2a2a3a;
        }
        body { 
            background-color: var(--bar-bg);
            color: var(--bar-text); 
            font-family: 'Times New Roman', serif;
            margin: 0; overflow: hidden; height: 100vh; display: flex;
        }

        /* カウンターエリア：背景に「物理的な灯り」を配置 */
        .counter-area {
            flex: 7; position: relative; display: flex; justify-content: center; align-items: center;
            border-right: 1px solid var(--bar-border);
            background: #000;
            overflow: hidden;
        }
        
        /* 背後のスポットライト：これが「真っ暗」を防ぎます */
        .back-light {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(240, 181, 110, 0.15) 0%, transparent 70%);
            z-index: 1;
            filter: blur(30px);
        }

        #sophie-image {
            max-width: 92%; max-height: 96%;
            filter: drop-shadow(0 0 40px rgba(240, 181, 110, 0.4));
            z-index: 2;
        }

        /* チャット・操作エリア */
        .chat-area { flex: 3; display: flex; flex-direction: column; background: #08080a; z-index: 3; }
        .chat-header { padding: 15px; border-bottom: 1px solid var(--bar-border); color: var(--bar-accent); font-weight: bold; text-align: center; letter-spacing: 3px; }
        
        .jukebox { padding: 10px; border-bottom: 1px solid var(--bar-border); background: #111; text-align: center; }
        .music-btn { background: none; border: 1px solid var(--bar-accent); color: var(--bar-accent); padding: 6px 12px; font-size: 0.75rem; cursor: pointer; margin: 3px; border-radius: 4px; }
        .music-btn:hover { background: var(--bar-accent); color: #000; }
        .stop-btn { border-color: #ff4444; color: #ff4444; }

        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; font-family: sans-serif; font-size: 0.95rem; line-height: 1.6; }
        .message { margin-bottom: 18px; line-height: 1.4; }
        .message.sophie { border-left: 3px solid var(--bar-accent); padding-left: 12px; }
        .message.user { text-align: right; color: #666; font-size: 0.8rem; }

        .chat-input-area { padding: 20px; background: #000; border-top: 1px solid var(--bar-border); display: flex; gap: 10px; }
        #chat-input { flex: 1; background: #111; border: 1px solid var(--bar-border); color: var(--bar-text); padding: 12px; border-radius: 8px; outline: none; }
    </style>
</head>
<body>

    <div class="counter-area">
        <div class="back-light"></div>
        <img id="sophie-image" src="./sophie_shake.png" alt="Sophie">
    </div>

    <aside class="chat-area">
        <div class="chat-header">BAR SOPHIE</div>

        <div class="jukebox">
            <button class="music-btn" onclick="playMusic('fEvM-OUbaKs', 'Sophie\'s Choice')">Sophie's Choice</button>
            <button class="music-btn" onclick="playMusic('jfKfPfyJRdk', 'Lofi Night')">Lofi Night</button>
            <button class="music-btn" onclick="playMusic('5_mID9Z02Sk', 'Midnight Piano')">Piano</button>
            <button class="music-btn stop-btn" onclick="stopMusic()">Stop</button>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="message sophie">ご主人様、もう一度……灯りを付け直し、レコードも入れ替えました。いかがでしょう？</div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="彼女に話しかける...">
        </div>
        
        <div id="yt-wrap" style="position: absolute; pointer-events: none; opacity: 0;"></div>
    </aside>

    <script>
        const input = document.getElementById('chat-input');
        const messages = document.getElementById('chat-messages');
        const ytWrap = document.getElementById('yt-wrap');

        function addMessage(text, side) {
            const div = document.createElement('div');
            div.className = `message ${side}`;
            div.innerText = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function playMusic(id, title) {
            // Chrome対策: 一度中身を完全に消してから再生成
            ytWrap.innerHTML = '';
            const iframe = document.createElement('iframe');
            iframe.width = "1"; iframe.height = "1";
            iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=0&rel=0&version=3`;
            iframe.allow = "autoplay";
            ytWrap.appendChild(iframe);
            addMessage(`${title} を選びました。お耳に合えば嬉しいですが。`, 'sophie');
        }

        function stopMusic() {
            ytWrap.innerHTML = '';
            addMessage("静寂に戻しますね。", 'sophie');
        }

        function handleChat() {
            const text = input.value.trim();
            if (text === '') return;
            addMessage(text, 'user');
            input.value = '';
            setTimeout(() => {
                let res = "ええ。";
                if (text.match(/酒|おすすめ/)) res = "今夜は、このボトルを開けましょうか。";
                addMessage(res, 'sophie');
            }, 800);
        }

        input.onkeypress = (e) => { if (e.key === 'Enter') handleChat(); };
    </script>
</body>
</html>
