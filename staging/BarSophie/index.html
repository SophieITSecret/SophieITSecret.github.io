<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Bar Sophie - PC Library v9.4</title>
    <style>
        :root { 
            --bar-bg: #050505; --bar-accent: #f0b56e; --neon-blue: #00d2ff; 
            --talk-blue: #2980b9; --request-green: #27ae60; --bar-text: #eee;
        }
        body { background-color: var(--bar-bg); color: var(--bar-text); margin: 0; font-family: "Hiragino Mincho ProN", serif; overflow: hidden; display: flex; height: 100vh; }

        /* 左側：ソフィーとチャット（黄金比：約6割） */
        #left-panel { flex: 6; display: flex; flex-direction: column; border-right: 1px solid #222; position: relative; }
        #sophie-main { flex: 7; display: flex; justify-content: center; align-items: center; overflow: hidden; background: #000; }
        #sophie-image { height: 100%; width: auto; object-fit: contain; }
        #chat-area { flex: 3; padding: 25px; font-size: 1.1rem; line-height: 1.8; color: #aaa; background: rgba(10,10,10,0.9); border-top: 1px solid #1a1a2e; }

        /* 右側：モニターとコントロール（黄金比：約4割） */
        #right-panel { flex: 4; display: flex; flex-direction: column; background: #0a0a0a; }
        
        .monitor-frame { 
            width: 100%; aspect-ratio: 16/9; background: #000; border-bottom: 2px solid var(--neon-blue);
            display: flex; justify-content: center; align-items: center; position: relative;
        }
        #yt-iframe { width: 100%; height: 100%; border: none; display: none; }
        #monitor-image { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
        
        /* PC用字幕テロップ */
        #telop-box {
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85);
            color: #fff; padding: 15px; font-size: 1rem; line-height: 1.5;
            min-height: 4em; display: none; box-sizing: border-box; z-index: 100;
        }

        .jukebox-controls { padding: 15px; flex: 1; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        
        /* メニューレイヤー */
        #menu-layer { flex: 1; background: #08080a; overflow-y: auto; border: 1px solid #222; display: none; flex-direction: column; }
        .menu-list { display: grid; grid-template-columns: 1fr; gap: 1px; }
        .genre-label { background: #1a1a2e; color: var(--bar-accent); padding: 8px 15px; font-weight: bold; font-size: 0.9rem; position: sticky; top: 0; }
        .menu-item { padding: 10px 15px; border-bottom: 1px solid #111; cursor: pointer; color: #bbb; transition: 0.2s; }
        .menu-item:hover { background: #1a1a2e; color: #fff; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .action-btn { padding: 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem; color: #fff; }
        .request-btn { background: var(--request-green); }
        .talk-btn { background: var(--talk-blue); }
        
        /* PC版：初期ボタン */
        #entry-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .entry-btn { padding: 20px 40px; font-size: 1.5rem; background: transparent; border: 2px solid var(--bar-accent); color: var(--bar-accent); cursor: pointer; transition: 0.3s; }
        .entry-btn:hover { background: var(--bar-accent); color: #000; }

        .back-btn { background: #222; color: var(--bar-accent); border: 1px solid #444; padding: 10px; cursor: pointer; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="entry-overlay">
        <button class="entry-btn" onclick="enterBar()">🥃 Bar Sophie に入店する</button>
    </div>

    <div id="left-panel">
        <div id="sophie-main"><img id="sophie-image" src="./sophie_shake.png" alt="Sophie"></div>
        <div id="chat-area">まきむら様、今夜はどのようなお時間になさいますか？</div>
    </div>

    <div id="right-panel">
        <div class="monitor-frame">
            <iframe id="yt-iframe" src="" allow="autoplay; encrypted-media"></iframe>
            <img id="monitor-image" src="" alt="Sake Image">
            <div id="telop-box"></div>
        </div>

        <div class="jukebox-controls">
            <div id="menu-layer">
                <button class="back-btn" id="master-back-btn" onclick="handleMasterBack()">← 戻る</button>
                <div class="menu-list" id="menu-content"></div>
            </div>

            <div class="btn-group">
                <button class="action-btn request-btn" onclick="openMusicMenu()">🎵 選曲リクエスト</button>
                <button class="action-btn talk-btn" onclick="openTalkGenres()">🥃 お酒の話題</button>
            </div>
            
            <div style="margin-top:auto; font-size: 0.8rem; color: #444; text-align: right;">Bar Sophie PC v9.4</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyC1Jvj7A03LCUVlcLZGMROJn5DU3D-l7JY", authDomain: "bar-sophie.firebaseapp.com", projectId: "bar-sophie", storageBucket: "bar-sophie.firebasestorage.app", messagingSenderId: "398354933251", appId: "1:398354933251:web:1afc2c3b879c2a50fa9036" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        let jboxData = []; let talkData = []; let menuState = "closed";
        let currentGenre = ""; let currentTheme = "";
        
        const menuLayer = document.getElementById('menu-layer');
        const menuContent = document.getElementById('menu-content');
        const telopBox = document.getElementById('telop-box');
        const monitorImage = document.getElementById('monitor-image');
        const ytIframe = document.getElementById('yt-iframe');

        window.enterBar = () => {
            document.getElementById('entry-overlay').style.display = 'none';
            (async () => { await setDoc(doc(db, "users", "makimura_p"), { last_visit: serverTimestamp(), type: "PC_v9.4" }); })();
            sophieSpeak("まきむら様、お帰りなさいませ。今夜は音楽になさいますか？ それとも、お酒の物語を楽しみましょうか？");
        };

        window.sophieSpeak = (text) => {
            window.speechSynthesis.cancel();
            document.getElementById('chat-area').innerText = text;
            if(text.length > 20) { telopBox.innerText = text; telopBox.style.display = 'block'; }
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ja-JP'; utter.rate = 1.05; utter.pitch = 1.1;
            utter.onend = () => { telopBox.style.display = 'none'; };
            window.speechSynthesis.speak(utter);
        };

        window.setMonitorMode = (type) => {
            ytIframe.style.display = (type === 'video') ? 'block' : 'none';
            monitorImage.style.display = (type === 'image') ? 'block' : 'none';
        };

        // CSV読み込み
        fetch('お酒の話.csv').then(res => res.text()).then(csv => {
            const lines = csv.split('\n').slice(1);
            talkData = lines.filter(l => l.trim()).map(line => {
                const c = line.split(',');
                return { id: c[0].trim(), genre: c[1].trim(), theme: c[2].trim(), title: c[3].trim(), content: c[5].trim() };
            });
        });
        fetch('JBoxメニュー.csv').then(res => res.text()).then(csv => {
            const lines = csv.split('\n').slice(1);
            jboxData = lines.filter(l => l.trim()).map(line => {
                const c = line.split(',');
                return { flag: c[0].trim(), artist: c[2].trim(), title: c[3].replace(/"/g,'').trim(), url: c[4].trim() };
            });
        });

        // 話題メニュー：第1階層
        window.openTalkGenres = () => {
            menuState = "talk-genres"; menuLayer.style.display = 'flex';
            menuContent.innerHTML = '<div class="genre-label">お酒のジャンル</div>';
            [...new Set(talkData.map(d => d.genre))].forEach(g => {
                const div = document.createElement('div'); div.className = "menu-item"; div.innerText = "📁 " + g;
                div.onclick = () => { currentGenre = g; openTalkThemes(g); };
                menuContent.appendChild(div);
            });
        };
        // 話題メニュー：第2階層
        window.openTalkThemes = (genre) => {
            menuState = "talk-themes";
            menuContent.innerHTML = `<div class="genre-label">${genre}</div>`;
            [...new Set(talkData.filter(d => d.genre === genre).map(d => d.theme))].forEach(t => {
                const div = document.createElement('div'); div.className = "menu-item"; div.innerText = "🏷️ " + t;
                div.onclick = () => openTalkStories(t);
                menuContent.appendChild(div);
            });
        };
        // 話題メニュー：第3階層
        window.openTalkStories = (theme) => {
            menuState = "talk-stories";
            menuContent.innerHTML = `<div class="genre-label">${theme}</div>`;
            talkData.filter(d => d.theme === theme).forEach(t => {
                const div = document.createElement('div'); div.className = "menu-item"; div.innerText = "🥃 " + t.title;
                div.onclick = () => {
                    setMonitorMode('image'); monitorImage.src = `./talk_images/${t.id}.jpg`;
                    sophieSpeak(t.content);
                };
                menuContent.appendChild(div);
            });
        };

        window.openMusicMenu = () => {
            menuState = "artists"; menuLayer.style.display = 'flex';
            menuContent.innerHTML = '<div class="genre-label">選曲リクエスト</div>';
            const genres = { 'E':'演歌', 'F':'フォーク', 'J':'歌謡曲', 'W':'洋楽', 'I':'インスト', 'S':'旅情・映像' };
            Object.keys(genres).forEach(f => {
                const artists = [...new Set(jboxData.filter(d => d.flag === f).map(d => d.artist))];
                if(!artists.length) return;
                const lbl = document.createElement('div'); lbl.className="genre-label"; lbl.innerText=genres[f];
                menuContent.appendChild(lbl);
                artists.forEach(a => {
                    const div = document.createElement('div'); div.className="menu-item"; div.innerText = "🎤 " + a;
                    div.onclick = () => {
                        menuState = "titles";
                        menuContent.innerHTML = `<div class="genre-label">${a}</div>`;
                        jboxData.filter(d => d.artist === a).forEach(d => {
                            const item = document.createElement('div'); item.className = "menu-item"; item.innerText = d.title;
                            item.onclick = () => {
                                sophieSpeak(a + "さんの、" + d.title + "ですね。かしこまりました。");
                                setMonitorMode('video');
                                const id = d.url.includes('v=') ? d.url.split('v=')[1].split('&')[0] : d.url; 
                                ytIframe.src = `https://www.youtube.com/embed/${id}?autoplay=1`;
                            };
                            menuContent.appendChild(item);
                        });
                    };
                    menuContent.appendChild(div);
                });
            });
        };

        window.handleMasterBack = () => {
            if (menuState === "talk-stories") openTalkThemes(currentGenre);
            else if (menuState === "talk-themes") openTalkGenres();
            else if (menuState === "titles") openMusicMenu();
            else { menuLayer.style.display = 'none'; menuState = "closed"; }
        };
    </script>
</body>
</html>
