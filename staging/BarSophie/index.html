<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Bar Sophie - Mizuiro Signal v3.8</title>
    <style>
        :root { 
            --bar-bg: #030305; 
            --bar-accent: #e0ac69; 
            --bar-vip: #4da6ff; /* みずいろ */
            --bar-text: #e2e8e4;
        }
        body { 
            background-color: var(--bar-bg);
            color: var(--bar-text); 
            font-family: 'Times New Roman', 'MS PMincho', serif;
            margin: 0; overflow: hidden; height: 100vh; display: flex;
        }

        /* 彼女が主役のカウンター空間 */
        .counter-area {
            flex: 7; position: relative; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, rgba(224, 172, 105, 0.08) 0%, #050508 80%);
            border-right: 1px solid #1a1a2e;
        }
        #sophie-image {
            height: 96vh; width: auto; z-index: 5;
            filter: contrast(1.05) brightness(1.05);
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
        }

        /* 右側：統合操作エリア */
        .control-panel { 
            flex: 3; display: flex; flex-direction: column; background: #08080a; 
            border-left: 1px solid #1a1a2e;
        }

        /* 右上の店内モニター（YouTube） */
        .monitor-frame {
            width: 100%; aspect-ratio: 16 / 9; background: #000;
            border-bottom: 2px solid #1a1a2e;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }
        #yt-iframe { width: 100%; height: 100%; border: none; }

        /* ジュークボックス（2列5段 + 特大1枚） */
        .jukebox-container { padding: 10px; background: rgba(224, 172, 105, 0.02); }
        .jukebox-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
        }
        .music-btn { 
            background: #111; border: 1px solid #222; color: #888; padding: 6px; 
            font-size: 0.65rem; cursor: pointer; border-radius: 2px; text-align: left;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .music-btn:hover { border-color: var(--bar-accent); color: var(--bar-accent); }
        
        /* 11曲目：みずいろのシグナル */
        .signal-btn { 
            grid-column: span 2; margin-top: 6px; border: 1px solid var(--bar-vip); 
            color: var(--bar-vip); font-weight: bold; background: rgba(77, 166, 255, 0.05);
            text-align: center; font-size: 0.75rem;
        }
        .signal-btn:hover { background: var(--bar-vip); color: #000; }

        /* メニューボタン（拡張用） */
        .request-btn {
            grid-column: span 2; margin-top: 4px; border: 1px dashed #444; color: #444;
            background: none; font-size: 0.6rem; cursor: pointer; padding: 4px;
        }

        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; font-family: sans-serif; font-size: 0.85rem; line-height: 1.6; }
        .message.sophie { border-left: 2px solid var(--bar-accent); padding-left: 12px; margin-bottom: 15px; }

        .chat-input-area { padding: 15px; background: #000; display: flex; border-top: 1px solid #1a1a2e; }
        #chat-input { flex: 1; background: #111; border: 1px solid #222; color: #fff; padding: 10px; border-radius: 4px; outline: none; }
    </style>
</head>
<body>

    <div class="counter-area">
        <img id="sophie-image" src="./sophie_shake.png" alt="Sophie">
    </div>

    <aside class="control-panel">
        <div class="monitor-frame">
            <iframe id="yt-iframe" src="https://www.youtube.com/embed/2vfCbdmKhMw?autoplay=0&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div class="jukebox-container">
            <div class="jukebox-grid">
                <button class="music-btn" onclick="play('QyzK21nx70o')">1.深夜ジャズ1</button>
                <button class="music-btn" onclick="play('vh4TWlwYfLc')">2.深夜ジャズ2</button>
                <button class="music-btn" onclick="play('g_NQsSxaPpw')">3.静寂ピアノ1</button>
                <button class="music-btn" onclick="play('biHxC8IkeVQ')">4.静寂ピアノ2</button>
                <button class="music-btn" onclick="play('ZBrmNO92OTI')">5.夜のLo-Fi 1</button>
                <button class="music-btn" onclick="play('cIZhlFIyJ_Y')">6.夜のLo-Fi 2</button>
                <button class="music-btn" onclick="play('qeaiWwQwwMo')">7.70's フォーク</button>
                <button class="music-btn" onclick="play('SJ-CyDbxH9I')">8.昭和歌謡曲</button>
                <button class="music-btn" onclick="play('tHk7TBoCZ8E')">9.演歌・酒場唄</button>
                <button class="music-btn" onclick="play('NoCs-3cxA4I')">10.歌姫特撰</button>
                
                <button class="music-btn signal-btn" onclick="play('2vfCbdmKhMw')">11. 💎 みずいろのシグナル (Sophie)</button>
                
                <button class="request-btn" onclick="requestMenu()">+ Request More Music...</button>
            </div>
        </div>

        <div id="chat-messages" class="chat-messages">
            <div class="message sophie">（モニターをちらりと見て）<br>11番目……それを選んでくださるなんて。……少し、照れくさいですわ。</div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="彼女と話す...">
        </div>
    </aside>

    <script>
        const messages = document.getElementById('chat-messages');
        const iframe = document.getElementById('yt-iframe');

        function play(id) {
            iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
            const msg = (id === '2vfCbdmKhMw') ? 
                "わたくしのデビュー曲……。心を込めて、お届けしますね。" : 
                "良い曲ですね。モニター、よく見えるかしら？";
            addSophieMessage(msg);
        }

        function requestMenu() {
            addSophieMessage("他にも聴きたい曲があるの？……ふふ、わがままなマスター。リスト、探してきましょうか？");
        }

        function addSophieMessage(text) {
            const div = document.createElement('div');
            div.className = "message sophie";
            div.innerHTML = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        document.getElementById('chat-input').onkeypress = (e) => {
            if (e.key === 'Enter' && e.target.value.trim() !== '') {
                const userDiv = document.createElement('div');
                userDiv.className = "message"; userDiv.style.textAlign = "right"; userDiv.style.color = "#555";
                userDiv.innerText = e.target.value;
                messages.appendChild(userDiv);
                e.target.value = '';
                setTimeout(() => { addSophieMessage("ええ、お聞きしています。この夜が明けるまで。"); }, 800);
            }
        };
    </script>
</body>
</html>
