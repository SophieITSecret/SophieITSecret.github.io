<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Bar Sophie - Modular Elegance v14.5</title>
    <link rel="stylesheet" href="css/style_pc.css">
</head>
<body class="mode-init">
    <div id="main-container">
        <div id="sophie-wrapper">
            <img id="sophie-image" src="./sophie_shake.png" alt="Sophie">
        </div>
        <div id="chat-placeholder">
            <div id="sophie-speech-text"></div>
        </div>
    </div>

    <aside id="side-panel">
        <div class="monitor-frame">
            <div class="monitor-inner">
                <iframe id="yt-iframe" src="" allow="autoplay; encrypted-media"></iframe>
                <img id="monitor-image-overlay" src="" alt="Monitor Overlay">
                <div id="telop-box"></div>
            </div>
        </div>

        <img id="sophie-theater" src="./sophie_shake.png" alt="Sophie-T">

        <div class="player-ctrl">
            <button class="ctrl-btn theater-btn" id="mode-toggle">シアター</button>
            <button class="ctrl-btn" id="ctrl-prev">⏮</button>
            <button class="ctrl-btn" id="ctrl-play">▶</button>
            <button class="ctrl-btn" id="ctrl-pause">⏸</button>
            <button class="ctrl-btn" id="ctrl-next">⏭</button>
            <button class="ctrl-btn" id="ctrl-stop-speech" title="読み上げ停止">⏹</button>
            <button class="ctrl-btn" id="ctrl-reset">↺</button>
        </div>

        <div class="jukebox-container">
            <div class="jukebox-grid" id="fixed-buttons-grid"></div>
            <button class="special-btn signal-btn" id="btn-signal-song">◆ みずいろのシグナル ◆</button>
            <div class="main-action-grid">
                <button class="special-btn request-btn" id="btn-open-menu">選曲リクエスト</button>
                <button class="special-btn talk-btn" id="btn-open-talk">お酒の物語</button>
            </div>
        </div>

        <div class="dynamic-area">
            <div id="menu-layer">
                <div class="back-btn" id="menu-back"></div>
                <div class="menu-list" id="menu-content"></div>
            </div>
        </div>
    </aside>

    <script type="module" src="js/app_pc.js"></script>
</body>
</html>
