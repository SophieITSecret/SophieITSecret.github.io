<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Bar Sophie - Mobile Ready v7.2</title>
    <style>
        :root { --bar-bg: #000; --bar-accent: #f0b56e; --signal-blue: #a2dff7; --neon-blue: #00d2ff; --request-green: #27ae60; --bar-text: #eee; --bar-border: #1a1a2e; --ui-font: "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; }
        
        body { background-color: var(--bar-bg); color: var(--bar-text); margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: row; font-family: var(--ui-font); }

        /* --- PC・横画面レイアウト --- */
        #main-container { flex: 7; position: relative; display: flex; justify-content: center; align-items: center; border-right: 1px solid var(--bar-border); overflow: hidden; }
        #sophie-image { height: 96vh; width: auto; z-index: 5; object-fit: contain; }
        #side-panel { flex: 3; display: flex; flex-direction: column; background: #08080a; z-index: 10; min-width: 320px; height: 100vh; }

        /* --- 【重要】スマホ・縦画面（画面幅が狭い時） --- */
        @media (max-width: 600px) {
            body { flex-direction: column; overflow-y: auto; }
            #main-container { flex: none; height: 40vh; border-right: none; border-bottom: 1px solid var(--bar-border); }
            #sophie-image { height: 100%; width: auto; }
            #side-panel { flex: none; width: 100%; min-width: 0; height: auto; }
            .monitor-frame { aspect-ratio: 16 / 9; }
        }

        /* --- 【重要】スマホ・横画面（画面が低い時） --- */
        @media (max-height: 500px) and (orientation: landscape) {
            #sophie-image { height: 100vh; width: auto; }
            #main-container { flex: 3; } /* 写真を小さく */
            #side-panel { flex: 7; min-width: 0; } /* パネルを広く */
            .monitor-frame { height: 150px; } /* モニターを少し小さくして操作域を確保 */
        }

        /* 以下、これまでのデザインを維持 */
        .monitor-frame { width: 100%; aspect-ratio: 16 / 9; background: #000; border-bottom: 2px solid var(--bar-border); }
        #yt-iframe { width: 100%; height: 100%; border: none; }
        .player-ctrl { display: flex; justify-content: center; gap: 5px; padding: 6px; background: #111; }
        .ctrl-btn { background: #222; border: 1px solid #444; color: #aaa; padding: 4px 8px; font-size: 0.9rem; cursor: pointer; border-radius: 4px; }
        .jukebox-container { padding: 5px; border-bottom: 1px solid var(--bar-border); }
        .jukebox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .music-btn { background: #050505; border: 1.2px solid rgba(0, 210, 255, 0.5); color: #fff; padding: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; border-radius: 4px; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .dynamic-area { flex: 1; position: relative; overflow-y: auto; background: #050505; min-height: 200px; }
        #menu-layer { position: absolute; inset: 0; background: #08080a; display: flex; flex-direction: column; }
        .menu-list { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 35px; gap: 1px; padding: 2px; }
        .menu-item { padding: 0 8px; border-bottom: 1px solid #1a1a1a; cursor: pointer; font-size: 1.1rem; color: #ccc; line-height: 35px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* シアターモード時のスマホ調整 */
        body.theater-mode #side-panel { width: 100vw; }
        body.theater-mode .dynamic-area { width: 100%; height: 30vh; position: relative; top: 0; left: 0; }
    </style>
</head>
<body>
    <div id="main-container">
        <img id="sophie-image" src="./sophie_shake.png" alt="Sophie">
    </div>
    <aside id="side-panel">
        <div class="monitor-frame"><iframe id="yt-iframe" src="" allow="autoplay; encrypted-media"></iframe></div>
        <div class="player-ctrl">
            <button class="ctrl-btn" id="mode-toggle" onclick="toggleTheater()">シアター</button>
            <button class="ctrl-btn" onclick="prevSong()">⏮</button>
            <button class="ctrl-btn" onclick="playCurrent()">▶</button>
            <button class="ctrl-btn" onclick="pauseSong()">⏸</button>
            <button class="ctrl-btn" onclick="nextSong()">⏭</button>
        </div>
        <div class="jukebox-container">
            <div class="jukebox-grid">
                <button class="music-btn" onclick="playFix('QyzK21nx70o')">深夜ジャズ 1</button>
                <button class="music-btn" onclick="playFix('vh4TWlwYfLc')">深夜ジャズ 2</button>
                <button class="music-btn" onclick="playFix('2vfCbdmKhMw')">◆ ｼｸﾞﾅﾙ ◆</button>
                <button class="music-btn" onclick="openMenu()">選曲リクエスト</button>
            </div>
        </div>
        <div class="dynamic-area">
            <div id="menu-layer" style="display:none;">
                <div class="back-btn" onclick="closeMenu()">← Chatに戻る</div>
                <div class="menu-list" id="menu-content"></div>
            </div>
        </div>
    </aside>

    </body>
</html>
