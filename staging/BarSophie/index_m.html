<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bar Sophie v10.0</title>
    <style>
        :root { --bg: #000; --accent: #f0b56e; --blue: #00d2ff; --green: #27ae60; --talk: #2980b9; --text: #eee; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: sans-serif; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- 1. 入口画面 --- */
        #entry-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #entry-sophie { flex: 1; max-width: 100%; object-fit: contain; }
        .btn-enter { margin-top: 20px; padding: 15px 40px; font-size: 1.2rem; background: none; border: 2px solid var(--accent); color: var(--accent); border-radius: 30px; font-weight: bold; cursor: pointer; }

        /* --- 2. 対面チャットモード --- */
        #chat-mode { display: none; flex-direction: column; height: 100%; }
        .sophie-portrait { flex: 6; display: flex; justify-content: center; align-items: center; background: #000; overflow: hidden; }
        .sophie-portrait img { height: 100%; width: auto; object-fit: contain; }
        .chat-balloon { flex: 3; padding: 20px; font-size: 1.1rem; line-height: 1.6; color: #ccc; border-top: 1px solid #1a1a2e; overflow-y: auto; background: #080808; }
        .nav-area { flex: 1; display: flex; padding: 10px; gap: 10px; }
        .btn-nav { flex: 1; background: #111; color: var(--accent); border: 1px solid var(--accent); border-radius: 8px; font-weight: bold; }

        /* --- 3. カウンター（メニュー）モード --- */
        #menu-mode { display: none; flex-direction: column; height: 100%; }
        .monitor { width: 100%; aspect-ratio: 16/9; background: #000; border-bottom: 2px solid var(--blue); position: relative; }
        #yt-iframe, #monitor-img { width: 100%; height: 100%; display: none; border: none; }
        #telop { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); padding: 10px; font-size: 0.9rem; min-height: 3.5em; display: none; z-index: 10; }

        /* コンソール（操作盤）：ソフィーを小さくし、ボタンを均等に */
        .console { height: 85px; background: #151515; display: flex; border-bottom: 1px solid #333; }
        .btn-grid { flex: 7.5; display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 5px; }
        .sophie-side { flex: 2.5; background: #000; display: flex; justify-content: center; align-items: center; border-left: 1px solid #222; }
        .sophie-side img { height: 85%; width: auto; }
        .c-btn { background: #222; border: 1px solid #444; color: #ccc; border-radius: 4px; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        .back-btn { font-size: 0.8rem; color: var(--accent); border-color: var(--accent); }

        /* リストエリア */
        .list-area { flex: 1; overflow-y: auto; background: #08080a; position: relative; }
        .main-choice { padding: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .act-btn { padding: 15px; border-radius: 8px; border: none; font-weight: bold; color: #fff; font-size: 1rem; }
        .m-bg { background: var(--green); } .t-bg { background: var(--talk); }

        #list-layer { position: absolute; inset: 0; background: #08080a; z-index: 100; display: none; flex-direction: column; }
        .list-scroll { flex: 1; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 1px; padding: 2px; }
        #list-layer.single .list-scroll { grid-template-columns: 1fr; }
        .label { grid-column: 1/-1; background: #1a1a2e; color: var(--accent); padding: 8px 12px; font-size: 0.9rem; font-weight: bold; position: sticky; top: 0; }
        .item { padding: 12px; border-bottom: 1px solid #111; color: #bbb; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .ver-tag { position: fixed; bottom: 2px; right: 5px; font-size: 10px; color: #333; }
    </style>
</head>
<body>

    <div id="entry-screen">
        <img id="entry-sophie" src="./sophie_shake.png">
        <button class="btn-enter" onclick="enter()">🥃 Bar Sophie に入店する</button>
    </div>

    <div id="chat-mode">
        <div class="sophie-portrait"><img src="./sophie_shake.png"></div>
        <div id="chat-text" class="chat-balloon">まきむら様、お帰りなさいませ。</div>
        <div class="nav-area">
            <button class="btn-nav" onclick="showMenu()">♪ カウンターへ進む</button>
        </div>
    </div>

    <div id="menu-mode">
        <div class="monitor">
            <iframe id="yt-iframe" allow="autoplay"></iframe>
            <img id="monitor-img">
            <div id="telop"></div>
        </div>
        <div class="console">
            <div class="btn-grid">
                <button class="c-btn" onclick="play()">▶</button>
                <button class="c-btn" onclick="pause()">⏸</button>
                <button class="c-btn" onclick="next()">⏭</button>
                <button class="c-btn back-btn" onclick="back()">戻る</button>
            </div>
            <div class="sophie-side"><img src="./sophie_shake.png"></div>
        </div>
        <div class="list-area">
            <div id="list-layer"><div class="list-scroll" id="content"></div></div>
            <div class="main-choice">
                <button class="act-btn m-bg" onclick="openMusic()">🎵 音楽選曲</button>
                <button class="act-btn t-bg" onclick="openTalk()">🥃 お酒の話</button>
            </div>
            <div style="padding:0 12px; display:grid; grid-template-columns:1fr 1fr; gap:6px;">
                <button class="c-btn" style="padding:10px; font-size:0.8rem" onclick="playFix('QyzK21nx70o')">Jazz 1</button>
                <button class="c-btn" style="padding:10px; font-size:0.8rem" onclick="playFix('vh4TWlwYfLc')">Jazz 2</button>
            </div>
        </div>
    </div>

    <div class="ver-tag">Ver 10.0</div>

    <script>
        let jData = [], tData = [], state = "none", curG = "";
        const layer = document.getElementById('list-layer'), cont = document.getElementById('content');
        const yt = document.getElementById('yt-iframe'), img = document.getElementById('monitor-img'), tel = document.getElementById('telop');

        function enter() {
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('chat-mode').style.display = 'flex';
            speak("まきむら様、お帰りなさいませ。今夜も良いお酒を。");
        }

        function showMenu() {
            document.getElementById('chat-mode').style.display = 'none';
            document.getElementById('menu-mode').style.display = 'flex';
        }

        function speak(txt) {
            window.speechSynthesis.cancel();
            if(txt.length > 15) { tel.innerText = txt; tel.style.display = 'block'; }
            const u = new SpeechSynthesisUtterance(txt); u.lang = 'ja-JP'; u.rate = 1.05;
            u.onend = () => { tel.style.display = 'none'; };
            window.speechSynthesis.speak(u);
            if(document.getElementById('chat-mode').style.display === 'flex') {
                document.getElementById('chat-text').innerText = txt;
            }
        }

        function setMon(mode, src) {
            if(mode === 'v') { img.style.display = 'none'; yt.style.display = 'block'; yt.src = `https://www.youtube.com/embed/${src}?autoplay=1`; }
            else { yt.style.display = 'none'; img.style.display = 'block'; img.src = src; }
        }

        // CSV読み込み (JBox: 歌手名でグループ化)
        fetch('JBoxメニュー.csv').then(r => r.text()).then(csv => {
            const lines = csv.split('\n').slice(1);
            const genres = { 'E':'演歌', 'F':'フォーク', 'J':'歌謡曲', 'W':'洋楽', 'I':'インスト', 'S':'旅情・映像' };
            jData = lines.filter(l => l.trim()).map(l => {
                const c = l.split(',');
                return { f: c[0].trim(), gName: genres[c[0].trim()] || "その他", a: c[2].trim(), ti: c[3].replace(/"/g,'').trim(), u: c[4].trim() };
            });
        });

        fetch('sake_talk.csv').then(r => r.text()).then(csv => {
            const lines = csv.split('\n').slice(1);
            tData = lines.filter(l => l.trim()).map(l => {
                const c = l.split(',');
                return { id: c[0].trim(), g: c[1].trim(), th: c[2].trim(), ti: c[3].trim(), txt: c[5].trim() };
            });
        });

        function openMusic() {
            state = "art"; layer.classList.remove('single'); layer.style.display = 'flex';
            cont.innerHTML = "";
            const flags = ['E', 'F', 'J', 'W', 'I', 'S'];
            flags.forEach(flag => {
                const artists = [...new Set(jData.filter(d => d.f === flag).map(d => d.a))];
                if(artists.length) {
                    const groupName = jData.find(d => d.f === flag).gName;
                    cont.innerHTML += `<div class="label">${groupName}</div>`;
                    artists.forEach(a => {
                        const d = document.createElement('div'); d.className = "item"; d.innerText = "🎤 " + a;
                        d.onclick = () => {
                            state = "tit"; cont.innerHTML = `<div class="label">${a}</div>`;
                            jData.filter(m => m.a === a).forEach(m => {
                                const i = document.createElement('div'); i.className = "item"; i.innerText = m.ti;
                                i.onclick = () => { speak(a + "の" + m.ti); const id = m.u.split('v=')[1] || m.u; setMon('v', id); };
                                cont.appendChild(i);
                            });
                        };
                        cont.appendChild(d);
                    });
                }
            });
        }

        function openTalk() {
            state = "g"; layer.classList.remove('single'); layer.style.display = 'flex';
            cont.innerHTML = '<div class="label">お酒のジャンル</div>';
            [...new Set(tData.map(d => d.g))].forEach(g => {
                const d = document.createElement('div'); d.className = "item"; d.innerText = "📁 " + g;
                d.onclick = () => { curG = g; openThemes(g); }; cont.appendChild(d);
            });
        }
        function openThemes(g) {
            state = "th"; layer.classList.add('single');
            cont.innerHTML = `<div class="label">${g}</div>`;
            [...new Set(tData.filter(d => d.g === g).map(d => d.th))].forEach(t => {
                const d = document.createElement('div'); d.className = "item"; d.innerText = "🏷️ " + t;
                d.onclick = () => openStories(t); cont.appendChild(d);
            });
        }
        function openStories(t) {
            state = "st"; layer.classList.remove('single');
            cont.innerHTML = `<div class="label">${t}</div>`;
            tData.filter(d => d.th === t).forEach(d => {
                const i = document.createElement('div'); i.className = "item"; i.innerText = d.ti;
                i.onclick = () => { setMon('i', `./talk_images/${d.id}.jpg`); speak(d.txt); };
                cont.appendChild(i);
            });
        }

        function back() {
            if (state === "st") openThemes(curG);
            else if (state === "th") openTalk();
            else if (state === "tit") openMusic();
            else if (state === "art" || state === "g") { layer.style.display = 'none'; state = "none"; }
            else { document.getElementById('menu-mode').style.display = 'none'; document.getElementById('chat-mode').style.display = 'flex'; }
        }
        function playFix(id) { setMon('v', id); }
        function play() { yt.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*'); }
        function pause() { yt.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*'); }
        function next() {}
    </script>
</body>
</html>
