<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bar Sophie v14.7 Mobile</title>
    <link rel="stylesheet" href="css/style_m.css">
</head>
<body>
    <div id="entry-screen">
        <img id="entry-sophie" src="./sophie_shake.png">
        <button class="btn-enter" id="btn-enter">🥃 Bar Sophie に入る</button>
    </div>

    <div id="chat-mode">
        <div class="portrait"><img src="./sophie_shake.png" id="lounge-sophie"></div>
        <div class="chat-area" id="lounge-text">まきむら様、お帰りなさいませ。</div>
        <button class="btn-to-bar" id="btn-to-bar">カウンターへ進む</button>
    </div>

    <div id="main-ui">
        <div class="l-side">
            <div class="monitor">
                <iframe id="yt-iframe" allow="autoplay; encrypted-media"></iframe>
                <img id="monitor-img">
                <div id="telop"></div>
            </div>
        </div>
        <div class="r-side">
            <div class="console">
                <div class="btn-grid">
                    <button class="c-btn" id="ctrl-play">▶ 再生</button>
                    <button class="c-btn" id="ctrl-pause">⏸ 停止/再開</button>
                    <button class="c-btn" id="ctrl-back">← 戻る</button>
                    <button class="c-btn" id="btn-next">⏭ 次へ</button>
                </div>
                <div class="sophie-box" id="sophie-warp"><img src="./sophie_shake.png"></div>
            </div>
            <div class="scroll-area" id="main-scroll">
                <div id="nav-main">
                    <button class="act-btn" style="background:var(--green)" id="btn-music">🎵 音楽選曲 (リクエスト)</button>
                    <button class="act-btn" style="background:var(--talk)" id="btn-talk">🥃 お酒の話 (360本の物語)</button>
                </div>
                <div id="list-view" style="display:none;"></div>
                <div id="detail-view" style="display:none;"></div>
            </div>
        </div>
    </div>

    <div class="ver">v14.7m-wav</div>

    <audio id="talk-audio" style="display:none;"></audio>

    <script src="js/app_m.js"></script>
</body>
</html>
