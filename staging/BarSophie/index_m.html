<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bar Sophie v12.6</title>
    <style>
        :root { --bg: #000; --accent: #f0b56e; --blue: #00d2ff; --green: #27ae60; --text: #eee; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }

        /* 入口 */
        #entry-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #entry-sophie { max-height: 55dvh; width: 85%; object-fit: contain; margin-bottom: 20px; }
        .btn-enter { padding: 15px 45px; font-size: 1.2rem; background: #111; border: 2px solid var(--accent); color: var(--accent); border-radius: 40px; font-weight: bold; }

        /* ラウンジ */
        #chat-mode { display: none; flex-direction: column; height: 100%; background: #000; }
        .portrait { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .portrait img { height: 100%; width: auto; object-fit: contain; }
        .chat-area { height: 140px; padding: 20px; background: #080808; border-top: 1px solid #1a1a2e; color: #ccc; font-size: 1.1rem; text-align: center; }
        .btn-to-bar { padding: 15px; background: #111; border: 1px solid var(--accent); color: var(--accent); font-weight: bold; margin: 10px 20px; border-radius: 8px; }

        /* メインUI */
        #main-ui { display: none; flex: 1; flex-direction: column; height: 100%; overflow: hidden; }
        @media (orientation: landscape) { #main-ui { flex-direction: row !important; } .l-side { flex: 1.4 !important; border-right: 1px solid #333; } .r-side { flex: 1 !important; } }

        .monitor { width: 100%; aspect-ratio: 16/9; background: #000; border-bottom: 2px solid var(--blue); position: relative; flex-shrink: 0; }
        #yt-iframe, #monitor-img { width: 100%; height: 100%; border: none; display: none; object-fit: contain; }
        #telop { position: absolute; inset: 0; background: rgba(0,0,0,0.7); padding: 15px; font-size: 1.05rem; display: none; z-index: 1000; color: #fff; overflow-y: auto; line-height: 1.6; }

        /* 操作盤 */
        .console { height: 75px; background: #111; display: flex; border-bottom: 1px solid #333; flex-shrink: 0; }
        .btn-grid { flex: 1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; padding: 4px; }
        .sophie-box { width: 75px; background: #000; display: flex; justify-content: center; align-items: center; border-left: 1px solid #222; }
        .sophie-box img { height: 85%; width: auto; cursor: pointer; }
        .c-btn { background: #222; border: 1px solid #444; color: #eee; border-radius: 4px; font-size: 0.85rem; font-weight: bold; display: flex; align-items: center; justify-content: center; user-select: none; }
        
        /* オートプレイ中（⏭ボタン）の視覚効果 */
        .auto-active { border-color: var(--green) !important; color: var(--green) !important; box-shadow: inset 0 0 10px rgba(39, 174, 96, 0.3); }

        /* 下部エリア */
        .r-side { flex: 1; display: flex; flex-direction: column; min-height: 0; position: relative; }
        .scroll-area { flex: 1; overflow-y: scroll; background: #08080a; -webkit-overflow-scrolling: touch; }
        #nav-main { padding: 12px; }
        .act-btn { width: 100%; height: 45px; margin-bottom: 10px; border-radius: 8px; border: none; font-weight: bold; color: #fff; font-size: 1.1rem; }

        /* ★規律：ラベル28px、アイテム38px、発光（accent） */
        .label { background: #1a1a2e; color: var(--accent); padding: 0 12px; font-size: 0.8rem; font-weight: bold; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; height: 28px; line-height: 28px; }
        .item { height: 38px; line-height: 38px; padding: 0 15px; border-bottom: 1px solid #222; color: #ccc; font-size: 0.95rem; display: block; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        .active-item { background: var(--accent) !important; color: #000 !important; font-weight: bold; }

        .ver { position: fixed; bottom: 4px; right: 8px; font-size: 9px; color: #333; pointer-events: none; z-index: 10000; }
    </style>
</head>
<body>

    <div id="entry-screen">
        <img id="entry-sophie" src="./sophie_shake.png">
        <button class="btn-enter" onclick="enter()">🥃 Bar Sophie に入る</button>
    </div>

    <div id="chat-mode">
        <div class="portrait"><img src="./sophie_shake.png" onclick="goToBar()"></div>
        <div class="chat-area" id="lounge-text">まきむら様、お帰りなさいませ。</div>
        <button class="btn-to-bar" onclick="goToBar()">カウンターへ</button>
    </div>

    <div id="main-ui">
        <div class="l-side">
            <div class="monitor" onclick="stopSpeak()">
                <iframe id="yt-iframe" allow="autoplay; encrypted-media"></iframe>
                <img id="monitor-img">
                <div id="telop"></div>
            </div>
        </div>
        <div class="r-side">
            <div class="console">
                <div class="btn-grid">
                    <button class="c-btn" onclick="playHead()">▶ 再生/読上</button>
                    <button class="c-btn" onclick="togglePause()">⏸ 停止/再開</button>
                    <button class="c-btn" style="color:var(--accent);" onclick="handleBack()">← 戻る</button>
                    <button class="c-btn" id="btn-next" 
                            onpointerdown="handleNextDown(event)" 
                            onpointerup="handleNextUp(event)"
                            onpointerleave="handleNextUp(event)">⏭ 次へ</button>
                </div>
                <div class="sophie-box" onclick="sophieWarp()"><img src="./sophie_shake.png"></div>
            </div>
            <div class="scroll-area" id="main-scroll">
                <div id="nav-main">
                    <button class="act-btn" style="background:var(--green)" onclick="openMusic()">🎵 音楽選曲 (リクエスト)</button>
                    <button class="act-btn" style="background:var(--talk)" onclick="openTalk()">🥃 お酒の話 (140本の物語)</button>
                </div>
                <div id="list-view" style="display:none;"></div>
                <div style="height: 120px;"></div>
            </div>
        </div>
    </div>

    <div class="ver">v12.6 MASTER-FLOW</div>

    <script>
        let jData = [], tData = [], state = "none", curG = "", curP = [], curI = -1;
        let lastTelopTxt = "", isPaused = false, isMusicMode = false, isAutoPlay = false;
        let pressTimer = null;

        const mainScroll = document.getElementById('main-scroll'), navMain = document.getElementById('nav-main'), listView = document.getElementById('list-view');
        const yt = document.getElementById('yt-iframe'), img = document.getElementById('monitor-img'), tel = document.getElementById('telop');

        // YouTube再生終了検知
        window.addEventListener('message', (e) => {
            if (e.origin !== "https://www.youtube.com") return;
            try {
                const data = JSON.parse(e.data);
                if (data.event === "onStateChange" && data.info === 0 && isAutoPlay && isMusicMode) {
                    next(); // 曲終了 -> 次へ
                }
            } catch (err) {}
        });

        function enter() {
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('chat-mode').style.display = 'flex';
            speakNow("まきむら様、お帰りなさいませ。");
        }
        function goToBar() { document.getElementById('chat-mode').style.display = 'none'; document.getElementById('main-ui').style.display = 'flex'; window.speechSynthesis.cancel(); }
        function speakNow(txt) { document.getElementById('lounge-text').innerText = txt; const u = new SpeechSynthesisUtterance(txt); u.lang = 'ja-JP'; window.speechSynthesis.speak(u); }

        function extractYtId(url) {
            if (!url) return "";
            if (url.length === 11) return url;
            const match = url.match(/^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
            return (match && match[2].length === 11) ? match[2] : url;
        }

        // 表示とハイライトの更新
        function updateHighlight() {
            document.querySelectorAll('.item').forEach((el, idx) => {
                el.classList.toggle('active-item', idx === curI);
            });
            // 光っている場所に自動スクロール
            const active = document.querySelector('.active-item');
            if (active && !isAutoPlay) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }

        window.prepareMedia = (txt, isMusic) => {
            window.speechSynthesis.cancel();
            lastTelopTxt = txt; isMusicMode = isMusic; isPaused = false;
            tel.innerText = txt; tel.style.display = 'block'; tel.scrollTop = 0;
            if(isMusic) setTimeout(() => { if(tel.innerText === txt) tel.style.display = 'none'; }, 5000);
            updateHighlight();
        };

        window.playHead = () => {
            yt.contentWindow.postMessage('{"event":"command","func":"seekTo","args":[0, true]}', '*');
            yt.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            if(!isMusicMode && lastTelopTxt) startReading(lastTelopTxt);
        };

        function startReading(txt) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(txt);
            u.lang = 'ja-JP'; u.rate = 1.05;
            u.onend = () => { if(isAutoPlay && !isMusicMode) setTimeout(next, 1000); };
            window.speechSynthesis.speak(u);
        }

        window.togglePause = () => {
            if(!isPaused) { 
                yt.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*'); 
                window.speechSynthesis.pause(); isPaused = true; 
                isAutoPlay = false; updateAutoPlayUI(); // 停止で自動運転解除
            } else { 
                yt.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*'); 
                window.speechSynthesis.resume(); isPaused = false; 
            }
        };

        window.stopSpeak = () => { window.speechSynthesis.cancel(); tel.style.display = 'none'; };

        window.sophieWarp = () => {
            if (state !== "none") { listView.style.display = 'none'; navMain.style.display = 'block'; state = "none"; }
            else { document.getElementById('main-ui').style.display = 'none'; document.getElementById('chat-mode').style.display = 'flex'; speakNow("まきむら様、ごゆっくり。"); }
        };

        function setMon(mode, src) {
            yt.style.display = 'none'; img.style.display = 'none'; yt.src = "";
            setTimeout(() => {
                if(mode === 'v') { 
                    const vid = extractYtId(src);
                    yt.style.display = 'block'; yt.src = `https://www.youtube.com/embed/${vid}?autoplay=1&enablejsapi=1&rel=0`; 
                } else { img.style.display = 'block'; img.src = src; }
            }, 50);
        }

        // ⏭ボタンの長押し処理
        window.handleNextDown = (e) => {
            pressTimer = setTimeout(() => {
                isAutoPlay = !isAutoPlay;
                updateAutoPlayUI();
                pressTimer = null;
            }, 500);
        };
        window.handleNextUp = (e) => {
            if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; next(); }
        };
        function updateAutoPlayUI() {
            document.getElementById('btn-next').classList.toggle('auto-active', isAutoPlay);
        }

        window.next = () => {
            if(curI < curP.length - 1) {
                curI++;
                const m = curP[curI];
                if (isMusicMode) {
                    setMon('v', m.u);
                    prepareMedia(m.a+'さんの'+m.ti+'です', true);
                } else {
                    setMon('i', `./talk_images/${m.id}.jpg`);
                    prepareMedia(m.txt, false);
                    if(isAutoPlay) startReading(m.txt);
                }
            } else {
                isAutoPlay = false; updateAutoPlayUI();
            }
        };

        // CSV読み込み
        const loadCSVs = () => {
            fetch('JBoxメニュー.csv').then(r => r.text()).then(csv => {
                const lines = csv.split('\n').slice(1);
                const gMap = { 'E':'演歌', 'F':'フォーク', 'J':'歌謡曲', 'W':'洋楽', 'I':'インスト', 'S':'旅情・映像' };
                jData = lines.filter(l => l.includes(',')).map(l => {
                    const c = l.split(',').map(s => s.trim());
                    return { f: c[0], gName: gMap[c[0]] || "他", a: c[2], ti: (c[3]||"").replace(/"/g,''), u: c[4] };
                }).filter(d => d && d.a);
            });
            fetch('お酒の話.csv').then(r => r.text()).then(csv => {
                const lines = csv.split('\n').slice(1);
                tData = lines.filter(l => l.includes(',')).map(l => {
                    const c = l.split(',').map(s => s.trim());
                    if (c.length < 6 || !c[1]) return null;
                    return { id: c[0], g: c[1], th: c[2], ti: c[3], txt: c[5] };
                }).filter(d => d);
            });
        };
        loadCSVs();

        window.openMusic = () => {
            state = "art"; let h = "";
            ['E','F','J','W','I','S'].forEach(f => {
                const arts = [...new Set(jData.filter(d => d.f === f).map(d => d.a))];
                if(arts.length) {
                    h += `<div class="label">${jData.find(d => d.f === f).gName}</div>`;
                    arts.forEach(a => { h += `<div class="item" onclick="renderSongs('${a}')">🎤 ${a}</div>`; });
                }
            });
            renderList(h);
        };
        window.renderSongs = (a) => {
            state = "tit"; isMusicMode = true; let h = `<div class="label">${a}</div>`;
            curP = jData.filter(m => m.a === a);
            curP.forEach((m, i) => { h += `<div class="item" onclick="curI=${i}; setMon('v','${m.u}'); prepareMedia('${a}さんの${m.ti}です', true);">${m.ti}</div>`; });
            renderList(h);
        };
        window.openTalk = () => {
            state = "g"; let h = '<div class="label">お酒のジャンル</div>';
            [...new Set(tData.map(d => d.g))].forEach(g => { h += `<div class="item" onclick="curG='${g}'; openThemes('${g}')">📁 ${g}</div>`; });
            renderList(h);
        };
        window.openThemes = (g) => {
            state = "th"; let h = `<div class="label">${g}</div>`;
            [...new Set(tData.filter(d => d.g === g).map(d => d.th))].forEach(t => { h += `<div class="item" onclick="openStories('${t}')">🏷️ ${t}</div>`; });
            renderList(h);
        };
        window.openStories = (t) => {
            state = "st"; isMusicMode = false; let h = `<div class="label">${t}</div>`;
            curP = tData.filter(d => d.th === t);
            curP.forEach((d, i) => { h += `<div class="item" onclick="curI=${i}; setMon('i','./talk_images/${d.id}.jpg'); prepareMedia(\`${d.txt}\`, false);">${d.ti}</div>`; });
            renderList(h);
        };

        function renderList(html) { navMain.style.display = 'none'; listView.style.display = 'block'; listView.innerHTML = html; mainScroll.scrollTop = 0; }
        window.handleBack = () => {
            if (state === "st") openThemes(curG); else if (state === "th") openTalk(); else if (state === "tit") openMusic();
            else { listView.style.display = 'none'; navMain.style.display = 'block'; state = "none"; }
        };
    </script>
</body>
</html>
