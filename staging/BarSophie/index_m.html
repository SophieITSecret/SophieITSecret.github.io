<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bar Sophie Mobile - Harmony v9.0</title>
    <style>
        :root { 
            --bar-bg: #000; --bar-accent: #f0b56e; --neon-blue: #00d2ff; 
            --request-green: #27ae60; --bar-text: #eee; --bar-border: #1a1a2e;
            --ui-font: "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
        }
        body { background-color: var(--bar-bg); color: var(--bar-text); margin: 0; font-family: var(--ui-font); overflow-x: hidden; display: flex; flex-direction: column; min-height: 100dvh; }

        #sophie-container { flex: none; display: flex; justify-content: center; align-items: center; background: #000; }
        #sophie-image { height: 100%; width: auto; object-fit: contain; }

        body.chat-mode #sophie-container { height: 55dvh; }
        body.chat-mode #chat-area { height: 35dvh; border-top: 1px solid var(--bar-border); overflow-y: auto; padding: 15px; color: #888; }
        body.chat-mode #music-toggle-bar { height: 10dvh; display: flex; }
        body.chat-mode #player-section { display: none; }

        body.music-mode #sophie-container, body.music-mode #chat-area, body.music-mode #music-toggle-bar { display: none; }
        body.music-mode #player-section { display: flex; flex-direction: column; height: 100dvh; }

        .monitor-frame { width: 100vw; aspect-ratio: 16 / 9; background: #000; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--neon-blue); }
        #yt-iframe { width: 100%; height: 100%; border: none; }

        .console-box { display: flex; background: #111; padding: 5px; border-bottom: 1px solid #333; height: 115px; flex-shrink: 0; }
        .console-left { flex: 7; display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .console-right { flex: 3; background: #000; border-radius: 4px; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .small-sophie { height: 90%; width: auto; object-fit: contain; }

        .ctrl-btn { background: #222; border: 1px solid #444; color: #aaa; font-size: 1.1rem; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #master-back-btn { grid-column: span 2; color: var(--bar-accent); font-size: 0.95rem; font-weight: bold; background: #1a1a2e; border: 1.2px solid var(--bar-accent); }

        .music-toggle-btn { width: 100%; height: 100%; background: #0a0a0a; color: var(--neon-blue); border: none; font-size: 1.5rem; font-weight: bold; border-top: 2px solid var(--neon-blue); }

        .jukebox-area { flex: 1; background: #08080a; overflow-y: auto; position: relative; }
        #menu-layer { position: absolute; inset: 0; background: #08080a; z-index: 500; display: none; flex-direction: column; }
        
        .menu-list { flex: 1; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 35px; gap: 1px; padding: 2px; }
        .genre-label { grid-column: span 2; background: #0e0e1a; color: var(--bar-accent); padding: 0 10px; line-height: 35px; font-weight: bold; font-size: 0.9rem; border-bottom: 1px solid #222; }
        .menu-item { padding: 0 10px; border-bottom: 1px solid #111; line-height: 35px; color: #bbb; font-size: 1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .request-btn { width: 94%; margin: 8px 3%; padding: 10px; background: var(--request-green); color: #fff; border: none; border-radius: 6px; font-weight: bold; font-size: 1.1rem; }
        .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 0 10px 10px; }
        .quick-btn { background: #050505; border: 1px solid rgba(0,210,255,0.2); color: #ccc; padding: 8px; border-radius: 4px; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.9rem; }
    </style>
</head>
<body class="chat-mode">

    <div id="sophie-container"><img id="sophie-image" src="./sophie_shake.png" alt="Sophie"></div>
    <div id="chat-area">(まきむら様、ここにソフィーの言葉が綴られます)</div>
    
    <div id="music-toggle-bar">
        <button class="music-toggle-btn" onclick="sophieSpeak('まきむら様、選曲ですね。私がお手伝いします。', () => setMode('music'))">♪ Music & Menu</button>
    </div>

    <div id="player-section">
        <div class="monitor-frame"><iframe id="yt-iframe" src="" allow="autoplay; encrypted-media"></iframe></div>
        <div class="console-box">
            <div class="console-left">
                <button class="ctrl-btn" onclick="window.prevSong()">⏮</button>
                <button class="ctrl-btn" onclick="window.nextSong()">⏭</button>
                <button class="ctrl-btn" onclick="window.playCurrent()">▶</button>
                <button class="ctrl-btn" onclick="window.pauseSong()">⏸</button>
                <button class="ctrl-btn" id="master-back-btn" onclick="handleMasterBack()">← お店に戻る</button>
            </div>
            <div class="console-right"><img src="./sophie_shake.png" class="small-sophie" alt="S-Sophie"></div>
        </div>

        <div class="jukebox-area">
            <div id="menu-layer"><div class="menu-list" id="menu-content"></div></div>
            <button class="request-btn" onclick="window.openMenu()">選曲リクエスト (200曲+)</button>
            <div class="quick-grid">
                <button class="quick-btn" onclick="window.playFix('QyzK21nx70o')">深夜ジャズ 1</button>
                <button class="quick-btn" onclick="window.playFix('vh4TWlwYfLc')">深夜ジャズ 2</button>
                <button class="quick-btn" onclick="window.playFix('2vfCbdmKhMw')">◆ ｼｸﾞﾅﾙ ◆</button>
                <button class="quick-btn" onclick="window.playFix('tHk7TBoCZ8E')">演歌・酒場唄</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyC1Jvj7A03LCUVlcLZGMROJn5DU3D-l7JY", authDomain: "bar-sophie.firebaseapp.com", projectId: "bar-sophie", storageBucket: "bar-sophie.firebasestorage.app", messagingSenderId: "398354933251", appId: "1:398354933251:web:1afc2c3b879c2a50fa9036" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        (async () => { await setDoc(doc(db, "users", "makimura_p"), { name: "まきむら", last_visit: serverTimestamp(), version: "9.0_perfect_sync" }); })();

        let masterData = []; let currentPlaylist = []; let currentIndex = -1;
        let menuState = "closed";
        const masterBackBtn = document.getElementById('master-back-btn');

        // ★ソフィーが喋るための魔法（改良版）
        let currentUtterance = null; // ガベージコレクション対策で外に出す
        window.sophieSpeak = (text, callback) => {
            window.speechSynthesis.cancel();
            currentUtterance = new SpeechSynthesisUtterance(text);
            currentUtterance.lang = 'ja-JP';
            currentUtterance.rate = 1.05;
            currentUtterance.pitch = 1.15;

            // 喋り終わった後の処理
            currentUtterance.onend = () => {
                setTimeout(() => { if(callback) callback(); }, 500); // 0.5秒の余韻
            };

            // Brave等でonendが稀に発火しない場合の安全装置（1文字0.2秒計算）
            const safetyTimer = text.length * 200 + 1500;
            const timerId = setTimeout(() => {
                if(callback) { callback(); callback = null; }
            }, safetyTimer);

            // 実際に終わった時はタイマーを消す
            const originalCallback = callback;
            callback = () => { clearTimeout(timerId); if(originalCallback) originalCallback(); };

            window.speechSynthesis.speak(currentUtterance);
        };

        window.setMode = (mode) => { 
            document.body.className = (mode === 'music') ? 'music-mode' : 'chat-mode';
            if(mode === 'chat') window.closeMenu();
        };

        window.handleMasterBack = () => {
            if (menuState === "titles") { renderArtists(); } 
            else if (menuState === "artists") { window.closeMenu(); } 
            else { setMode('chat'); }
        };

        window.loadVideo = (url) => {
            const id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url; 
            document.getElementById('yt-iframe').src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&enablejsapi=1`; 
        };
        
        window.playFix = (url) => { window.loadVideo(url); };

        window.openMenu = () => { document.getElementById('menu-layer').style.display = 'flex'; renderArtists(); };
        window.closeMenu = () => { document.getElementById('menu-layer').style.display = 'none'; menuState = "closed"; masterBackBtn.innerText = "← お店に戻る"; };

        fetch('JBoxメニュー.csv').then(res => res.text()).then(csv => {
            const lines = csv.split('\n').slice(1);
            masterData = lines.filter(l => l.trim()).map(line => {
                const c = line.split(',');
                return { flag: c[0].trim(), artist: c[2].trim(), title: c[3].replace(/"/g,'').trim(), url: c[4].trim() };
            });
        });

        const renderArtists = () => {
            menuState = "artists"; masterBackBtn.innerText = "← お店に戻る";
            const menuContent = document.getElementById('menu-content');
            menuContent.innerHTML = "";
            const genres = { 'E':'演歌', 'F':'フォーク', 'J':'歌謡曲', 'W':'洋楽', 'I':'インスト', 'S':'旅情・映像' };
            Object.keys(genres).forEach(f => {
                const artists = [...new Set(masterData.filter(d => d.flag === f).map(d => d.artist))];
                if(!artists.length) return;
                const lbl = document.createElement('div'); lbl.className="genre-label"; lbl.innerText=genres[f];
                menuContent.appendChild(lbl);
                artists.forEach(a => {
                    const div = document.createElement('div'); div.className="menu-item"; div.innerText = "🎤 " + a;
                    div.onclick = () => renderTitles(a, f);
                    menuContent.appendChild(div);
                });
            });
        };

        const renderTitles = (artist, flag) => {
            menuState = "titles"; masterBackBtn.innerText = "← 歌手一覧へ戻る";
            const menuContent = document.getElementById('menu-content');
            menuContent.innerHTML = `<div class="genre-label" style="background:var(--bar-accent); color:#000;">${artist}</div>`;
            masterData.filter(d => d.artist === artist).forEach(d => {
                const div = document.createElement('div'); div.className = "menu-item"; div.innerText = d.title;
                div.onclick = () => { 
                    currentPlaylist = masterData.filter(m => m.artist === artist); 
                    currentIndex = currentPlaylist.findIndex(m => m.url === d.url); 
                    
                    // 確実に言い終わってから曲を流す
                    sophieSpeak(artist + 'さんの、' + d.title + 'ですね。かしこまりました。', () => {
                        window.loadVideo(d.url);
                    });
                };
                menuContent.appendChild(div);
            });
        };

        window.playCurrent = () => document.getElementById('yt-iframe').contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
        window.pauseSong = () => document.getElementById('yt-iframe').contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
        window.nextSong = () => { if(currentIndex >= 0) { currentIndex = (currentIndex + 1) % currentPlaylist.length; window.playFix(currentPlaylist[currentIndex].url); } };
        window.prevSong = () => { if(currentIndex >= 0) { currentIndex = (currentIndex - 1 + currentPlaylist.length) % currentPlaylist.length; window.playFix(currentPlaylist[currentIndex].url); } };
    </script>
</body>
</html>
