<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bar Sophie v23.2</title>
    <link rel="apple-touch-icon" href="bar_sophie.jpeg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="css/style_m.css?v=110">
</head>
<body>
    <div id="entry-screen">
        <div class="portrait-container"><img src="./sophie_shake.png"></div>
        <button class="btn-enter" id="btn-enter">🥃 ＢＡＲソフィーに入る</button>
    </div>

    <div id="chat-mode">
        <div class="portrait-container"><img src="./sophie_shake.png"></div>
        <div class="chat-area" id="lounge-text">いらっしゃいませ。</div>
        <button class="btn-to-bar" id="btn-to-bar">カウンターへ進む</button>
    </div>

    <div id="main-ui">
        <div class="l-side">
            <div class="monitor">
                <div id="yt-wrapper" style="display:none; width:100%; height:100%;"><div id="yt-player"></div></div>
                <img id="monitor-img" src="./front_sophie.jpeg">
                <div id="telop"></div>
            </div>
        </div>
        <div class="r-side">
            <div class="scroll-area" id="main-scroll">
                <div id="nav-main">
                    <button class="act-btn" style="background:var(--green)" id="btn-music">🎵 音楽選曲 (リクエスト)</button>
                    <button class="act-btn" style="background:var(--talk)" id="btn-talk">🥃 お酒の話 (360本の物語)</button>
                    <button class="act-btn" style="background:#8e44ad" id="btn-liquor">🍸 お酒データベース (800銘柄)</button>

                    <div id="disclaimer-text" style="font-size:0.55rem; color:#444; text-align:center; padding:40px 10px 10px; line-height:1.6;">
                        Amazonのアソシエイトとして、当サイトは適正販売により収入を得ています。<br>
                        当サイトの一部コンテンツは、生成AIで作成・編集されています。
                    </div>
                </div>
                <div id="list-view" style="display:none;"></div>
            </div>

            <div class="console">
                <div class="btn-grid" id="console-grid"></div>
                <div class="sophie-box" id="sophie-warp"><img src="./sophie_shake.png"></div>
            </div>
        </div>
    </div>
    <script type="module" src="js/app_m.js?v=110"></script>
</body>
</html>
