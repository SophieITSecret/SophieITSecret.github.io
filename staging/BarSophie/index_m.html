<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bar Sophie v22.1 Fixed</title>
    <link rel="apple-touch-icon" href="bar_sophie.jpeg">
    <meta name="apple-mobile-web-app-title" content="BARソフィー">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style_m.css?v=22_1">
</head>
<body>
    <div id="entry-screen">
        <img id="entry-sophie" src="./sophie_shake.jpg">
        <button class="btn-enter" id="btn-enter">🥃 ＢＡＲソフィーに入る</button>
    </div>

    <div id="chat-mode">
        <div class="portrait"><img src="./sophie_shake.jpg" id="lounge-sophie"></div>
        <div class="chat-area" id="lounge-text">いらっしゃいませ。</div>
        <button class="btn-to-bar" id="btn-to-bar">カウンターへ進む</button>
    </div>

    <div id="main-ui" style="display:none;">
        <div class="main-container">
            <div class="l-side">
                <div class="monitor" id="yt-wrapper">
                    <img id="monitor-img" src="./front_sophie.jpeg">
                    <div id="yt-player"></div>
                </div>
                <div class="telop-area"><div id="telop">Welcome to Bar Sophie</div></div>
            </div>

            <div class="r-side">
                <div id="main-panel">
                    <div id="nav-main">
                        <div id="main-btns">
                            </div>
                        <div id="main-credits" style="font-size:0.58rem; color:#444; text-align:center; padding:10px 4px 4px; line-height:1.7;">
                            Amazonのアソシエイトとして、当サイトは適正販売により収入を得ています。<br>
                            当サイトの一部コンテンツは、生成AIで作成・編集されています。
                        </div>
                    </div>
                    <div id="list-view" style="display:none;"></div>
                </div>
            </div>
        </div>

        <div class="console">
            <div class="btn-grid" id="console-grid">
                </div>
        </div>
    </div>

    <audio id="talk-audio"></audio>
    <script type="module" src="app_m.js"></script>
</body>
</html>
