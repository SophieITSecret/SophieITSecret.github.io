<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bar Sophie v9.8</title>
    <style>
        :root { --bar-bg: #000; --bar-accent: #f0b56e; --neon-blue: #00d2ff; --req-g: #27ae60; --talk-b: #2980b9; }
        * { box-sizing: border-box; }
        body { background: var(--bar-bg); color: #eee; margin: 0; font-family: sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* 入口 */
        #entry-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #entry-sophie { max-width: 80%; max-height: 60%; object-fit: contain; margin-bottom: 30px; }
        .btn-enter { padding: 18px 50px; font-size: 1.2rem; background: none; border: 2px solid var(--bar-accent); color: var(--bar-accent); border-radius: 40px; font-weight: bold; }

        /* 店内メイン */
        #main-ui { display: none; flex-direction: column; height: 100%; }

        /* 上：モニター */
        .monitor { width: 100%; aspect-ratio: 16/9; background: #000; border-bottom: 2px solid var(--neon-blue); position: relative; flex-shrink: 0; }
        #yt-iframe, #monitor-img { width: 100%; height: 100%; display: none; object-fit: contain; border: none; }
        #telop { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 10px; font-size: 0.9rem; min-height: 3.5em; display: none; z-index: 10; }

        /* 中：操作盤とミニソフィー */
        .console { height: 90px; background: #111; display: flex; border-bottom: 1px solid #333; flex-shrink: 0; }
        .btns { flex: 7; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 5px; }
        .sophie-box { flex: 3; background: #000; display: flex; justify-content: center; align-items: center; border-left: 1px solid #222; }
        .sophie-box img { max-height: 85%; width: auto; }
        .c-btn { background: #222; border: 1px solid #444; color: #ccc; border-radius: 4px; font-size: 0.9rem; }
        .b-btn { color: var(--bar-accent); border-color: var(--bar-accent); }

        /* 下：メニューエリア（ここを広く！） */
        .menu-scroll { flex: 1; overflow-y: auto; background: #08080a; position: relative; }
        .top-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .action { padding: 15px; border-radius: 8px; border: none; font-weight: bold; color: #fff; font-size: 1.1rem; }
        .m-req { background: var(--req-g); }
        .t-req { background: var(--talk-b); }

        /* メニュー重ね合わせ */
        #menu-list-layer { position: absolute; inset: 0; background: #08080a; z-index: 100; display: none; flex-direction: column; }
        .list-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 1px; padding: 2px; }
        #menu-list-layer.single .list-grid { grid-template-columns: 1fr; }
        .label { grid-column: 1/-1; background: #1a1a2e; color: var(--bar-accent); padding: 8px; font-size: 0.9rem; position: sticky; top: 0; }
        .item { padding: 12px; border-bottom: 1px solid #111; color: #bbb; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .ver { position: fixed; bottom: 2px; right: 5px; font-size: 10px; color: #333; pointer-events: none; }
    </style>
</head>
<body>

    <div id="entry-screen">
        <img id="entry-sophie" src="./sophie_shake.png">
        <button class="btn-enter" onclick="enter()">🥃 Bar Sophie に入る</button>
    </div>

    <div id="main-ui">
        <div class="monitor">
            <iframe id="yt-iframe" allow="autoplay"></iframe>
            <img id="monitor-img">
            <div id="telop"></div>
        </div>

        <div class="console">
            <div class="btns">
                <button class="c-btn" onclick="play()">▶ 再生</button>
                <button class="c-btn" onclick="pause()">⏸ 停止</button>
                <button class="c-btn b-btn" onclick="back()">← 戻る</button>
                <button class="c-btn" onclick="next()">⏭ 次へ</button>
            </div>
            <div class="sophie-box"><img src="./sophie_shake.png"></div>
        </div>

        <div class="menu-scroll">
            <div id="menu-list-layer"><div class="list-grid" id="content"></div></div>
            <div class="top-btns">
                <button class="action m-req" onclick="openMusic()">🎵 音楽</button>
                <button class="action t-req" onclick="openTalk()">🥃 お酒の話</button>
            </div>
            <div style="padding:10px; display:grid; grid-template-columns:1fr 1fr; gap:5px;">
                <button class="c-btn" style="padding:10px" onclick="playFix('QyzK21nx70o')">Jazz 1</button>
                <button class="c-btn" style="padding:10px" onclick="playFix('vh4TWlwYfLc')">Jazz 2</button>
            </div>
        </div>
    </div>
    <div class="ver">Ver 9.8</div>

    <script>
        let jData = [], tData = [], state = "none", curG = "";
        const layer = document.getElementById('menu-list-layer'), cont = document.getElementById('content');
        const yt = document.getElementById('yt-iframe'), img = document.getElementById('monitor-img'), tel = document.getElementById('telop');

        function enter() {
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            speak("まきむら様、お帰りなさい。ゆっくりなさってくださいね。");
        }

        function speak(txt) {
            window.speechSynthesis.cancel();
            if(txt.length > 15) { tel.innerText = txt; tel.style.display = 'block'; }
            const u = new SpeechSynthesisUtterance(txt); u.lang = 'ja-JP'; u.rate = 1.1;
            u.onend = () => { tel.style.display = 'none'; };
            window.speechSynthesis.speak(u);
        }

        function setMon(mode, src) {
            if(mode === 'v') { img.style.display = 'none'; yt.style.display = 'block'; yt.src = `https://www.youtube.com/embed/${src}?autoplay=1`; }
            else { yt.style.display = 'none'; yt.src = ""; img.style.display = 'block'; img.src = src; }
        }

        // CSV (sake_talk.csv)
        fetch('sake_talk.csv').then(r => r.text()).then(csv => {
            const lines = csv.split('\n').slice(1);
            tData = lines.filter(l => l.trim()).map(l => {
                const c = l.split(',');
                return { id: c[0].trim(), g: c[1].trim(), th: c[2].trim(), ti: c[3].trim(), txt: c[5].trim() };
            });
        });
        // JBox
        fetch('JBoxメニュー.csv').then(r => r.text()).then(csv => {
            const lines = csv.split('\n').slice(1);
            jData = lines.filter(l => l.trim()).map(l => {
                const c = l.split(',');
                return { f: c[0].trim(), a: c[2].trim(), ti: c[3].replace(/"/g,'').trim(), u: c[4].trim() };
            });
        });

        function openTalk() {
            state = "g"; layer.classList.remove('single'); layer.style.display = 'flex';
            cont.innerHTML = '<div class="label">お酒のジャンル</div>';
            [...new Set(tData.map(d => d.g))].forEach(g => {
                const d = document.createElement('div'); d.className = "item"; d.innerText = "📁 " + g;
                d.onclick = () => { curG = g; openThemes(g); }; cont.appendChild(d);
            });
        }
        function openThemes(g) {
            state = "th"; layer.classList.add('single');
            cont.innerHTML = `<div class="label">${g}</div>`;
            [...new Set(tData.filter(d => d.g === g).map(d => d.th))].forEach(t => {
                const d = document.createElement('div'); d.className = "item"; d.innerText = "🏷️ " + t;
                d.onclick = () => openStories(t); cont.appendChild(d);
            });
        }
        function openStories(t) {
            state = "st"; layer.classList.remove('single');
            cont.innerHTML = `<div class="label">${t}</div>`;
            tData.filter(d => d.th === t).forEach(d => {
                const i = document.createElement('div'); i.className = "item"; i.innerText = d.ti;
                i.onclick = () => { setMon('i', `./talk_images/${d.id}.jpg`); speak(d.txt); };
                cont.appendChild(i);
            });
        }

        function openMusic() {
            state = "art"; layer.classList.remove('single'); layer.style.display = 'flex';
            cont.innerHTML = '<div class="label">選曲リクエスト</div>';
            [...new Set(jData.map(d => d.a))].forEach(a => {
                const d = document.createElement('div'); d.className = "item"; d.innerText = "🎤 " + a;
                d.onclick = () => {
                    state = "tit"; cont.innerHTML = `<div class="label">${a}</div>`;
                    jData.filter(m => m.a === a).forEach(m => {
                        const i = document.createElement('div'); i.className = "item"; i.innerText = m.ti;
                        i.onclick = () => { speak(a + "の" + m.ti); setMon('v', m.u.split('v=')[1] || m.u); };
                        cont.appendChild(i);
                    });
                };
                cont.appendChild(d);
            });
        }

        function back() {
            if (state === "st") openThemes(curG);
            else if (state === "th") openTalk();
            else if (state === "tit") openMusic();
            else { layer.style.display = 'none'; state = "none"; }
        }

        function playFix(id) { setMon('v', id); }
        function play() { yt.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*'); }
        function pause() { yt.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*'); }
        function next() {}
    </script>
</body>
</html>
