<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bar Sophie Mobile - Wide v9.6</title>
    <style>
        :root { 
            --bar-bg: #050505; --bar-accent: #f0b56e; --neon-blue: #00d2ff; 
            --request-green: #27ae60; --bar-text: #eee; --bar-border: #1a1a2e;
            --talk-blue: #2980b9;
        }
        body { background-color: var(--bar-bg); color: var(--bar-text); margin: 0; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100dvh; }

        /* 入口画面：ソフィーをドカンと出す */
        #entry-screen { position: fixed; inset: 0; background: #000; z-index: 3000; display: flex; flex-direction: column; align-items: center; }
        #entry-sophie { flex: 8; width: 100%; object-fit: contain; }
        .entry-btn-area { flex: 2; width: 100%; display: flex; justify-content: center; align-items: center; background: #000; }
        .entry-btn { padding: 15px 40px; font-size: 1.3rem; background: transparent; border: 2px solid var(--bar-accent); color: var(--bar-accent); border-radius: 30px; font-weight: bold; }

        /* バー店内レイアウト */
        #bar-layout { display: none; flex-direction: column; height: 100dvh; }

        /* 上部：モニター（画像とビデオ） */
        .monitor-frame { width: 100vw; aspect-ratio: 16 / 9; background: #000; border-bottom: 2px solid var(--neon-blue); position: relative; overflow: hidden; }
        #yt-iframe, #monitor-img { width: 100%; height: 100%; border: none; display: none; object-fit: contain; }
        #telop-box { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); color: #fff; padding: 8px; font-size: 0.9rem; min-height: 3em; display: none; z-index: 10; }

        /* 中部：操作パネルと小さなソフィー */
        .console-panel { height: 80px; background: #111; display: flex; border-bottom: 1px solid #333; }
        .controls { flex: 7; display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 5px; }
        .mini-sophie { flex: 3; background: #000; display: flex; justify-content: center; align-items: center; border-left: 1px solid #222; }
        .mini-sophie img { height: 90%; width: auto; }
        .ctrl-btn { background: #222; border: 1px solid #444; color: #aaa; border-radius: 4px; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        .back-home { grid-column: span 4; font-size: 0.85rem; color: var(--bar-accent); border-color: var(--bar-accent); background: #1a1a2e; }

        /* 下部：広大なメニューエリア */
        .menu-area { flex: 1; background: #08080a; overflow-y: auto; position: relative; }
        .main-buttons { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .action-btn { padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1rem; color: #fff; border: none; }
        .request-btn { background: var(--request-green); }
        .talk-btn { background: var(--talk-blue); }

        /* クイック選曲 */
        .quick-grid { padding: 0 10px 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .quick-btn { background: #111; border: 1px solid #222; color: #888; padding: 8px; border-radius: 4px; font-size: 0.85rem; text-align: left; }

        /* メニューレイヤー（全画面を覆う） */
        #menu-layer { position: absolute; inset: 0; background: #08080a; z-index: 2000; display: none; flex-direction: column; }
        .menu-list { flex: 1; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 1px; padding: 2px; }
        #menu-layer.single-col .menu-list { grid-template-columns: 1fr; }
        .genre-label { grid-column: 1 / -1; background: #1a1a2e; color: var(--bar-accent); padding: 8px 12px; font-weight: bold; font-size: 0.9rem; position: sticky; top: 0; }
        .menu-item { padding: 10px 12px; border-bottom: 1px solid #111; color: #bbb; font-size: 0.95rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

    <div id="entry-screen">
        <img id="entry-sophie" src="./sophie_shake.png">
        <div class="entry-btn-area">
            <button class="entry-btn" onclick="enterBar()">🥃 Bar Sophie に入る</button>
        </div>
    </div>

    <div id="bar-layout">
        <div class="monitor-frame">
            <iframe id="yt-iframe" allow="autoplay; encrypted-media"></iframe>
            <img id="monitor-img">
            <div id="telop-box"></div>
        </div>

        <div class="console-panel">
            <div class="controls">
                <button class="ctrl-btn" onclick="window.prevSong()">⏮</button>
                <button class="ctrl-btn" onclick="window.playCurrent()">▶</button>
                <button class="ctrl-btn" onclick="window.pauseSong()">⏸</button>
                <button class="ctrl-btn" onclick="window.nextSong()">⏭</button>
                <button class="ctrl-btn back-home" onclick="handleMasterBack()">← お店に戻る</button>
            </div>
            <div class="mini-sophie"><img src="./sophie_shake.png"></div>
        </div>

        <div class="menu-area">
            <div id="menu-layer"><div class="menu-list" id="menu-content"></div></div>
            <div class="main-buttons">
                <button class="action-btn request-btn" onclick="openMusicMenu()">🎵 選曲リクエスト</button>
                <button class="action-btn talk-btn" onclick="openTalkGenres()">🥃 お酒の話題</button>
            </div>
            <div class="quick-grid">
                <button class="quick-btn" onclick="playFix('QyzK21nx70o')">深夜ジャズ 1</button>
                <button class="quick-btn" onclick="playFix('vh4TWlwYfLc')">深夜ジャズ 2</button>
                <button class="quick-btn" onclick="playFix('2vfCbdmKhMw')">◆ ｼｸﾞナール ◆</button>
                <button class="quick-btn" onclick="playFix('tHk7TBoCZ8E')">演歌・酒場唄</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyC1Jvj7A03LCUVlcLZGMROJn5DU3D-l7JY", authDomain: "bar-sophie.firebaseapp.com", projectId: "bar-sophie", storageBucket: "bar-sophie.firebasestorage.app", messagingSenderId: "398354933251", appId: "1:398354933251:web:1afc2c3b879c2a50fa9036" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        let jboxData = [], talkData = [], menuState = "closed", currentGenre = "";
        const menuLayer = document.getElementById('menu-layer'), menuContent = document.getElementById('menu-content');
        const ytIframe = document.getElementById('yt-iframe'), monitorImg = document.getElementById('monitor-img'), telopBox = document.getElementById('telop-box');

        window.enterBar = () => {
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('bar-layout').style.display = 'flex';
            sophieSpeak("まきむら様、お帰りなさい。今夜は音楽になさいますか？ それとも、お酒の物語をお聞かせしましょうか？");
            (async () => { await setDoc(doc(db, "users", "makimura_p"), { last_visit: serverTimestamp(), mode: "Mobile_v9.6" }); })();
        };

        window.sophieSpeak = (text, callback) => {
            window.speechSynthesis.cancel();
            if(text.length > 20) { telopBox.innerText = text; telopBox.style.display = 'block'; }
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ja-JP'; utter.rate = 1.05;
            utter.onend = () => { telopBox.style.display = 'none'; if(callback) callback(); };
            window.speechSynthesis.speak(utter);
        };

        window.setMonitor = (type, src) => {
            if(type === 'video') { monitorImg.style.display = 'none'; ytIframe.style.display = 'block'; ytIframe.src = `https://www.youtube.com/embed/${src}?autoplay=1`; }
            else { ytIframe.style.display = 'none'; ytIframe.src = ""; monitorImg.style.display = 'block'; monitorImg.src = src; }
        };

        // CSV読み込み
        fetch('お酒の話.csv').then(res => res.text()).then(csv => {
            const lines = csv.split('\n').slice(1);
            talkData = lines.filter(l => l.trim()).map(line => {
                const c = line.split(',');
                return { id: c[0].trim(), genre: c[1].trim(), theme: c[2].trim(), title: c[3].trim(), content: c[5].trim() };
            });
        });
        fetch('JBoxメニュー.csv').then(res => res.text()).then(csv => {
            const lines = csv.split('\n').slice(1);
            jboxData = lines.filter(l => l.trim()).map(line => {
                const c = line.split(',');
                return { flag: c[0].trim(), artist: c[2].trim(), title: c[3].replace(/"/g,'').trim(), url: c[4].trim() };
            });
        });

        // 音楽メニュー
        window.openMusicMenu = () => {
            menuState = "artists"; menuLayer.classList.remove('single-col'); menuLayer.style.display = 'flex';
            menuContent.innerHTML = '<div class="genre-label">選曲リクエスト</div>';
            const genres = { 'E':'演歌', 'F':'フォーク', 'J':'歌謡曲', 'W':'洋楽', 'I':'インスト', 'S':'旅情・映像' };
            Object.keys(genres).forEach(f => {
                const artists = [...new Set(jboxData.filter(d => d.flag === f).map(d => d.artist))];
                if(artists.length) {
                    const lbl = document.createElement('div'); lbl.className="genre-label"; lbl.innerText=genres[f]; menuContent.appendChild(lbl);
                    artists.forEach(a => {
                        const div = document.createElement('div'); div.className="menu-item"; div.innerText = "🎤 " + a;
                        div.onclick = () => {
                            menuState = "titles"; menuContent.innerHTML = `<div class="genre-label">${a}</div>`;
                            jboxData.filter(d => d.artist === a).forEach(d => {
                                const item = document.createElement('div'); item.className = "menu-item"; item.innerText = d.title;
                                item.onclick = () => {
                                    sophieSpeak(a + "さんの、" + d.title + "ですね。");
                                    const id = d.url.includes('v=') ? d.url.split('v=')[1].split('&')[0] : d.url;
                                    setMonitor('video', id);
                                };
                                menuContent.appendChild(item);
                            });
                        };
                        menuContent.appendChild(div);
                    });
                }
            });
        };

        // お話メニュー
        window.openTalkGenres = () => {
            menuState = "talk-genres"; menuLayer.classList.remove('single-col'); menuLayer.style.display = 'flex';
            menuContent.innerHTML = '<div class="genre-label">お酒の話題</div>';
            [...new Set(talkData.map(d => d.genre))].forEach(g => {
                const div = document.createElement('div'); div.className = "menu-item"; div.innerText = "📁 " + g;
                div.onclick = () => { currentGenre = g; openTalkThemes(g); }; menuContent.appendChild(div);
            });
        };
        window.openTalkThemes = (genre) => {
            menuState = "talk-themes"; menuLayer.classList.add('single-col'); // 中テーマは1列
            menuContent.innerHTML = `<div class="genre-label">${genre}</div>`;
            [...new Set(talkData.filter(d => d.genre === genre).map(d => d.theme))].forEach(t => {
                const div = document.createElement('div'); div.className = "menu-item"; div.innerText = "🏷️ " + t;
                div.onclick = () => openTalkStories(t); menuContent.appendChild(div);
            });
        };
        window.openTalkStories = (theme) => {
            menuState = "talk-stories"; menuLayer.classList.remove('single-col'); // 個別は2列
            menuContent.innerHTML = `<div class="genre-label">${theme}</div>`;
            talkData.filter(d => d.theme === theme).forEach(t => {
                const div = document.createElement('div'); div.className = "menu-item"; div.innerText = t.title;
                div.onclick = () => { setMonitor('image', `./talk_images/${t.id}.jpg`); sophieSpeak(t.content); };
                menuContent.appendChild(div);
            });
        };

        window.handleMasterBack = () => {
            if (menuState === "talk-stories") openTalkThemes(currentGenre);
            else if (menuState === "talk-themes") openTalkGenres();
            else if (menuState === "titles") openMusicMenu();
            else if (menuState === "closed") { /* 何もしない */ }
            else { menuLayer.style.display = 'none'; menuState = "closed"; }
        };

        window.playFix = (id) => { setMonitor('video', id); };
        window.playCurrent = () => ytIframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
        window.pauseSong = () => ytIframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
        window.nextSong = () => {}; window.prevSong = () => {};
    </script>
</body>
</html>
