<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bar Sophie v10.7</title>
    <style>
        :root { --bg: #000; --accent: #f0b56e; --blue: #00d2ff; --green: #27ae60; --talk: #2980b9; --text: #eee; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

        /* 入口 */
        #entry-screen { position: fixed; inset: 0; background: #000; z-index: 9000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #entry-sophie { width: 85%; height: 60%; object-fit: contain; }
        .btn-enter { margin-top: 15px; padding: 12px 40px; font-size: 1.2rem; background: #111; border: 2px solid var(--accent); color: var(--accent); border-radius: 40px; font-weight: bold; }

        /* メインUI */
        #main-ui { display: none; height: 100dvh; width: 100vw; flex-direction: column; }
        
        /* 横画面レイアウト */
        @media (orientation: landscape) {
            #main-ui { flex-direction: row; }
            .left-side { flex: 1.3; display: flex; flex-direction: column; border-right: 1px solid #333; }
            .right-side { flex: 1; display: flex; flex-direction: column; }
            .monitor { aspect-ratio: auto !important; flex: 1 !important; }
        }

        .monitor { width: 100%; aspect-ratio: 16/9; background: #000; border-bottom: 1px solid var(--blue); position: relative; flex-shrink: 0; }
        #yt-iframe, #monitor-img { width: 100%; height: 100%; border: none; display: none; object-fit: contain; }
        #telop { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 5px 10px; font-size: 0.8rem; min-height: 2em; display: none; z-index: 100; pointer-events: none; color: #fff; }

        /* 操作盤 */
        .console { height: 75px; background: #111; display: flex; border-bottom: 1px solid #333; width: 100%; flex-shrink: 0; }
        .btn-grid { flex: 1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; padding: 4px; }
        .sophie-box { width: 75px; background: #000; display: flex; justify-content: center; align-items: center; border-left: 1px solid #222; }
        .sophie-box img { height: 90%; width: auto; }
        .c-btn { background: #222; border: 1px solid #444; color: #eee; border-radius: 3px; font-size: 0.85rem; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .back-btn { color: var(--accent); border-color: var(--accent); }

        /* メニューエリア */
        .scroll-area { flex: 1; overflow-y: auto; background: #08080a; position: relative; }
        .base-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 8px; }
        .act-btn { padding: 10px; border-radius: 5px; border: none; font-weight: bold; color: #fff; font-size: 0.95rem; }
        
        #list-layer { position: absolute; inset: 0; background: #08080a; z-index: 100; display: none; flex-direction: column; }
        .list-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 1px; padding-bottom: 40px; }
        #list-layer.single .list-grid { grid-template-columns: 1fr; }
        
        .label { grid-column: 1/-1; background: #1a1a2e; color: var(--accent); padding: 0 10px; font-size: 0.75rem; font-weight: bold; position: sticky; top: 0; z-index: 110; height: 24px; line-height: 24px; }
        .item { height: 32px; padding: 0 8px; border-bottom: 1px solid #111; color: #bbb; font-size: 0.9rem; display: flex; align-items: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .ver { position: fixed; bottom: 2px; left: 5px; font-size: 8px; color: #333; pointer-events: none; }
    </style>
</head>
<body>

    <div id="entry-screen">
        <img id="entry-sophie" src="./sophie_shake.png">
        <button class="btn-enter" onclick="enter()">🥃 Bar Sophie に入る</button>
    </div>

    <div id="main-ui">
        <div class="left-side">
            <div class="monitor">
                <iframe id="yt-iframe" allow="autoplay; encrypted-media"></iframe>
                <img id="monitor-img">
                <div id="telop"></div>
            </div>
        </div>

        <div class="right-side">
            <div class="console">
                <div class="btn-grid">
                    <button class="c-btn" onclick="play()">▶ 再生</button>
                    <button class="c-btn" onclick="pause()">⏸ 停止</button>
                    <button class="c-btn back-btn" onclick="back()">← 戻る</button>
                    <button class="c-btn" onclick="next()">⏭ 次へ</button>
                </div>
                <div class="sophie-box"><img src="./sophie_shake.png"></div>
            </div>
            <div class="scroll-area">
                <div id="list-layer"><div class="list-grid" id="cont"></div></div>
                <div class="base-btns">
                    <button class="act-btn" style="background:var(--green)" onclick="openMusic()">🎵 音楽選曲</button>
                    <button class="act-btn" style="background:var(--talk)" onclick="openTalk()">🥃 お酒の話</button>
                </div>
                <div style="padding:0 8px; display:grid; grid-template-columns:1fr 1fr; gap:4px;">
                    <button class="c-btn" style="height:32px; font-size:0.75rem;" onclick="playFix('QyzK21nx70o')">Jazz 1</button>
                    <button class="c-btn" style="height:32px; font-size:0.75rem;" onclick="playFix('vh4TWlwYfLc')">Jazz 2</button>
                </div>
            </div>
        </div>
    </div>
    <div class="ver">v10.7</div>

    <script>
        let jData = [], tData = [], state = "none", curG = "", curP = [], curI = -1;
        const layer = document.getElementById('list-layer'), cont = document.getElementById('cont');
        const yt = document.getElementById('yt-iframe'), img = document.getElementById('monitor-img'), tel = document.getElementById('telop');

        function enter() {
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            speak("まきむら様、お帰りなさいませ。");
        }

        function speak(txt) {
            window.speechSynthesis.cancel();
            if(txt.length > 3) {
                tel.innerText = txt; tel.style.display = 'block';
                setTimeout(() => { tel.style.display = 'none'; }, 3500);
            }
            const u = new SpeechSynthesisUtterance(txt); u.lang = 'ja-JP'; u.rate = 1.1;
            u.onend = () => { tel.style.display = 'none'; };
            window.speechSynthesis.speak(u);
        }

        function setMon(mode, src) {
            if(mode === 'v') { img.style.display = 'none'; yt.style.display = 'block'; yt.src = `https://www.youtube.com/embed/${src}?autoplay=1&enablejsapi=1&rel=0`; }
            else { yt.style.display = 'none'; yt.src = ""; img.style.display = 'block'; img.src = src; }
        }

        // CSV読み込み (Music)
        fetch('JBoxメニュー.csv').then(r => r.text()).then(csv => {
            const lines = csv.split('\n').slice(1);
            const gMap = { 'E':'演歌', 'F':'フォーク', 'J':'歌謡曲', 'W':'洋楽', 'I':'インスト', 'S':'旅情・映像' };
            jData = lines.filter(l => l.includes(',')).map(l => {
                const c = l.split(',').map(s => s.trim());
                return { f: c[0], gName: gMap[c[0]] || "他", a: c[2], ti: (c[3]||"").replace(/"/g,''), u: c[4] };
            }).filter(d => d && d.a);
        });

        // CSV読み込み (お酒の話 - 日本語名に修正！)
        fetch('お酒の話.csv').then(r => r.text()).then(csv => {
            const lines = csv.split('\n').slice(1);
            tData = lines.filter(l => l.includes(',')).map(l => {
                const c = l.split(',').map(s => s.trim());
                if (c.length < 6 || !c[1]) return null;
                return { id: c[0], g: c[1], th: c[2], ti: c[3], txt: c[5] };
            }).filter(d => d);
        });

        function openMusic() {
            state = "art"; layer.classList.remove('single'); layer.style.display = 'flex';
            cont.innerHTML = "";
            ['E','F','J','W','I','S'].forEach(f => {
                const arts = [...new Set(jData.filter(d => d.f === f).map(d => d.a))];
                if(arts.length) {
                    const groupItem = jData.find(d => d.f === f);
                    cont.innerHTML += `<div class="label">${groupItem ? groupItem.gName : "その他"}</div>`;
                    arts.forEach(a => {
                        const d = document.createElement('div'); d.className = "item"; d.innerText = "🎤 " + a;
                        d.onclick = () => renderSongs(a); cont.appendChild(d);
                    });
                }
            });
        }
        function renderSongs(a) {
            state = "tit"; cont.innerHTML = `<div class="label">${a}</div>`;
            const songs = jData.filter(m => m.a === a);
            songs.forEach(m => {
                const d = document.createElement('div'); d.className = "item"; d.innerText = m.ti;
                d.onclick = () => { speak(a + "の" + m.ti); curP = songs; curI = songs.indexOf(m); setMon('v', m.u.split('v=')[1] || m.u); };
                cont.appendChild(d);
            });
        }

        function openTalk() {
            state = "g"; layer.classList.remove('single'); layer.style.display = 'flex';
            cont.innerHTML = '<div class="label">お酒のジャンル</div>';
            const genres = [...new Set(tData.map(d => d.g))];
            genres.forEach(g => {
                const d = document.createElement('div'); d.className = "item"; d.innerText = "📁 " + g;
                d.onclick = () => { curG = g; openThemes(g); }; cont.appendChild(d);
            });
        }
        function openThemes(g) {
            state = "th"; layer.classList.add('single');
            cont.innerHTML = `<div class="label">${g}</div>`;
            [...new Set(tData.filter(d => d.g === g).map(d => d.th))].forEach(t => {
                const d = document.createElement('div'); d.className = "item"; d.innerText = "🏷️ " + t;
                d.onclick = () => openStories(t); cont.appendChild(d);
            });
        }
        function openStories(t) {
            state = "st"; layer.classList.remove('single');
            cont.innerHTML = `<div class="label">${t}</div>`;
            tData.filter(d => d.th === t).forEach(d => {
                const i = document.createElement('div'); i.className = "item"; i.innerText = d.ti;
                i.onclick = () => { setMon('i', `./talk_images/${d.id}.jpg`); speak(d.txt); };
                cont.appendChild(i);
            });
        }

        function back() {
            if (state === "st") openThemes(curG);
            else if (state === "th") openTalk();
            else if (state === "tit") openMusic();
            else { layer.style.display = 'none'; state = "none"; }
        }
        function playFix(id) { setMon('v', id); }
        function play() { yt.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*'); }
        function pause() { yt.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*'); }
        function next() { if(curI >= 0 && curI < curP.length-1) { curI++; setMon('v', curP[curI].u.split('v=')[1] || curP[curI].u); } }
    </script>
</body>
</html>
