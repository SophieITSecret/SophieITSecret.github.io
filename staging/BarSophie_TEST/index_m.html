<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bar Sophie v13.0 Modular</title>
    <link rel="apple-touch-icon" href="bar_sophie.jpeg">
    <meta name="apple-mobile-web-app-title" content="BARソフィー">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="css/style_m.css?v=22">

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithCustomToken,
                 getRedirectResult, signOut, onAuthStateChanged }
            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
        import { getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp }
            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

        const firebaseConfig = {
            //（ここに実際のfirebaseConfigを貼り付け）
              apiKey: "AIzaSyC1Jvj7A03LCUVlcLZGMROJn5DU3D-l7JY",
              authDomain: "bar-sophie.web.app",
              projectId: "bar-sophie",
              storageBucket: "bar-sophie.firebasestorage.app",
              messagingSenderId: "398354933251",
              appId: "1:398354933251:web:1afc2c3b879c2a50fa9036"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // fortune_haiku / restaurant_search: number = 1日あたり上限回数（B-level日次上限）
        // fortune_sonnet: 'ticket' = チケット消費, 'unlimited' = 無制限
        window.ACCESS_RULES = {
            guest:  { music: true, fortune_haiku: 0,   fortune_sonnet: false,       restaurant_search: 0,   compatibility: false, note: false },
            free:   { music: true, fortune_haiku: 1,   fortune_sonnet: 'ticket',    restaurant_search: 1,   compatibility: true,  note: true  },
            active: { music: true, fortune_haiku: 10,  fortune_sonnet: 'ticket',    restaurant_search: 10,  compatibility: true,  note: true  },
            vip:    { music: true, fortune_haiku: 999, fortune_sonnet: 'unlimited', restaurant_search: 999, compatibility: true,  note: true  },
            admin:  { music: true, fortune_haiku: 999, fortune_sonnet: 'unlimited', restaurant_search: 999, compatibility: true,  note: true  },
        };

        window.currentUser = null;
        window.currentUserData = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                window.currentUser = user;
                const userRef = doc(db, 'users', user.uid);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    window.currentUserData = userSnap.data();
                    await window.checkAndResetTickets(window.currentUserData);
                } else {
                    const newUser = {
                        uid: user.uid, email: user.email, name: user.displayName || user.email || '',
                        status: 'free', role: 'user',
                        purchasedTickets: 0,
                        dailyTickets: 0, weeklyTickets: 1,
                        lastDailyReset: null, lastWeeklyReset: null,
                        todaySearchCount: 0, lastSearchDate: null,
                        dailyFortuneBCount: 0, lastFortuneBDate: null,
                        createdAt: serverTimestamp(),
                    };
                    await setDoc(userRef, newUser);
                    window.currentUserData = newUser;
                }
                if (user.email === 'makimura@ms-forum.com') {
                    window.currentUserData.role = 'admin';
                }
                window.updateLoginUI();
                const _loginMsg = document.getElementById('login-msg');
                if (_loginMsg) _loginMsg.style.display = 'none';

                // カスタムトークンログイン後のカウンター画面遷移
                if (window._loginFromToken) {
                    window._loginFromToken = false;
                    const runTokenNav = () => {
                        const _es = document.getElementById('entry-screen');
                        const _cm = document.getElementById('chat-mode');
                        const _mu = document.getElementById('main-ui');
                        if (_es) _es.style.display = 'none';
                        if (_cm) _cm.style.display = 'none';
                        if (_mu) _mu.style.display = 'flex';
                        window._showRootMenu?.();
                        window._startCounterFlow?.();
                    };
                    if (window._appSetupDone) {
                        runTokenNav();
                    } else {
                        window._handleTokenNavOnSetup = runTokenNav;
                    }
                }

                // Stripe決済完了リダイレクト（?purchased=1）の処理
                const _urlParams = new URLSearchParams(window.location.search);
                if (_urlParams.get('purchased') === '1') {
                    history.replaceState({}, '', window.location.pathname);
                    const runPurchaseRedirect = async () => {
                        const _es = document.getElementById('entry-screen');
                        const _cm = document.getElementById('chat-mode');
                        const _mu = document.getElementById('main-ui');
                        if (_es) _es.style.display = 'none';
                        if (_cm) _cm.style.display = 'none';
                        if (_mu) _mu.style.display = 'flex';
                        const lv = document.getElementById('list-view');
                        const nm = document.getElementById('nav-main');
                        if (lv) {
                            lv.style.display = 'block';
                            lv.innerHTML = `
                                <div style="margin:10px; padding:20px; text-align:center;
                                            border-radius:10px; border:2px solid transparent;
                                            background: linear-gradient(#111,#111) padding-box,
                                            linear-gradient(120deg,#ff69b4 50%,#00d2ff 100%) border-box;">
                                    <div style="color:#f0b56e; font-size:0.9rem; margin-bottom:8px;">
                                        ご購入ありがとうございます！
                                    </div>
                                    <div style="color:#aaa; font-size:0.8rem;">
                                        マイページを更新しています...
                                    </div>
                                </div>`;
                        }
                        if (nm) nm.style.display = 'none';
                        const freshSnap = await getDoc(doc(db, 'users', user.uid));
                        if (freshSnap.exists()) {
                            window.currentUserData = freshSnap.data();
                            if (user.email === 'makimura@ms-forum.com') window.currentUserData.role = 'admin';
                            await window.checkAndResetTickets(window.currentUserData);
                        }
                        window.updateLoginUI();
                        import('./js/mypage.js').then(m => m.showMyPage(null));
                    };
                    if (window._appSetupDone) {
                        runPurchaseRedirect();
                    } else {
                        window._handlePurchaseOnSetup = runPurchaseRedirect;
                    }
                }

            } else {
                window.currentUser = null;
                window.currentUserData = null;
                window.updateLoginUI();
            }
        });

        getRedirectResult(auth).catch(() => {});

        // カスタムトークンログイン（GASからのリダイレクト受け取り）
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (token) {
            window._loginFromToken = true;
            window.history.replaceState({}, document.title, window.location.pathname);
            signInWithCustomToken(auth, token)
                .then((userCredential) => {
                    console.log('カスタムトークンログイン成功:', userCredential.user.email);
                })
                .catch((error) => {
                    console.error('カスタムトークンログイン失敗:', error);
                    window._loginFromToken = false;
                });
        }

        window.signInWithGoogle = () => {
            window.location.href = "https://bar-sophie-auth.vercel.app/api/callback";
        };

        window.signOutUser = async () => {
            await signOut(auth);
            alert('ログアウトしました。');
        };

        window.checkAccess = async (feature) => {
            const userData = window.currentUserData;
            if (!userData) {
                if (feature === 'music') return true;
                window.showLoginPrompt();
                return false;
            }
            const role = userData.role === 'admin' ? 'admin' : (userData.status || 'free');
            if (role === 'admin' || role === 'vip') return true;
            const rules = window.ACCESS_RULES[role] || window.ACCESS_RULES.free;

            // B-level fortune (Haiku) — 日次上限
            // app_m.js（メニュー表示）と fortune.js（選択時）の2回呼ばれるため
            // 1回目でカウント消費 + skip-next フラグをセット、2回目はフラグで素通り
            if (feature === 'fortune_haiku') {
                const limit = rules.fortune_haiku || 0;
                if (limit === 0) { window.showLoginPrompt(); return false; }
                if (userData._skipNext_fortune_haiku) {
                    userData._skipNext_fortune_haiku = false;
                    return true;
                }
                const today = new Date();
                const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
                const count = userData.lastFortuneBDate === todayStr ? (userData.dailyFortuneBCount || 0) : 0;
                if (count >= limit) { window.showSearchLimitPrompt(); return false; }
                const userRef = doc(db, 'users', userData.uid);
                await updateDoc(userRef, { lastFortuneBDate: todayStr, dailyFortuneBCount: count + 1 });
                userData.lastFortuneBDate = todayStr;
                userData.dailyFortuneBCount = count + 1;
                userData._skipNext_fortune_haiku = true;
                return true;
            }

            // B-level restaurant search — 日次上限（同上、2回呼ばれる）
            if (feature === 'restaurant_search') {
                const limit = rules.restaurant_search || 0;
                if (limit === 0) { window.showLoginPrompt(); return false; }
                if (userData._skipNext_restaurant_search) {
                    userData._skipNext_restaurant_search = false;
                    return true;
                }
                const today = new Date();
                const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
                const count = userData.lastSearchDate === todayStr ? (userData.todaySearchCount || 0) : 0;
                if (count >= limit) { window.showSearchLimitPrompt(); return false; }
                const userRef = doc(db, 'users', userData.uid);
                await updateDoc(userRef, { lastSearchDate: todayStr, todaySearchCount: count + 1 });
                userData.lastSearchDate = todayStr;
                userData.todaySearchCount = count + 1;
                userData._skipNext_restaurant_search = true;
                return true;
            }

            // A-level fortune (Sonnet) — チケット消費
            if (feature === 'fortune_sonnet') {
                if (!rules.fortune_sonnet) { window.showPurchasePrompt(); return false; }
                if (rules.fortune_sonnet === 'unlimited') return true;
                await window.checkAndResetTickets(userData);
                const total = (userData.dailyTickets || 0) + (userData.weeklyTickets || 0) + (userData.purchasedTickets || 0);
                if (total <= 0) { window.showPurchasePrompt(); return false; }
                return await window.consumeTicket(userData);
            }

            return !!rules[feature];
        };

        // 日次・週次チケット（dailyTickets/weeklyTickets）のリセット判定と Firestore 反映
        window.checkAndResetTickets = async (userData) => {
            if (!userData || !userData.uid) return;
            const role = userData.role === 'admin' ? 'admin' : (userData.status || 'free');
            if (role !== 'free' && role !== 'active') return;

            const today = new Date();
            const pad = n => String(n).padStart(2, '0');
            const todayStr = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
            const dow = today.getDay();
            const mon = new Date(today);
            mon.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
            const monStr = `${mon.getFullYear()}-${pad(mon.getMonth()+1)}-${pad(mon.getDate())}`;

            const updates = {};
            if (userData.lastDailyReset !== todayStr) {
                const alloc = role === 'active' ? 2 : 0;
                updates.dailyTickets = alloc;
                updates.lastDailyReset = todayStr;
                userData.dailyTickets = alloc;
                userData.lastDailyReset = todayStr;
            }
            if (userData.lastWeeklyReset !== monStr) {
                const alloc = role === 'active' ? 5 : 1;
                updates.weeklyTickets = alloc;
                updates.lastWeeklyReset = monStr;
                userData.weeklyTickets = alloc;
                userData.lastWeeklyReset = monStr;
            }
            if (Object.keys(updates).length > 0) {
                const userRef = doc(db, 'users', userData.uid);
                await updateDoc(userRef, updates);
            }
        };

        // dailyTickets → weeklyTickets → purchasedTickets の優先順でチケットを1枚消費
        window.consumeTicket = async (userData) => {
            const updates = {};
            if ((userData.dailyTickets || 0) > 0) {
                userData.dailyTickets -= 1;
                updates.dailyTickets = userData.dailyTickets;
            } else if ((userData.weeklyTickets || 0) > 0) {
                userData.weeklyTickets -= 1;
                updates.weeklyTickets = userData.weeklyTickets;
            } else if ((userData.purchasedTickets || 0) > 0) {
                userData.purchasedTickets -= 1;
                updates.purchasedTickets = userData.purchasedTickets;
            } else {
                return false;
            }
            const userRef = doc(db, 'users', userData.uid);
            await updateDoc(userRef, updates);
            return true;
        };

        window.showLoginPrompt = () => {
            import('./js/mypage.js').then(m => m.showWelcomePage(null));
        };

        window.showSearchLimitPrompt = () => {
            const lv = document.getElementById('list-view');
            const nm = document.getElementById('nav-main');
            if (lv) {
                lv.style.display = 'block';
                lv.innerHTML = `
                    <div style="margin:10px; border-radius:10px; border:2px solid transparent;
                                background: linear-gradient(#111, #111) padding-box,
                                linear-gradient(120deg, #ff69b4 50%, #00d2ff 100%) border-box;">
                        <div style="color:#f0b56e; padding:0 12px; font-size:0.8rem; font-weight:bold;
                                    border-bottom:1px solid #333; height:28px; line-height:28px;
                                    border-radius:8px 8px 0 0; display:flex; align-items:center; gap:6px;">
                            <img src="./sophie_face.png" style="width:20px; height:20px; border-radius:50%; object-fit:cover;">
                            ソフィーより
                        </div>
                        <div style="padding:16px; color:#ddd; font-size:0.85rem; line-height:1.9;">
                            今夜はもうこれ以上のご案内が難しい状況なのです。<br><br>
                            よろしければ、ご常連パスカード（月額300円）をご検討いただけますか？
                            チケットのご購入でも追加検索が可能でございます。<br><br>
                            <span style="color:#aaa; font-size:0.78rem;">
                            詳しくはマイページからご確認いただけます。
                            </span>
                        </div>
                        <div style="padding:0 10px 10px;">
                            <button id="sl-mypage" style="width:100%; background:#1a2a3a; color:#5ba3d9;
                                border:1px solid #1a5276; height:40px; border-radius:4px;
                                font-size:0.85rem; margin-bottom:8px;">👤 マイページを見る</button>
                            <button id="sl-close" style="width:100%; background:#34495e; color:#fff;
                                border:none; height:36px; border-radius:4px; font-size:0.85rem;">閉じる</button>
                        </div>
                    </div>`;
                if (nm) nm.style.display = 'none';
                document.getElementById('sl-mypage').onclick = () => window.openMyPage();
                document.getElementById('sl-close').onclick = () => {
                    lv.style.display = 'none';
                    if (nm) nm.style.display = 'flex';
                };
            }
        };

        window.showPurchasePrompt = () => {
            alert('この機能はご常連パスカード（月額300円）またはチケットが必要です。');
        };

        window.updateLoginUI = () => {
            const loginBtn = document.getElementById('login-btn');
            const userInfo = document.getElementById('user-info');
            if (!loginBtn || !userInfo) return;
            if (window.currentUser) {
                loginBtn.style.display = 'none';
                userInfo.style.display = 'flex';
                const nickname = window.currentUserData?.nickname
                    || window.currentUser.displayName
                    || window.currentUser.email;
                const isAdmin = window.currentUserData?.role === 'admin';
                userInfo.innerHTML = `
                    <span onclick="window.openMyPage()"
                        style="color:#f0b56e; font-size:0.75rem; cursor:pointer;">
                        ${isAdmin ? '👑 ' : '😊 '}${nickname}<span style="font-size:0.75em; color:#0096BF;">(MyPg)</span>
                    </span>`;
            } else {
                loginBtn.style.display = 'block';
                userInfo.style.display = 'none';
            }
        };

        window.openMyPage = () => {
            import('./js/mypage.js').then(m => {
                if (window.currentUser) {
                    m.showMyPage(null);
                } else {
                    m.showWelcomePage(null);
                }
            });
        };
    </script>
</head>
<body>
    <div id="entry-screen">
        <div class="entry-img-wrap">
            <img id="entry-sophie" src="./BarSophieTop_q85.jpg">
            <div class="entry-vignette"></div>
            <div class="entry-glow"></div>
        </div>
        <button class="btn-enter" id="btn-enter">お店に入る</button>
    </div>

    <div id="chat-mode">
        <div class="portrait">
            <div class="lounge-img-wrap">
                <img src="./BarSophieWelcom_q85.jpg" id="lounge-sophie">
                <div class="lounge-vignette"></div>
            </div>
        </div>
        <div class="chat-area" id="lounge-text">いらっしゃいませ。</div>
        <button class="btn-to-bar" id="btn-to-bar">カウンターへ</button>
    </div>

    <div id="main-ui">
        <div class="l-side">
            <div class="monitor">
                <div id="yt-wrapper" style="display:none; width:100%; height:100%;">
                    <div id="yt-player"></div>
                </div>
                <div id="chart-wrapper" style="display:none; width:100%; height:100%; position:absolute; top:0; left:0;"></div>
                <img id="monitor-img" style="display:none;">
                <div id="telop"></div>
            </div>
        </div>
        <div class="r-side">
            <div id="label-bar" style="display:flex; align-items:center;
                height:28px; background:#0a0a0a; border-bottom:1px solid #1a1a1a; padding:0 4px;">
                <div id="today-date-info" style="flex:1; overflow:hidden; padding-left:2px;"></div>
                <div style="display:flex; align-items:center; flex-shrink:0;">
                    <button id="login-btn" onclick="window.signInWithGoogle()"
                        style="background:#4285f4; color:#fff; border:none;
                        padding:3px 10px; border-radius:3px; font-size:0.7rem;
                        cursor:pointer; margin-right:6px;">
                        Gログイン
                    </button>
                    <button id="mypage-btn" onclick="window.openMyPage()"
                        style="display:none; background:none; color:#f0b56e; border:none;
                        padding:3px 6px; font-size:0.75rem; cursor:pointer; margin-right:6px;">
                    </button>
                    <div id="user-info" style="display:none; align-items:center; margin-right:6px;"></div>
                </div>
            </div>
            <div id="login-msg" style="display:none; padding:6px 10px;
                background:#0d1f0d; border-bottom:1px solid #1a4a2a;
                font-size:0.72rem; color:#a0d9a0; line-height:1.6;">
                Googleのログイン画面が開きます。ログイン後、こちらの画面にお戻りください。初回のみのご苦労です。
            </div>
            <div class="scroll-area" id="main-scroll">
                
            <div id="nav-main">
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px; padding:2px 12px 12px;">
        <div id="today-card" style="width:100%;"></div>
        <button class="act-btn" id="btn-notice"
                style="background:#0096BF; color:#ff51a8; border:2.5px solid #ff69b4; width:92%;
                       display:flex !important; flex-direction:column; align-items:center; justify-content:center;
                       height:auto; min-height:52px; gap:1px; padding:5px 8px;">
            <span>ソフィーと話す</span>
            <span style="font-size:0.62rem; color:rgba(255,255,255,0.72); font-weight:normal; line-height:1.3;">店探し｜占い｜この日どんな日｜じゃんけん｜ご案内</span>
        </button>
        <button class="act-btn" id="btn-music" style="background:var(--green); width:92%;">🎵 音楽リクエスト</button>
        <button class="act-btn" id="btn-sake" style="background:linear-gradient(to right, #2472a4 0%, #8e44ad 100%); width:92%;">🍸 お酒を探す／お酒の話</button>
        <button class="act-btn" id="btn-news" style="background:#1a3a4a; border:1px solid #00d2ff; width:92%;">📰 NEWS</button>
    </div>
</div>

                <div id="list-view" style="display:none;"></div>
            </div>
            <div id="disclaimer-bar" style="font-size:0.58rem; color:#444; text-align:center; padding:3px 10px; line-height:1.7; background:#050505; border-top:1px solid #1a1a1a;">
                Amazonのアソシエイトとして、当サイトは適正販売により収入を得ています。<br>
                当サイトの一部コンテンツは、生成AIで作成・編集されています。
            </div>
            <div class="console">
                <div class="btn-grid" id="console-grid">
                    <button class="c-btn" id="btn-expand">🔽</button>
                    <button class="c-btn" id="ctrl-back">▲</button>
                    <button class="c-btn" id="ctrl-pause">⏹️</button>
                    <button class="c-btn" id="ctrl-play" style="flex: 1.5; font-size: 1.2rem;">▶</button>
                    <button class="c-btn" id="btn-next">⏭</button>
                </div>
                <div class="sophie-box" id="sophie-warp"><img src="./sophie_shake.png"></div>
            </div>
        </div>
    </div>

    <script type="module" src="js/app_m.js?v=24"></script>
</body>
</html>
