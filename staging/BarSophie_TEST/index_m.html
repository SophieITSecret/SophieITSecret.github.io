<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bar Sophie v13.0 Modular</title>
    <link rel="apple-touch-icon" href="bar_sophie.jpeg">
    <meta name="apple-mobile-web-app-title" content="BARソフィー">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="css/style_m.css?v=22">

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
        import { getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp }
            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

        const firebaseConfig = {
            //（ここに実際のfirebaseConfigを貼り付け）
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.ACCESS_RULES = {
            guest: {
                music: true, fortune_haiku: false, fortune_sonnet: false,
                restaurant_search: 0, compatibility: false, about_person: false, note: false,
            },
            free: {
                music: true, fortune_haiku: true, fortune_sonnet: false,
                restaurant_search: 1, compatibility: true, about_person: true, note: true,
            },
            active: {
                music: true, fortune_haiku: true, fortune_sonnet: 'ticket',
                restaurant_search: 3, compatibility: true, about_person: true, note: true,
            },
            vip: {
                music: true, fortune_haiku: true, fortune_sonnet: 10,
                restaurant_search: 999, compatibility: true, about_person: true, note: true, ai_chat: true,
            },
            admin: {
                music: true, fortune_haiku: true, fortune_sonnet: 999,
                restaurant_search: 999, compatibility: true, about_person: true, note: true, ai_chat: true,
            }
        };

        window.currentUser = null;
        window.currentUserData = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                window.currentUser = user;
                const userRef = doc(db, 'users', user.uid);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    window.currentUserData = userSnap.data();
                } else {
                    const newUser = {
                        uid: user.uid, email: user.email, name: user.displayName,
                        status: 'free', role: 'user', tickets: 0,
                        todaySearchCount: 0, lastSearchDate: null, createdAt: serverTimestamp(),
                    };
                    await setDoc(userRef, newUser);
                    window.currentUserData = newUser;
                }
                if (user.email === 'makimura@ms-forum.com') {
                    window.currentUserData.role = 'admin';
                }
                window.updateLoginUI();
            } else {
                window.currentUser = null;
                window.currentUserData = null;
                window.updateLoginUI();
            }
        });

        window.signInWithGoogle = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (e) {
                console.error('ログインエラー:', e);
                alert('ログインに失敗しました。');
            }
        };

        window.signOutUser = async () => {
            await signOut(auth);
            alert('ログアウトしました。');
        };

        window.checkAccess = async (feature) => {
            const userData = window.currentUserData;
            if (!userData) {
                if (feature === 'music') return true;
                window.showLoginPrompt();
                return false;
            }
            const role = userData.role === 'admin' ? 'admin' : userData.status || 'free';
            const rules = window.ACCESS_RULES[role] || window.ACCESS_RULES.free;
            if (role === 'admin') return true;

            if (feature === 'restaurant_search') {
                const limit = rules.restaurant_search;
                const today = new Date().toDateString();
                const lastDate = userData.lastSearchDate;
                const count = lastDate === today ? (userData.todaySearchCount || 0) : 0;
                if (count >= limit) { window.showSearchLimitPrompt(); return false; }
                const userRef = doc(db, 'users', userData.uid);
                await updateDoc(userRef, { todaySearchCount: count + 1, lastSearchDate: today });
                window.currentUserData.todaySearchCount = count + 1;
                window.currentUserData.lastSearchDate = today;
                return true;
            }

            if (feature === 'fortune_sonnet') {
                if (rules.fortune_sonnet === false) { window.showPurchasePrompt(); return false; }
                if (rules.fortune_sonnet === 'ticket') {
                    if (userData.tickets <= 0) { window.showPurchasePrompt(); return false; }
                    const userRef = doc(db, 'users', userData.uid);
                    await updateDoc(userRef, { tickets: userData.tickets - 1 });
                    window.currentUserData.tickets--;
                    return true;
                }
                return true;
            }

            return rules[feature] === true;
        };

        window.showLoginPrompt = () => {
            if (confirm('この機能はGoogleログイン（無料会員登録）が必要です。\nログインしますか？')) {
                window.signInWithGoogle();
            }
        };

        window.showSearchLimitPrompt = () => {
            alert('本日の検索回数上限に達しました。\n常連パス（月額300円）に加入するか、チケットを購入すると追加検索できます。');
        };

        window.showPurchasePrompt = () => {
            alert('この機能は常連パス（月額300円）またはチケットが必要です。');
        };

        window.updateLoginUI = () => {
            const loginBtn = document.getElementById('login-btn');
            const userInfo = document.getElementById('user-info');
            if (!loginBtn || !userInfo) return;
            if (window.currentUser) {
                loginBtn.style.display = 'none';
                userInfo.style.display = 'flex';
                userInfo.innerHTML = `
                    <span style="color:#f0b56e; font-size:0.75rem;">
                        ${window.currentUserData?.role === 'admin' ? '👑' : ''}
                        ${window.currentUser.displayName || window.currentUser.email}
                    </span>
                    <button onclick="window.signOutUser()"
                        style="background:none; border:1px solid #555; color:#aaa;
                               font-size:0.7rem; padding:2px 8px; border-radius:3px; margin-left:6px;">
                        ログアウト
                    </button>`;
            } else {
                loginBtn.style.display = 'block';
                userInfo.style.display = 'none';
            }
        };
    </script>
</head>
<body>
    <div id="entry-screen">
        <img id="entry-sophie" src="./sophie_shake.png">
        <button class="btn-enter" id="btn-enter">🥃 ＢＡＲソフィーに入る</button>
    </div>

    <div id="chat-mode">
        <div class="portrait"><img src="./sophie_shake.png" id="lounge-sophie"></div>
        <div class="chat-area" id="lounge-text">いらっしゃいませ。</div>
        <button class="btn-to-bar" id="btn-to-bar">カウンターへ進む</button>
    </div>

    <div id="main-ui">
        <div class="l-side">
            <div class="monitor">
                <div id="yt-wrapper" style="display:none; width:100%; height:100%;">
                    <div id="yt-player"></div>
                </div>
                <div id="chart-wrapper" style="display:none; width:100%; height:100%; position:absolute; top:0; left:0;"></div>
                <img id="monitor-img" style="display:none;">
                <div id="telop"></div>
            </div>
        </div>
        <div class="r-side">
            <div id="label-bar" style="display:flex; align-items:center; justify-content:flex-end;
                height:28px; background:#0a0a0a; border-bottom:1px solid #1a1a1a; padding:0 4px;">
                <button id="login-btn" onclick="window.signInWithGoogle()"
                    style="background:#4285f4; color:#fff; border:none;
                           padding:3px 10px; border-radius:3px; font-size:0.7rem;
                           cursor:pointer; margin-right:6px;">
                    Gログイン
                </button>
                <div id="user-info" style="display:none; align-items:center; margin-right:6px;"></div>
            </div>
            <div class="scroll-area" id="main-scroll">
                
            <div id="nav-main">
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px; padding:12px;">
        <button class="act-btn" style="background:var(--green); width:75%;" id="btn-music">🎵 音楽リクエスト</button>
        <button class="act-btn" style="background:#8e44ad; width:75%;" id="btn-liquor">🍸 お酒を探す</button>
        <button class="act-btn" style="background:var(--talk); width:75%;" id="btn-talk">🥃 お酒の話</button>
        <div style="display:flex; gap:8px; justify-content:center; width:92%;">
            <button class="act-btn" id="btn-notice" style="background:#1a1a2e; color:#ffb3c1; border:1px solid #ff69b4; width:55%; margin:0;">ソフィーと話す</button>
            <button class="act-btn" id="btn-news" style="background:#1a3a4a; border:1px solid #00d2ff; width:35%; margin:0;">📰 NEWS</button>
        </div>
    </div>
</div>

                <div id="list-view" style="display:none;"></div>
            </div>
            <div id="disclaimer-bar" style="font-size:0.58rem; color:#444; text-align:center; padding:3px 10px; line-height:1.7; background:#050505; border-top:1px solid #1a1a1a;">
                Amazonのアソシエイトとして、当サイトは適正販売により収入を得ています。<br>
                当サイトの一部コンテンツは、生成AIで作成・編集されています。
            </div>
            <div class="console">
                <div class="btn-grid" id="console-grid">
                    <button class="c-btn" id="btn-expand">🔽</button>
                    <button class="c-btn" id="ctrl-back">▲</button>
                    <button class="c-btn" id="ctrl-pause">⏹️</button>
                    <button class="c-btn" id="ctrl-play" style="flex: 1.5; font-size: 1.2rem;">▶</button>
                    <button class="c-btn" id="btn-next">⏭</button>
                </div>
                <div class="sophie-box" id="sophie-warp"><img src="./sophie_shake.png"></div>
            </div>
        </div>
    </div>

    <script type="module" src="js/app_m.js?v=24"></script>
</body>
</html>
