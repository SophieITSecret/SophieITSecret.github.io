<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>検収場：イラン戦況・高度ブリーフィング</title>
    <link rel="stylesheet" href="../Sophie-Core-v13.css">
    <style>
        :root {
            --theme-bg: #1a1a1b;
            --theme-accent: #d73a49;
            --theme-border: #30363d;
        }
        body { font-size: 0.85rem; } /* ご希望によりさらに僅かに縮小 */
        
        .wrapper { display: flex; max-width: 1400px; margin: 0.5rem auto; gap: 15px; padding: 0 10px; }
        .main-timeline { flex: 2; }
        .side-maps { flex: 1; position: sticky; top: 10px; height: fit-content; }
        .map-img { width: 100%; border: 1px solid var(--theme-border); margin-bottom: 5px; border-radius: 2px; }

        /* 【新設】戦況サマリー・凡例ボックス */
        .summary-box {
            background: rgba(215, 58, 73, 0.05);
            border: 1px solid var(--theme-accent);
            padding: 8px 12px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .legend-bar {
            font-size: 0.75rem;
            margin-bottom: 8px;
            padding-bottom: 5px;
            border-bottom: 1px dashed var(--theme-border);
            color: #aaa;
        }

        /* ギッチリ詰めるタイムライン */
        .timeline-item {
            display: flex;
            align-items: flex-start;
            border-left: 2px solid var(--theme-border);
            padding: 1px 8px;
            margin-bottom: 1px;
            background: rgba(255,255,255,0.01);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .timeline-item:hover { 
            white-space: normal; 
            background: rgba(255,255,255,0.08); 
            border-left-color: var(--theme-accent);
        }

        .date-tag { flex-shrink: 0; width: 55px; color: var(--theme-accent); font-family: monospace; font-weight: bold; }
        .content-text { flex: 1; margin-left: 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        h1 { font-size: 1.3rem; margin: 0; padding: 5px 0; letter-spacing: 2px; }
        h2 { font-size: 0.8rem; color: var(--theme-accent); margin: 0 0 5px 0; letter-spacing: 1px; }
    </style>
</head>
<body>

<header style="padding-left: 20px; border-bottom: 1px solid var(--theme-border); display: flex; align-items: center; justify-content: space-between;">
    <h1>IRAN WAR INTELLIGENCE LOG</h1>
    <span style="font-size:0.7rem; color:#666; padding-right:20px;">SECURITY LEVEL: ALPHA</span>
</header>

<div class="wrapper">
    <main class="main-timeline">
        
        <div class="summary-box">
            <h2>戦況サマリー</h2>
            <div id="summary-text" style="line-height:1.5; color:#eee;">
                米・イス側の攻勢続くが、イラン側も散発的ながら、反撃は止まっていない。米海兵隊がペルシャ湾に迫っており、カーグ島上陸の可能性も推測されている。一方トランプ大統領の発電所攻撃予告と攻撃の5日間延期のあとの動向も注目される。
            </div>
        </div>

        <div class="legend-bar">
            🔵 米・イスラエル攻撃 ／ 🔴 イラン攻撃 ／ 🟢 外交交渉・発言、国際社会
        </div>

        <div id="timeline-root">Loading intelligence...</div>
    </main>

    <aside class="side-maps">
        <div class="container-box" style="padding: 10px;">
            <p style="font-size:0.7rem; color:var(--theme-accent); margin:0 0 5px 0; font-weight:bold;">STRATEGIC MAPS</p>
            <img src="map_main.jpg" class="map-img">
            <img src="map_kharg.jpg" class="map-img">
            <img src="map_missile.jpg" class="map-img">
        </div>
    </aside>
</div>

<script>
    // タイムライン描画処理
    fetch('war_data.json')
        .then(response => response.json())
        .then(data => {
            const root = document.getElementById('timeline-root');
            root.innerHTML = '';
            
            // 逆時系列
            data.reverse().forEach(item => {
                const icon = item.category === 'us_israel' ? '🔵' : (item.category === 'iran' ? '🔴' : '🟢');
                const shortDate = item.date.split('-').slice(1).join('/');
                
                const div = document.createElement('div');
                div.className = 'timeline-item';
                div.innerHTML = `
                    <div class="date-tag">${icon}${shortDate}</div>
                    <div class="content-text">${item.text}</div>
                `;
                root.appendChild(div);
            });
        });
</script>
</body>
</html>
