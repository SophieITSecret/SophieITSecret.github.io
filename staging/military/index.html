<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>検収場：イラン戦況ダッシュボード（高密度仕様）</title>
    <link rel="stylesheet" href="../Sophie-Core-v13.css">
    <style>
        :root {
            --theme-bg: #1a1a1b;
            --theme-accent: #d73a49;
            --theme-border: #30363d;
        }
        body { font-size: 0.9rem; } /* フォントを一回り小さく */
        
        .wrapper { display: flex; max-width: 1400px; margin: 1rem auto; gap: 15px; padding: 0 10px; }
        .main-timeline { flex: 2; }
        .side-maps { flex: 1; position: sticky; top: 10px; height: fit-content; }
        .map-img { width: 100%; border: 1px solid var(--theme-border); margin-bottom: 5px; border-radius: 2px; }

        /* ギッチリ詰めるための新スタイル */
        .timeline-item {
            display: flex; /* 横並び */
            align-items: flex-start;
            border-left: 2px solid var(--theme-accent);
            padding: 2px 8px; /* 上下余白を極限までカット */
            margin-bottom: 2px; /* 行間をゼロに近く */
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.05); /* 区切り線 */
            white-space: nowrap; /* 基本は1行 */
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .timeline-item:hover { white-space: normal; background: rgba(255,255,255,0.08); } /* ホバー時のみ全文表示 */

        .date-tag { 
            flex-shrink: 0;
            width: 70px; /* 日付幅を固定 */
            color: var(--theme-accent); 
            font-family: monospace; 
            font-weight: bold;
        }
        .content-text { flex: 1; margin-left: 5px; }

        h1 { font-size: 1.5rem; margin: 0; padding: 10px 0; }
    </style>
</head>
<body>

<header style="border-bottom: 1px solid var(--theme-border); margin-bottom: 10px; padding-left: 20px;">
    <h1>IRAN WAR LOG <span style="font-size:0.7rem; color:var(--theme-accent); vertical-align:middle;">HIGH-DENSITY MODE</span></h1>
</header>

<div class="wrapper">
    <main class="main-timeline" id="timeline-root">Loading intelligence...</main>

    <aside class="side-maps">
        <div class="container-box" style="padding: 10px;">
            <p style="font-size:0.7rem; color:var(--theme-accent); margin:0 0 5px 0; font-weight:bold;">STRATEGIC MAPS</p>
            <img src="map_main.jpg" class="map-img">
            <img src="map_kharg.jpg" class="map-img">
            <img src="map_missile.jpg" class="map-img">
        </div>
    </aside>
</div>

<script>
    fetch('war_data.json')
        .then(response => response.json())
        .then(data => {
            const root = document.getElementById('timeline-root');
            root.innerHTML = '';
            
            data.reverse().forEach(item => {
                const icon = item.category === 'us_israel' ? '🔵' : (item.category === 'iran' ? '🔴' : '🟢');
                
                // 日付を 03/25 形式に変換
                const shortDate = item.date.split('-').slice(1).join('/');
                
                const div = document.createElement('div');
                div.className = 'timeline-item';
                div.innerHTML = `
                    <div class="date-tag">${icon}${shortDate}</div>
                    <div class="content-text">${item.text}</div>
                `;
                root.appendChild(div);
            });
        });
</script>
</body>
</html>
