<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戦術ダッシュボード：統合司令 Ver 5.9</title>
    <link rel="stylesheet" href="../Sophie-Core-v13.css">
    <style>
        :root { --theme-bg: #1a1a1b; --theme-accent: #d73a49; --theme-border: #30363d; }
        
        body { font-size: 0.9rem; background: var(--theme-bg); color: #e2e8e4; margin: 0; line-height: 1.35; }
        
        /* 基本構造：PCレイアウト */
        .wrapper { display: flex; max-width: 1400px; margin: 0.5rem auto; gap: 20px; padding: 0 10px; align-items: flex-start; }
        .main-timeline { flex: 0 0 60%; min-width: 0; }
        .side-maps { flex: 0 0 38%; position: sticky; top: 10px; }
        
        /* 【レスポンシブ対応】画面幅が768px以下の設定 */
        @media screen and (max-width: 768px) {
            .wrapper { flex-direction: column; } /* 縦並びに変更 */
            .main-timeline { flex: 1 1 100%; width: 100%; }
            .side-maps { 
                flex: 1 1 100%; width: 100%; 
                position: static; /* スマホ時は固定解除 */
                margin-top: 2rem; 
                padding-top: 1rem;
                border-top: 2px solid var(--theme-border);
            }
        }

        .summary-box { 
            background: rgba(215, 58, 73, 0.1); border: 1px solid var(--theme-accent); 
            padding: 4px 10px; margin-top: 1.5rem; margin-bottom: 1.5rem; border-radius: 4px; line-height: 1.5;
        }
        .summary-label { font-weight: bold; color: var(--theme-accent); }

        .map-img { width: 100%; border: 1px solid var(--theme-border); margin-bottom: 8px; cursor: pointer; display: block; background: #000; }
        .legend-bar { font-size: 0.75rem; text-align: right; margin-bottom: 8px; color: #aaa; border-bottom: 1px dashed var(--theme-border); padding-bottom: 4px; }

        .timeline-item { 
            display: flex; align-items: flex-start; border-left: 2px solid var(--theme-border); 
            padding: 6px 8px; margin-bottom: 0px; background: rgba(255,255,255,0.01); 
            white-space: normal; word-wrap: break-word;
        }
        .timeline-item:hover { background: rgba(255,255,255,0.08); border-left-color: var(--theme-accent); }
        
        .timeline-item.urgent {
            background: rgba(215, 58, 73, 0.18) !important; 
            font-weight: bold !important;
            border-left: 4px solid var(--theme-accent) !important;
        }
        .timeline-item.urgent .content-text { color: #fff; }

        .date-tag { flex-shrink: 0; width: 65px; color: var(--theme-accent); font-family: 'Courier New', monospace; font-weight: bold; }
        .content-text { flex: 1; margin-left: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .week-spacer { 
            height: 30px; margin: 10px 0; border-left: 2px solid transparent;
            display: flex; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .week-spacer::after { 
            content: "--- NEW WEEK STARTING MONDAY ---"; 
            font-size: 0.65rem; color: #555; letter-spacing: 3px; margin-left: 15px; font-weight: bold;
        }

        h1 { font-size: 1.1rem; margin: 0; padding: 6px 20px; border-bottom: 1px solid var(--theme-border); background: #111; }
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; cursor: zoom-out; justify-content: center; align-items: center; }
        #modal-img { max-width: 98%; max-height: 98%; }
    </style>
</head>
<body>

<h1>IRAN WAR LOG <span style="font-size:0.7rem; color:var(--theme-accent);">COMMAND CENTER v5.9</span></h1>

<div class="wrapper">
    <main class="main-timeline">
        <div class="summary-box" id="summary-box">
            <span class="summary-label">戦況サマリー</span>　<span id="summary-content">Connecting...</span>
        </div>
        <div class="legend-bar">🔵 米・イスラエル ／ 🔴 イラン ／ 🟢 外交・国際</div>
        <div id="timeline-root"></div>
    </main>
    <aside class="side-maps" id="maps-root">
        <p style="font-size:0.7rem; color:var(--theme-accent); font-weight:bold; margin-top:0;">STRATEGIC MAPS</p>
    </aside>
</div>

<div id="modal-overlay" onclick="this.style.display='none'"><img id="modal-img" src=""></div>

<script>
    async function loadCommandCenter() {
        try {
            const res = await fetch('data.csv?v=' + Date.now());
            if (!res.ok) throw new Error("data.csv not found");
            const csvText = await res.text();
            
            const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== '');

            const tRoot = document.getElementById('timeline-root');
            const mRoot = document.getElementById('maps-root');
            let logRows = [];

            lines.forEach(line => {
                let cols = [];
                if (line.includes('\t')) {
                    cols = line.split('\t');
                } else {
                    cols = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || line.split(',');
                }
                
                if(!cols || cols.length < 2) return;
                const type = cols[0].replace(/"/g, '').trim().toUpperCase();

                if (type === 'SUMMARY') {
                    const content = line.substring(line.indexOf(line.includes('\t') ? '\t' : ',') + 1).trim().replace(/^"|"$/g, '').replace(/""/g, '"');
                    document.getElementById('summary-content').innerText = content;
                }
                else if (type === 'MAPS') {
                    for (let i = 1; i <= 5; i++) {
                        const val = cols[i] ? cols[i].replace(/"/g, '').trim().toUpperCase() : 'OFF';
                        if (val === 'ON') {
                            const img = document.createElement('img');
                            img.src = `map_${i}.png?v=${Date.now()}`;
                            img.className = 'map-img';
                            img.onclick = () => { document.getElementById('modal-img').src = img.src; document.getElementById('modal-overlay').style.display = 'flex'; };
                            img.onerror = function() { this.style.display='none'; };
                            mRoot.appendChild(img);
                        }
                    }
                }
                else if (type === 'LOG') { 
                    logRows.push(cols.map(c => c.replace(/^"|"$/g, '').trim())); 
                }
            });

            let lastMondayStr = null;

            logRows.reverse().forEach((cols) => {
                const dateStr = cols[1]; 
                const dateParts = dateStr.match(/(\d{4})[/-](\d{1,2})[/-](\d{1,2})/);
                if (!dateParts) return;

                const dateObj = new Date(parseInt(dateParts[1]), parseInt(dateParts[2])-1, parseInt(dateParts[3]));
                
                const d = new Date(dateObj);
                const day = d.getDay();
                const diff = d.getDate() - day + (day === 0 ? -6 : 1);
                const mondayObj = new Date(d.setDate(diff));
                const currentMondayStr = mondayObj.toDateString();

                if (lastMondayStr !== null && currentMondayStr !== lastMondayStr) {
                     const spacer = document.createElement('div');
                     spacer.className = 'week-spacer';
                     tRoot.appendChild(spacer);
                }
                lastMondayStr = currentMondayStr;

                const mm = ("0" + (dateObj.getMonth() + 1)).slice(-2);
                const dd = ("0" + dateObj.getDate()).slice(-2);
                const shortDate = mm + "/" + dd;
                
                const icon = cols[2] === 'us_israel' ? '🔵' : (cols[2] === 'iran' ? '🔴' : '🟢');
                
                const isUrgent = (cols[4] && cols[4].trim() === '1');
                const displayArea = cols[3] || "";
                
                const item = document.createElement('div');
                item.className = 'timeline-item' + (isUrgent ? ' urgent' : '');
                item.innerHTML = `<div class="date-tag">${icon}${shortDate}</div><div class="content-text">${displayArea}</div>`;
                tRoot.appendChild(item);
            });

        } catch (e) {
            document.getElementById('summary-content').innerHTML = `<span style="color:red;">Error: ${e.message}</span>`;
        }
    }
    loadCommandCenter();
</script>
</body>
</html>
