<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>戦術ダッシュボード：統合司令 Ver 5.0</title>
    <link rel="stylesheet" href="../Sophie-Core-v13.css">
    <style>
        :root { --theme-bg: #1a1a1b; --theme-accent: #d73a49; --theme-border: #30363d; }
        body { font-size: 0.85rem; background: var(--theme-bg); color: #e2e8e4; margin: 0; }
        .wrapper { display: flex; max-width: 1400px; margin: 0.5rem auto; gap: 20px; padding: 0 10px; align-items: flex-start; }
        .main-timeline { flex: 0 0 60%; min-width: 0; }
        .side-maps { flex: 0 0 38%; position: sticky; top: 10px; }
        .summary-box { background: rgba(215, 58, 73, 0.1); border: 1px solid var(--theme-accent); padding: 12px 15px; margin-bottom: 12px; border-radius: 4px; white-space: pre-wrap; line-height: 1.6; }
        .map-img { width: 100%; border: 1px solid var(--theme-border); margin-bottom: 10px; cursor: pointer; display: block; background: #000; }
        .legend-bar { font-size: 0.75rem; text-align: right; margin-bottom: 8px; color: #aaa; border-bottom: 1px dashed var(--theme-border); }
        .timeline-item { display: flex; align-items: flex-start; border-left: 2px solid var(--theme-border); padding: 2px 8px; margin-bottom: 1px; background: rgba(255,255,255,0.01); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .timeline-item:hover { white-space: normal; background: rgba(255,255,255,0.08); border-left-color: var(--theme-accent); }
        .date-tag { flex-shrink: 0; width: 55px; color: var(--theme-accent); font-family: monospace; font-weight: bold; }
        .content-text { flex: 1; margin-left: 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        h1 { font-size: 1.2rem; margin: 0; padding: 8px 20px; border-bottom: 1px solid var(--theme-border); background: #111; }
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; cursor: zoom-out; justify-content: center; align-items: center; }
        #modal-img { max-width: 98%; max-height: 98%; }
    </style>
</head>
<body>

<h1>IRAN WAR LOG <span style="font-size:0.7rem; color:var(--theme-accent);">COMMAND CENTER v5.0</span></h1>

<div class="wrapper">
    <main class="main-timeline">
        <div class="summary-box">
            <h2 style="display:inline; font-size:0.9rem; color:var(--theme-accent); margin-right:10px;">戦況サマリー</h2>
            <span id="summary-content">Loading Integrated Data...</span>
        </div>
        <div class="legend-bar">🔵 米・イス攻撃 ／ 🔴 イラン攻撃 ／ 🟢 外交・国際</div>
        <div id="timeline-root"></div>
    </main>
    <aside class="side-maps" id="maps-root">
        <p style="font-size:0.7rem; color:var(--theme-accent); font-weight:bold; margin-top:0;">STRATEGIC MAPS</p>
    </aside>
</div>

<div id="modal-overlay" onclick="this.style.display='none'"><img id="modal-img" src=""></div>

<script>
    async function loadCommandCenter() {
        try {
            const res = await fetch('data.csv?v=' + Date.now());
            if (!res.ok) throw new Error("data.csvが見つかりません");
            const csvText = await res.text();
            const lines = csvText.split('\n').filter(l => l.trim() !== '');

            const tRoot = document.getElementById('timeline-root');
            const mRoot = document.getElementById('maps-root');
            let logRows = [];

            lines.forEach(line => {
                const cols = line.split(',');
                const type = cols[0].trim().toUpperCase();

                // 1. サマリーの処理
                if (type === 'SUMMARY') {
                    const content = line.substring(line.indexOf(',') + 1).replace(/^"|"$/g, '').replace(/""/g, '"');
                    document.getElementById('summary-content').innerText = content;
                }
                
                // 2. 地図スイッチの処理
                else if (type === 'MAPS') {
                    for (let i = 1; i <= 5; i++) {
                        if (cols[i] && cols[i].trim().toUpperCase() === 'ON') {
                            const img = document.createElement('img');
                            img.src = `map_${i}.png?v=${Date.now()}`;
                            img.className = 'map-img';
                            img.onclick = () => { document.getElementById('modal-img').src = img.src; document.getElementById('modal-overlay').style.display = 'flex'; };
                            img.onerror = function() { this.style.display='none'; };
                            mRoot.appendChild(img);
                        }
                    }
                }

                // 3. ログの蓄積
                else if (type === 'LOG') {
                    logRows.push(cols);
                }
            });

            // タイムライン描画（逆順）
            logRows.reverse().forEach(cols => {
                const date = cols[1].split('-').slice(1).join('/');
                const icon = cols[2].trim() === 'us_israel' ? '🔵' : (cols[2].trim() === 'iran' ? '🔴' : '🟢');
                // カンマを含む文章対策
                const rawLine = lines.find(l => l.includes(cols[3]));
                const text = cols.slice(3).join(',').replace(/^"|"$/g, '').replace(/""/g, '"');
                
                tRoot.innerHTML += `<div class="timeline-item"><div class="date-tag">${icon}${date}</div><div class="content-text">${text}</div></div>`;
            });

        } catch (e) {
            document.getElementById('summary-content').innerHTML = `<span style="color:red;">Error: ${e.message}</span>`;
        }
    }
    loadCommandCenter();
</script>
</body>
</html>
