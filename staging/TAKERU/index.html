<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TAKERU">
    <link rel="apple-touch-icon" href="takeru-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0d1a">
    <title>TAKERU｜MSアカデミー</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #sw-update-toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: #F5F0E8;
            color: #2a2a1a;
            border-radius: 10px;
            padding: 16px 22px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.45);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 9999;
            font-size: 14px;
            min-width: 250px;
            text-align: center;
            font-family: inherit;
        }
        .sw-toast-btns { display: flex; gap: 12px; }
        #sw-btn-update {
            background: #4a3728;
            color: #F5F0E8;
            border: none;
            border-radius: 6px;
            padding: 8px 20px;
            font-size: 14px;
            cursor: pointer;
        }
        #sw-btn-later {
            background: transparent;
            color: #4a3728;
            border: 1px solid #8a7060;
            border-radius: 6px;
            padding: 8px 20px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body class="dark-mode">

    <div id="entry-screen">
        <div class="entry-emblem">⚔</div>
        <div class="entry-title">TAKERU</div>
        <div class="entry-sub">MSアカデミー</div>
        <button id="btn-enter">学習をはじめる</button>
    </div>

    <div id="main-ui">
        <div id="image-area">
            <img id="card-image" src="" alt="">
            <div id="image-placeholder"><span>⚔</span></div>
        </div>
        <div id="divider-line"></div>
        <div id="content-area">
            <div id="text-view">
                <div id="card-progress"></div>
                <div id="card-title"></div>
                <div id="card-body"></div>
            </div>
            <div id="menu-view" style="display:none;">
                <div id="menu-content"></div>
            </div>
        </div>
        <div id="controls">
            <button class="ctrl-btn btn-home" id="btn-home">🏠</button>
            <button class="ctrl-btn" id="btn-toggle">☰ メニュー</button>
            <button class="ctrl-btn" id="btn-back">◀ 戻る</button>
            <button class="ctrl-btn btn-next" id="btn-next">次へ ▶</button>
            <button class="ctrl-btn" id="btn-voice">🔊 読上</button>
        </div>
    </div>

    <!-- 音声ワーニング -->
    <div id="voice-warning" style="display:none;">
        <div id="voice-warning-box">
            <div id="voice-warning-text">🔇 音声データがありません<br><span>タップして閉じる　／　読上ボタンで音声読上</span></div>
        </div>
    </div>

    <div id="settings-panel" style="display:none;">
        <div id="settings-content">
            <div class="settings-title">⚙ 設定</div>
            <div class="settings-item">
                <span>カラーモード</span>
                <div class="toggle-group">
                    <button class="toggle-btn active" id="btn-dark">ダーク</button>
                    <button class="toggle-btn" id="btn-light">ホワイト</button>
                </div>
            </div>
            <div class="settings-item">
                <span>文字サイズ</span>
                <div class="toggle-group">
                    <button class="toggle-btn" id="btn-font-s">小</button>
                    <button class="toggle-btn active" id="btn-font-m">中</button>
                    <button class="toggle-btn" id="btn-font-l">大</button>
                </div>
            </div>
            <button id="btn-settings-close">閉じる</button>
        </div>
    </div>

    <button id="btn-settings">⚙</button>
    <div class="ver">TAKERU v2.3</div>

    <div id="sw-update-toast" style="display:none;">
        <span>新しいバージョンがあります</span>
        <div class="sw-toast-btns">
            <button id="sw-btn-update">更新する</button>
            <button id="sw-btn-later">後で</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                let waitingWorker = null;

                function showUpdateToast(waiting) {
                    waitingWorker = waiting;
                    document.getElementById('sw-update-toast').style.display = 'flex';
                }

                navigator.serviceWorker.register('./sw.js').then(reg => {
                    // 前回「後で」を押した場合など、既に waiting SW がある場合
                    if (reg.waiting && navigator.serviceWorker.controller) {
                        showUpdateToast(reg.waiting);
                    }

                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                showUpdateToast(newWorker);
                            }
                        });
                    });

                    // PWAが前面に戻った時に更新チェック（完全終了しなくても検知できる）
                    document.addEventListener('visibilitychange', () => {
                        if (document.visibilityState === 'visible') reg.update().catch(() => {});
                    });
                });

                // 新SWが制御を引き継いだらリロード（ループ防止ガード付き）
                let refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (refreshing) return;
                    refreshing = true;
                    location.reload();
                });

                document.getElementById('sw-btn-update').addEventListener('click', () => {
                    if (waitingWorker) waitingWorker.postMessage('SKIP_WAITING');
                });

                document.getElementById('sw-btn-later').addEventListener('click', () => {
                    document.getElementById('sw-update-toast').style.display = 'none';
                });
            });
        }
    </script>
</body>
</html>
