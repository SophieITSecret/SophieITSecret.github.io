<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TAKERU 作業台</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg:#1a1a1a; --bg2:#222; --bg3:#2a2a2a;
    --border:#333; --accent:#4caf50; --accent2:#81c784;
    --text:#e8e8e8; --text2:#aaa; --text3:#555;
    --fact:#4a90d9; --com:#e8a040;
  }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans JP','Yu Gothic',sans-serif; height:100vh; overflow:hidden; display:flex; flex-direction:column; }

  /* ヘッダー */
  header { background:var(--bg2); border-bottom:1px solid var(--border); padding:8px 20px; display:flex; align-items:center; gap:14px; flex-shrink:0; height:48px; }
  header h1 { font-size:0.95rem; color:var(--accent); font-weight:700; letter-spacing:.1em; flex-shrink:0; }
  .btn-load { background:transparent; border:1px solid var(--accent); color:var(--accent); padding:4px 14px; border-radius:4px; cursor:pointer; font-size:0.8rem; white-space:nowrap; }
  .btn-load:hover { background:rgba(76,175,80,.12); }
  .btn-save { background:var(--accent); border:none; color:#000; padding:4px 14px; border-radius:4px; cursor:pointer; font-size:0.8rem; font-weight:700; white-space:nowrap; }
  .btn-save:hover { background:var(--accent2); }
  .btn-save:disabled { background:var(--text3); cursor:default; }
  .file-status { font-size:0.75rem; color:var(--text2); flex:1; }
  input[type=file] { display:none; }

  /* メイン */
  .main { display:flex; flex:1; overflow:hidden; gap:0; }

  /* 左ペイン */
  .pane-list { width:360px; min-width:360px; border-right:3px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
  .pane-toolbar { background:var(--bg2); padding:8px 14px; border-bottom:1px solid var(--border); display:flex; gap:8px; align-items:center; flex-shrink:0; }
  .pane-toolbar select { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:5px 8px; border-radius:4px; font-size:0.8rem; flex:1; }
  .card-count { font-size:0.72rem; color:var(--text3); white-space:nowrap; }
  .list-scroll { flex:1; overflow-y:auto; }

  /* 講座区切り */
  .subject-header { background:#1a2a1a; padding:5px 14px; font-size:0.7rem; color:var(--accent); letter-spacing:.1em; font-weight:700; border-top:2px solid var(--accent); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:20; }
  /* セクション区切り */
  .section-header { background:var(--bg3); padding:4px 14px; font-size:0.68rem; color:var(--text3); letter-spacing:.06em; position:sticky; top:22px; z-index:10; border-bottom:1px solid var(--border); }

  .card-item { display:flex; align-items:center; gap:8px; padding:8px 14px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,.04); transition:background .1s; }
  .card-item:hover { background:rgba(255,255,255,.06); }
  .card-item.active { background:rgba(76,175,80,.15); border-left:3px solid var(--accent); padding-left:11px; }
  .badge { font-size:0.58rem; padding:1px 4px; border-radius:2px; font-weight:700; flex-shrink:0; }
  .badge-c { background:rgba(232,160,64,.2); color:var(--com); border:1px solid var(--com); }
  .item-code { font-size:0.63rem; color:var(--text3); font-family:monospace; flex-shrink:0; }
  .item-title { font-size:0.82rem; color:var(--text); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .item-wip { font-size:0.7rem; color:var(--text3); flex-shrink:0; }

  /* 中央 カードプレビュー */
  .pane-card { flex:1; display:flex; align-items:center; justify-content:center; background:var(--bg); padding:24px 20px; border-right:3px solid var(--border); }

  .card-shell { width:520px; background:var(--bg2); border:1px solid var(--border); border-radius:14px; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,.5); }
  .card-img-area { width:100%; aspect-ratio:4/3; background:var(--bg3); position:relative; overflow:hidden; flex-shrink:0; }
  .card-img-area img { width:100%; height:100%; object-fit:contain; display:block; }
  .card-img-ph { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:3rem; color:var(--text3); }
  .card-divider { height:2px; background:linear-gradient(to right,var(--accent),transparent); flex-shrink:0; }
  .card-text { padding:14px 18px; display:flex; flex-direction:column; gap:4px; }
  .card-unit { font-size:0.7rem; color:var(--text3); }
  .card-section { font-size:0.82rem; color:var(--accent); letter-spacing:.06em; }
  .card-title-disp { font-size:1.05rem; font-weight:700; color:var(--text); padding-top:6px; padding-bottom:8px; border-bottom:1px solid var(--border); line-height:1.4; }
  .card-body-disp { font-size:0.88rem; line-height:1.9; color:var(--text); white-space:pre-wrap; padding-top:8px; max-height:260px; overflow-y:auto; }
  .card-body-disp.wip { color:var(--text3); font-style:italic; font-size:0.8rem; }
  .card-nav { display:flex; justify-content:center; gap:20px; padding:10px 0 6px; }
  .btn-nav { background:rgba(76,175,80,.15); border:1px solid var(--accent); color:var(--accent); width:38px; height:38px; border-radius:50%; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; }
  .btn-nav:hover { background:rgba(76,175,80,.3); }
  .btn-nav:disabled { opacity:.3; cursor:default; }
  .nav-info { font-size:0.72rem; color:var(--text3); display:flex; align-items:center; }

  /* 右 編集エリア */
  .edit-area { width:360px; min-width:360px; max-width:360px; display:flex; flex-direction:column; padding:20px 16px; gap:12px; overflow-y:auto; flex-shrink:0; }
  .edit-label { font-size:0.72rem; color:var(--text2); margin-bottom:3px; }
  .edit-input { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:7px 10px; border-radius:4px; font-size:0.82rem; font-family:inherit; width:100%; }
  .edit-input:focus { outline:none; border-color:var(--accent); }
  textarea.edit-input { resize:vertical; min-height:200px; line-height:1.75; }
  .char-count { font-size:0.7rem; text-align:right; margin-top:2px; }
  .char-ok { color:var(--accent); } .char-over { color:#e57373; }
  .edit-actions { display:flex; gap:8px; justify-content:flex-end; }
  .btn-apply { background:var(--accent); border:none; color:#000; padding:7px 20px; border-radius:4px; cursor:pointer; font-size:0.82rem; font-weight:700; }
  .btn-apply:hover { background:var(--accent2); }
  .btn-cancel { background:transparent; border:1px solid var(--border); color:var(--text2); padding:7px 14px; border-radius:4px; cursor:pointer; font-size:0.82rem; }

  .empty-state { text-align:center; color:var(--text3); font-size:0.82rem; line-height:2; padding:40px; }
  .empty-state .icon { font-size:2.5rem; margin-bottom:8px; }
  ::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* 音声パネル */
  .voice-panel { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:12px; display:flex; flex-direction:column; gap:8px; }
  .voice-title { font-size:0.78rem; color:var(--accent2); font-weight:700; letter-spacing:.05em; }
  .voice-section-label { font-size:0.68rem; color:var(--text3); letter-spacing:.05em; }
  .voice-slider-row { display:flex; align-items:center; gap:6px; }
  .voice-slider-row .v-lbl { font-size:0.7rem; color:var(--text2); width:44px; flex-shrink:0; }
  .voice-slider-row input[type=range] { flex:1; accent-color:var(--accent); height:18px; cursor:pointer; }
  .v-num-inp { width:48px; background:var(--bg2); border:1px solid var(--border); color:var(--text); border-radius:3px; font-size:0.72rem; padding:2px 4px; text-align:right; font-family:inherit; }
  .voice-btns { display:flex; gap:6px; margin-top:4px; }
  .btn-voice { flex:1; background:transparent; border:1px solid var(--accent); color:var(--accent); padding:7px 2px; border-radius:4px; cursor:pointer; font-size:0.75rem; font-family:inherit; }
  .btn-voice:hover { background:rgba(76,175,80,.15); }
  .btn-voice:disabled { opacity:.35; cursor:default; border-color:var(--text3); color:var(--text3); }
  .btn-voice-confirm { flex:1; background:transparent; border:1px solid #4a90d9; color:#4a90d9; padding:7px 2px; border-radius:4px; cursor:pointer; font-size:0.75rem; font-family:inherit; }
  .btn-voice-confirm:hover { background:rgba(74,144,217,.15); }
  .voice-status-row { display:flex; align-items:center; gap:6px; font-size:0.73rem; }
  .dot-exists { color:#4caf50; }
  .dot-none { color:#666; }
  .voice-note { font-size:0.65rem; color:var(--text3); line-height:1.5; }
</style>
</head>
<body>
<header>
  <h1>⚔ TAKERU 作業台</h1>
  <button class="btn-load" onclick="document.getElementById('csvInput').click()">📂 CSV を開く</button>
  <input type="file" id="csvInput" accept=".csv" onchange="loadCSV(event)">
  <button class="btn-load" onclick="document.getElementById('imgInput').click()">🖼 画像フォルダ</button>
  <input type="file" id="imgInput" webkitdirectory multiple onchange="loadImages(event)">
  <span class="file-status" id="fileStatus">CSVを選択してください</span>
  <button class="btn-load" id="btnImport" onclick="openImport()" disabled>📥 一括取り込み</button>
  <button class="btn-save" id="btnSave" onclick="saveCSV()" disabled>💾 CSV を保存</button>
</header>

<!-- 一括取り込みモーダル -->
<div id="importModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:100; align-items:center; justify-content:center;">
  <div style="background:var(--bg2); border:1px solid var(--border); border-radius:10px; width:680px; max-width:92vw; max-height:88vh; display:flex; flex-direction:column; padding:20px; gap:12px;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2 style="font-size:1rem; color:var(--accent);">📥 本文の一括取り込み</h2>
      <button class="btn-cancel" onclick="closeImport()">✕ 閉じる</button>
    </div>
    <div style="font-size:0.78rem; color:var(--text2); line-height:1.7;">
      Geminiの出力を貼り付けてください。形式は <code style="color:var(--accent)">@コード</code> の行で1枚が始まり、次の行から本文です。<br>
      取り込んでもファイルは保存されません（プレビューで確認 → 問題なければ「CSVを保存」）。
    </div>
    <textarea id="importText" placeholder="@IRUMA01&#10;ようこそ、入間基地ツアーへ。……（本文）……&#10;&#10;@IRUMA02&#10;入間基地は、埼玉県……（本文）……" style="flex:1; min-height:320px; background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:12px; border-radius:6px; font-family:inherit; font-size:0.85rem; line-height:1.7; resize:vertical;"></textarea>
    <div id="importPreview" style="font-size:0.78rem; color:var(--text2); max-height:120px; overflow-y:auto;"></div>
    <div style="display:flex; gap:8px; justify-content:flex-end;">
      <button class="btn-cancel" onclick="parseImport()">🔍 解析して確認</button>
      <button class="btn-apply" id="btnDoImport" onclick="doImport()" disabled>✓ 取り込む</button>
    </div>
  </div>
</div>

<div class="main">
  <!-- 左ペイン：一覧 -->
  <div class="pane-list">
    <div class="pane-toolbar">
      <select id="unitSelect" onchange="filterCards()">
        <option value="">── ユニットを選択 ──</option>
      </select>
      <span class="card-count" id="cardCount">0枚</span>
    </div>
    <div class="list-scroll" id="listScroll">
      <div class="empty-state"><div class="icon">📋</div>CSVを読み込むと一覧が表示されます</div>
    </div>
  </div>

  <!-- 中央：カードプレビュー -->
  <div class="pane-card" id="paneCard">
    <div class="empty-state"><div class="icon">👆</div>カードを選択してください</div>
  </div>

  <!-- 右：編集エリア -->
  <div class="edit-area" id="editArea" style="display:none">
    <div><div class="edit-label">コード</div><input class="edit-input" id="editCode" readonly style="color:var(--text3)"></div>
    <div><div class="edit-label">タイトル</div><input class="edit-input" id="editTitle" oninput="updatePreview()"></div>
    <div>
      <div class="edit-label" style="display:flex;justify-content:space-between">本文 <span id="charCount" class="char-count char-ok">0字</span></div>
      <textarea class="edit-input" id="editBody" oninput="updatePreview();countChars()"></textarea>
    </div>
    <div class="edit-actions">
      <button class="btn-cancel" onclick="cancelEdit()">キャンセル</button>
      <button class="btn-apply" onclick="applyEdit()">✓ 適用</button>
    </div>

    <!-- 音声パネル -->
    <div class="voice-panel">
      <div class="voice-title">🎙 音声生成</div>

      <div>
        <div class="edit-label" style="margin-bottom:3px">ナレーター</div>
        <select id="narratorSelect" class="edit-input" style="height:32px;padding:4px 8px" onchange="onNarratorChange()"></select>
        <input id="narratorInput" class="edit-input" value="Japanese Female 1" style="display:none" oninput="saveVoiceSettings()">
      </div>

      <div class="voice-section-label">▸ 基本設定</div>
      <div class="voice-slider-row">
        <span class="v-lbl">スピード</span>
        <input type="range" id="vpSpeed" min="50" max="200" value="100" oninput="syncNum('vpSpeed','vpSpeedN');saveVoiceSettings()">
        <input type="number" id="vpSpeedN" class="v-num-inp" value="100" min="50" max="200" oninput="syncRange('vpSpeedN','vpSpeed');saveVoiceSettings()">
      </div>
      <div class="voice-slider-row">
        <span class="v-lbl">ピッチ</span>
        <input type="range" id="vpPitch" min="0" max="100" value="50" oninput="syncNum('vpPitch','vpPitchN');saveVoiceSettings()">
        <input type="number" id="vpPitchN" class="v-num-inp" value="50" min="0" max="100" oninput="syncRange('vpPitchN','vpPitch');saveVoiceSettings()">
      </div>

      <div class="voice-section-label">▸ 感情</div>
      <div class="voice-slider-row">
        <span class="v-lbl">喜び</span>
        <input type="range" id="emHappy" min="0" max="100" value="40" oninput="syncNum('emHappy','emHappyN');saveVoiceSettings()">
        <input type="number" id="emHappyN" class="v-num-inp" value="40" min="0" max="100" oninput="syncRange('emHappyN','emHappy');saveVoiceSettings()">
      </div>
      <div class="voice-slider-row">
        <span class="v-lbl">楽しさ</span>
        <input type="range" id="emFun" min="0" max="100" value="30" oninput="syncNum('emFun','emFunN');saveVoiceSettings()">
        <input type="number" id="emFunN" class="v-num-inp" value="30" min="0" max="100" oninput="syncRange('emFunN','emFun');saveVoiceSettings()">
      </div>
      <div class="voice-slider-row">
        <span class="v-lbl">悲しみ</span>
        <input type="range" id="emSad" min="0" max="100" value="0" oninput="syncNum('emSad','emSadN');saveVoiceSettings()">
        <input type="number" id="emSadN" class="v-num-inp" value="0" min="0" max="100" oninput="syncRange('emSadN','emSad');saveVoiceSettings()">
      </div>
      <div class="voice-slider-row">
        <span class="v-lbl">怒り</span>
        <input type="range" id="emAngry" min="0" max="100" value="0" oninput="syncNum('emAngry','emAngryN');saveVoiceSettings()">
        <input type="number" id="emAngryN" class="v-num-inp" value="0" min="0" max="100" oninput="syncRange('emAngryN','emAngry');saveVoiceSettings()">
      </div>

      <div class="voice-btns">
        <button id="btnRecord" class="btn-voice" onclick="recordVoice()">🎙 録音</button>
        <button id="btnPlay" class="btn-voice" onclick="playVoice()">▶ 再生</button>
        <button id="btnConfirm" class="btn-voice-confirm" onclick="confirmVoice()">✅ 確定</button>
      </div>

      <div class="voice-status-row">
        <span id="voiceDot" class="dot-none">○</span>
        <span id="voiceStatusText">--</span>
      </div>
      <div class="voice-note">※ 編集窓のテキストで録音します</div>
      <div class="voice-note">※ 確定すると編集窓を元の本文に戻します</div>
    </div>
  </div>
</div>

<script>
let cardData=[], imageMap={}, selectedIdx=-1, dirty=false, curUnit='', filteredList=[];

function loadCSV(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    cardData=parseCSV(ev.target.result);
    buildUnitSelect();
    document.getElementById('fileStatus').textContent=`✅ ${file.name}（${cardData.length}枚）`;
    document.getElementById('btnSave').disabled=false;
    document.getElementById('btnImport').disabled=false;
    dirty=false;
  };
  reader.readAsText(file,'UTF-8');
}

function parseCSV(text) {
  if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
  const rows=[]; let cur=[],field='',inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c==='"'){if(inQ&&text[i+1]==='"'){field+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){cur.push(field);field='';}
    else if((c==='\n'||(c==='\r'&&text[i+1]==='\n'))&&!inQ){if(c==='\r')i++;cur.push(field);field='';if(cur.some(f=>f.trim()))rows.push(cur);cur=[];}
    else field+=c;
  }
  if(field||cur.length){cur.push(field);if(cur.some(f=>f.trim()))rows.push(cur);}
  const hdr=rows[0];
  return rows.slice(1).map(r=>({
    id:(r[0]||'').trim(), genre:(r[1]||'').trim(), section:(r[2]||'').trim(),
    title:(r[3]||'').trim(), body:(r[4]||'').trim(), subject:(r[5]||'').trim(),
    _header:hdr
  })).filter(d=>d.id);
}

function loadImages(e) {
  imageMap={};
  for(const f of e.target.files){const n=f.name.replace(/\.[^.]+$/,'');imageMap[n]=URL.createObjectURL(f);}
  document.getElementById('fileStatus').textContent+=`　🖼 ${Object.keys(imageMap).length}枚`;
  if(selectedIdx>=0) renderCard(selectedIdx);
}

function buildUnitSelect() {
  const sel=document.getElementById('unitSelect');
  const units=[...new Set(cardData.map(d=>d.genre))];
  sel.innerHTML='<option value="">── ユニットを選択 ──</option>';
  units.forEach(u=>{const o=document.createElement('option');o.value=u;o.textContent=u;sel.appendChild(o);});
  if(units.length){sel.value=units[0];filterCards();}
}

function filterCards() {
  curUnit=document.getElementById('unitSelect').value;
  filteredList=curUnit?cardData.filter(d=>d.genre===curUnit):cardData;
  document.getElementById('cardCount').textContent=`${filteredList.length}枚`;
  renderList();
}

function renderList() {
  const el=document.getElementById('listScroll');
  if(!filteredList.length){el.innerHTML='<div class="empty-state"><div class="icon">📭</div>カードがありません</div>';return;}
  let html='', curSubject=null, curSec=null;
  filteredList.forEach(card=>{
    const gIdx=cardData.indexOf(card);
    // 講座区切り
    if(card.subject && card.subject!==curSubject){
      curSubject=card.subject;
      curSec=null;
      html+=`<div class="subject-header">▶ ${curSubject}</div>`;
    }
    // セクション区切り
    if(card.section!==curSec){
      curSec=card.section;
      if(curSec) html+=`<div class="section-header">📂 ${curSec}</div>`;
    }
    const isC=isCommentary(card.id);
    // 軍事と戦略以外にはバッジを出す
    const showBadge = card.subject && !card.subject.includes('軍事と戦略');
    const badge=showBadge?(isC?'<span class="badge badge-c">解説</span>':''):'';
    const hasBody=card.body&&!card.body.includes('準備中')&&card.body.trim()!=='';
    const wipDot=!hasBody?'<span class="item-wip">●</span>':'';
    const active=gIdx===selectedIdx?' active':'';
    html+=`<div class="card-item${active}" onclick="showCard(${gIdx})">${badge}<span class="item-code">${card.id}</span><span class="item-title">${card.title||'（タイトルなし）'}</span>${wipDot}</div>`;
  });
  el.innerHTML=html;
}

function isCommentary(id){return /C\d+$/.test(id)||id.endsWith('C');}

function showCard(gIdx) {
  selectedIdx=gIdx;
  renderList();
  renderCard(gIdx);
  const card=cardData[gIdx];
  document.getElementById('editArea').style.display='flex';
  document.getElementById('editCode').value=card.id;
  document.getElementById('editTitle').value=card.title;
  document.getElementById('editBody').value=card.body;
  countChars();
  setTimeout(()=>{const a=document.querySelector('.card-item.active');if(a)a.scrollIntoView({block:'nearest'});},50);
  checkVoiceStatus(card.id);
}

function renderCard(gIdx) {
  const card=cardData[gIdx];
  const imgUrl=imageMap[card.id]||'';
  const imgHtml=imgUrl?`<img src="${imgUrl}" alt="">`:'<div class="card-img-ph">🗂</div>';
  const hasBody=card.body&&!card.body.includes('準備中')&&card.body.trim()!=='';
  const bodyHtml=hasBody?card.body:'（本文未作成）';
  const fi=filteredList.indexOf(card);
  const prevGIdx=fi>0?cardData.indexOf(filteredList[fi-1]):-1;
  const nextGIdx=fi<filteredList.length-1?cardData.indexOf(filteredList[fi+1]):-1;
  document.getElementById('paneCard').innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px">
      <div class="card-shell">
        <div class="card-img-area">${imgHtml}</div>
        <div class="card-divider"></div>
        <div class="card-text">
          <div class="card-unit">${card.genre}</div>
          ${card.section?`<div class="card-section">${card.section}</div>`:''}
          <div class="card-title-disp" id="prevTitle">${card.title||'（タイトルなし）'}</div>
          <div class="card-body-disp${hasBody?'':' wip'}" id="prevBody">${bodyHtml}</div>
        </div>
      </div>
      <div class="card-nav">
        <button class="btn-nav" onclick="showCard(${prevGIdx})" ${prevGIdx<0?'disabled':''}>◀</button>
        <span class="nav-info">${fi+1} / ${filteredList.length}</span>
        <button class="btn-nav" onclick="showCard(${nextGIdx})" ${nextGIdx<0?'disabled':''}>▶</button>
      </div>
    </div>`;
}

document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  const fi=filteredList.indexOf(cardData[selectedIdx]);
  if((e.key==='ArrowRight'||e.key==='ArrowDown')&&fi<filteredList.length-1) showCard(cardData.indexOf(filteredList[fi+1]));
  else if((e.key==='ArrowLeft'||e.key==='ArrowUp')&&fi>0) showCard(cardData.indexOf(filteredList[fi-1]));
});

function updatePreview() {
  const t=document.getElementById('prevTitle');
  const b=document.getElementById('prevBody');
  if(t) t.textContent=document.getElementById('editTitle').value;
  if(b){
    const v=document.getElementById('editBody').value;
    const hasBody=v&&!v.includes('準備中')&&v.trim()!=='';
    b.textContent=hasBody?v:'（本文未作成）';
    b.className='card-body-disp'+(hasBody?'':' wip');
  }
}

function countChars(){
  const len=document.getElementById('editBody').value.length;
  const el=document.getElementById('charCount');
  el.textContent=`${len}字`;
  el.className='char-count '+(len<=400?'char-ok':'char-over');
}

function applyEdit(){
  if(selectedIdx<0) return;
  cardData[selectedIdx].title=document.getElementById('editTitle').value;
  cardData[selectedIdx].body=document.getElementById('editBody').value;
  dirty=true;
  renderList();
  renderCard(selectedIdx);
}

function cancelEdit(){ if(selectedIdx>=0) showCard(selectedIdx); }

// ===== 一括取り込み =====
let parsedImport = [];

function openImport(){
  document.getElementById('importModal').style.display='flex';
  document.getElementById('importText').value='';
  document.getElementById('importPreview').innerHTML='';
  document.getElementById('btnDoImport').disabled=true;
  parsedImport=[];
}
function closeImport(){ document.getElementById('importModal').style.display='none'; }

function parseImport(){
  const text=document.getElementById('importText').value;
  parsedImport=[];
  // @コード で分割
  const blocks=text.split(/^@/m).filter(b=>b.trim());
  for(const b of blocks){
    const nl=b.indexOf('\n');
    if(nl<0) continue;
    const code=b.slice(0,nl).trim();
    const body=b.slice(nl+1).trim();
    if(code) parsedImport.push({code,body});
  }
  // プレビュー：各コードがCSVに存在するか照合
  const prev=document.getElementById('importPreview');
  if(!parsedImport.length){ prev.innerHTML='<span style="color:#e57373">解析できませんでした。@コードの形式を確認してください。</span>'; document.getElementById('btnDoImport').disabled=true; return; }
  let html=`<div style="margin-bottom:6px;color:var(--accent)">${parsedImport.length}枚を検出：</div>`;
  let okCount=0;
  for(const p of parsedImport){
    const card=cardData.find(d=>d.id===p.code);
    if(card){ okCount++; html+=`<div>✅ ${p.code}（${p.body.length}字）${card.title}</div>`; }
    else { html+=`<div style="color:#e57373">⚠ ${p.code} … CSVに該当コードなし（スキップ）</div>`; }
  }
  prev.innerHTML=html;
  document.getElementById('btnDoImport').disabled = okCount===0;
}

function doImport(){
  let n=0;
  for(const p of parsedImport){
    const idx=cardData.findIndex(d=>d.id===p.code);
    if(idx>=0){ cardData[idx].body=p.body; n++; }
  }
  dirty=true;
  closeImport();
  filterCards();
  if(selectedIdx>=0) showCard(selectedIdx);
  alert(`${n}枚の本文を取り込みました。\nプレビューで確認し、問題なければ「CSVを保存」してください。`);
}

function saveCSV(){
  if(!cardData.length) return;
  const hdr=cardData[0]._header||['コード','ユニット','サブユニット','タイトル','説明',''];
  const rows=[hdr,...cardData.map(d=>[d.id,d.genre,d.section,d.title,d.body,d.subject])];
  const csv=rows.map(r=>r.map(c=>{const s=String(c||'');return(s.includes(',')||s.includes('"')||s.includes('\n'))?`"${s.replace(/"/g,'""')}"`:`${s}`;}).join(',')).join('\r\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='TAKERUcard.csv';a.click();
  dirty=false;
}

window.addEventListener('beforeunload',e=>{if(dirty){e.preventDefault();e.returnValue='';}});

// ==================== 音声パネル ====================
const SERVER = '';
const VOICE_KEY = 'takeru_voice_settings';
const VOICE_DEFAULTS = { speed:100, pitch:50, happy:40, fun:30, sad:0, angry:0 };
let currentAudio = null;

function loadVS(){ try{ return JSON.parse(localStorage.getItem(VOICE_KEY))||{}; }catch{ return {}; } }
function saveVoiceSettings(){
  const narrator=getNarrator(), s=loadVS();
  s.lastNarrator=narrator; s.perNarrator=s.perNarrator||{};
  s.perNarrator[narrator]=getVoiceParams();
  localStorage.setItem(VOICE_KEY,JSON.stringify(s));
}
function syncNum(rId,nId){ document.getElementById(nId).value=document.getElementById(rId).value; }
function syncRange(nId,rId){ document.getElementById(rId).value=document.getElementById(nId).value; }
function getVoiceParams(){
  const g=id=>+document.getElementById(id).value;
  return {speed:g('vpSpeed'),pitch:g('vpPitch'),happy:g('emHappy'),fun:g('emFun'),sad:g('emSad'),angry:g('emAngry')};
}
function applyVoiceParams(p){
  const v={...VOICE_DEFAULTS,...p};
  [['vpSpeed','vpSpeedN',v.speed],['vpPitch','vpPitchN',v.pitch],
   ['emHappy','emHappyN',v.happy],['emFun','emFunN',v.fun],
   ['emSad','emSadN',v.sad],['emAngry','emAngryN',v.angry]
  ].forEach(([rId,nId,val])=>{ document.getElementById(rId).value=val; document.getElementById(nId).value=val; });
}
function buildEmotion(){
  const p=getVoiceParams(), parts=[];
  if(p.happy>0) parts.push(`happy=${p.happy}`);
  if(p.fun>0)   parts.push(`fun=${p.fun}`);
  if(p.sad>0)   parts.push(`sad=${p.sad}`);
  if(p.angry>0) parts.push(`angry=${p.angry}`);
  return parts.join(',')||'happy=0';
}
function getNarrator(){
  const sel=document.getElementById('narratorSelect'), inp=document.getElementById('narratorInput');
  return (sel.style.display!=='none'?sel.value:inp.value)||'Japanese Female 1';
}
function onNarratorChange(){
  const s=loadVS(); applyVoiceParams(s.perNarrator?.[getNarrator()]||VOICE_DEFAULTS); saveVoiceSettings();
}
async function initVoicePanel(){
  try{
    const res=await fetch(`${SERVER}/api/voice/narrators`,{signal:AbortSignal.timeout(3000)});
    const json=await res.json();
    if(json.ok&&json.narrators.length){
      const sel=document.getElementById('narratorSelect');
      sel.innerHTML=json.narrators.map(n=>`<option value="${n}">${n}</option>`).join('');
      const s=loadVS();
      if(s.lastNarrator&&json.narrators.includes(s.lastNarrator)) sel.value=s.lastNarrator;
      applyVoiceParams(s.perNarrator?.[sel.value]||VOICE_DEFAULTS);
    } else { fallbackNarratorInput(); }
  } catch { fallbackNarratorInput(); }
}
function fallbackNarratorInput(){
  document.getElementById('narratorSelect').style.display='none';
  const inp=document.getElementById('narratorInput'); inp.style.display='';
  const s=loadVS(); if(s.lastNarrator) inp.value=s.lastNarrator;
  applyVoiceParams(s.perNarrator?.[inp.value]||VOICE_DEFAULTS);
}
async function checkVoiceStatus(code){
  const dot=document.getElementById('voiceDot'), text=document.getElementById('voiceStatusText');
  if(!code){ dot.textContent='○'; dot.className='dot-none'; text.textContent='--'; return; }
  try{
    const json=await(await fetch(`${SERVER}/api/voice/status/${code}`,{signal:AbortSignal.timeout(2000)})).json();
    if(json.exists){ dot.textContent='●'; dot.className='dot-exists'; text.textContent='MP3あり'; }
    else { dot.textContent='○'; dot.className='dot-none'; text.textContent='未生成'; }
  } catch { dot.textContent='?'; dot.className='dot-none'; text.textContent='サーバー未起動'; }
}
async function recordVoice(){
  if(selectedIdx<0) return;
  const code=cardData[selectedIdx].id, text=document.getElementById('editBody').value.trim();
  if(!text){ alert('本文が空です'); return; }
  const btn=document.getElementById('btnRecord');
  btn.disabled=true; btn.textContent='⏳ 生成中...';
  try{
    const p=getVoiceParams();
    const json=await(await fetch(`${SERVER}/api/voice/generate`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code,text,narrator:getNarrator(),emotion:buildEmotion(),speed:p.speed,pitch:p.pitch})
    })).json();
    if(json.ok){ showVoiceMsg('✅ '+json.message); checkVoiceStatus(code); }
    else alert('生成エラー:\n'+json.error);
  } catch { alert('サーバーに接続できません。\n「TAKERU作業台起動.bat」で Node.js サーバーを先に起動してください。'); }
  finally { btn.disabled=false; btn.textContent='🎙 録音'; }
}
function playVoice(){
  if(selectedIdx<0) return;
  if(currentAudio){ currentAudio.pause(); currentAudio=null; }
  currentAudio=new Audio(`${SERVER}/api/voice/audio/${cardData[selectedIdx].id}`);
  currentAudio.onerror=()=>alert('音声ファイルがありません。\nまず「🎙 録音」を実行してください。');
  currentAudio.play();
}
function confirmVoice(){
  if(selectedIdx<0) return;
  document.getElementById('editBody').value=cardData[selectedIdx].body;
  updatePreview(); countChars(); showVoiceMsg('✅ 確定しました（本文を元に戻しました）');
}
let voiceMsgTimer=null;
function showVoiceMsg(msg){
  document.getElementById('voiceStatusText').textContent=msg;
  clearTimeout(voiceMsgTimer);
  voiceMsgTimer=setTimeout(()=>{ if(selectedIdx>=0) checkVoiceStatus(cardData[selectedIdx].id); },3000);
}
initVoicePanel();
</script>
